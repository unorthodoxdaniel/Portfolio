
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1209;
  --paper: #f5efe0;
  --aged: #e8dcc8;
  --red: #c0392b;
  --gold: #b8860b;
  --faded: #8a7a5e;
  --green: #2d6a4f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap {
  font-family: 'Courier Prime', monospace;
  background: var(--paper);
  color: var(--ink);
  padding: 2rem 1rem;
  min-height: 400px;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.15) 28px);
}
.stage-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faded); margin-bottom: 0.3rem; }
.stage-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--ink); margin-bottom: 0.2rem; font-weight: 400; }
.stage-sub { font-size: 13px; color: var(--faded); margin-bottom: 1.25rem; letter-spacing: 0.04em; }
.noble-note { font-style: italic; color: var(--faded); font-size: 13px; line-height: 1.8; border-left: 3px solid var(--gold); padding-left: 14px; margin-bottom: 1.5rem; }
.card {
  background: white;
  border: 1px solid var(--aged);
  padding: 2rem;
  box-shadow: 4px 4px 0 var(--aged);
  position: relative;
  margin-bottom: 1.5rem;
}
.card::before {
  content: '';
  position: absolute;
  top: 10px; left: 10px;
  right: -10px; bottom: -10px;
  border: 1px solid var(--aged);
  z-index: -1;
}
.item-counter { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faded); margin-bottom: 0.5rem; }
.say-aloud { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; font-weight: 700; }
.prompt-en { font-family: 'Playfair Display', serif; font-size: 19px; font-style: italic; color: var(--ink); margin-bottom: 1.25rem; line-height: 1.5; }
.answer-row { display: flex; align-items: center; gap: 10px; }
.answer-area {
  flex: 1; min-height: 48px;
  border: none; border-bottom: 2px solid var(--aged);
  padding: 0.6rem 0.25rem;
  font-family: 'Courier Prime', monospace;
  font-size: 15px; color: var(--ink);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center;
  transition: border-color 0.2s;
}
.answer-area:hover { border-color: var(--ink); }
.answer-area.revealed { cursor: default; border-color: var(--gold); }
.hint { font-size: 12px; color: var(--aged); font-style: italic; }
.reveal-text { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: var(--red); }
.speak-btn {
  flex-shrink: 0; width: 36px; height: 36px;
  border-radius: 2px;
  border: 1.5px solid var(--ink);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink);
  font-family: 'Courier Prime', monospace;
  transition: background 0.15s;
}
.speak-btn:hover { background: var(--ink); color: var(--paper); }
.speak-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.speak-btn.speaking { background: var(--red); color: white; border-color: var(--red); }
.breakdown { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--aged); }
.breakdown-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; }
.bd-fr { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; color: var(--red); min-width: 150px; }
.bd-en { font-size: 13px; color: var(--faded); }
.tip { margin-top: 0.75rem; padding: 0.6rem 1rem; background: var(--aged); font-size: 13px; color: var(--faded); line-height: 1.6; font-style: italic; }
.tip strong { color: var(--ink); font-style: normal; }
.btn-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
button {
  font-family: 'Courier Prime', monospace;
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 22px; border-radius: 2px;
  cursor: pointer; border: 1.5px solid var(--ink);
  background: transparent; color: var(--ink);
  transition: background 0.15s;
}
button:hover { background: var(--aged); }
button.primary { background: var(--ink); color: var(--paper); }
button.primary:hover { background: var(--red); border-color: var(--red); }
.score-area { margin-top: 1rem; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faded); }
.score-num { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--ink); font-style: italic; }
.progress-bar { height: 3px; background: var(--aged); margin-bottom: 1.5rem; }
.progress-fill { height: 3px; background: var(--gold); transition: width 0.4s ease; }
.stage-nav { display: flex; gap: 6px; margin-bottom: 1.25rem; }
.stage-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--aged); transition: background 0.2s; }
.done-card { text-align: center; padding: 2.5rem 1.5rem; }
.done-title { font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; color: var(--ink); margin-bottom: 0.5rem; }
.done-sub { font-size: 13px; color: var(--faded); margin-bottom: 1.5rem; line-height: 1.8; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.pron-chip { background: var(--aged); padding: 6px 10px; font-size: 13px; }
.pron-fr { font-family: 'Playfair Display', serif; font-style: italic; color: var(--red); }
.pron-en { color: var(--faded); font-size: 12px; }
.section-header { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.5rem; margin-top: 1rem; border-bottom: 1px solid var(--aged); padding-bottom: 4px; }
.voice-note { font-size: 11px; color: var(--aged); margin-top: 0.5rem; font-style: italic; }
</style>
<div class="wrap" id="app"></div>
<script>
const stages = [
  { id:"cheatsheet", title:"Your pronoun map", sub:"Glance at this — we'll build on it immediately.", note:"In French, the pronoun almost always comes just before the verb. Once you feel where it sits, the rest clicks into place.", type:"reference" },
  { id:"subject", title:"Subject pronouns", sub:"Who's doing the action?", note:"Good news: vous works for both 'you (singular, formal)' and 'you (plural)'. So you only need one word for two English uses.", type:"drill",
    items:[
      { en:"I want to go to Paris.", fr:"Je veux aller à Paris.", parts:[["Je","I"],["veux","want"],["aller","to go"],["à Paris","to Paris"]] },
      { en:"She has a reservation.", fr:"Elle a une réservation.", parts:[["Elle","she"],["a","has"],["une réservation","a reservation"]] },
      { en:"We would like to eat.", fr:"Nous voudrions manger.", parts:[["Nous","we"],["voudrions","would like"],["manger","to eat"]] },
      { en:"They (mixed/masc.) are ready.", fr:"Ils sont prêts.", parts:[["Ils","they (masc.)"],["sont","are"],["prêts","ready"]] },
      { en:"You (formal) speak very well.", fr:"Vous parlez très bien.", parts:[["Vous","you (formal)"],["parlez","speak"],["très bien","very well"]] },
    ]
  },
  { id:"direct", title:"Direct object pronouns", sub:"Replacing the thing being acted on.", note:"The trick: the pronoun jumps in front of the verb. 'I see it' → Je le vois — not Je vois le. This feels odd at first but becomes automatic fast.", type:"drill",
    items:[
      { en:"I see it. (masc.)", fr:"Je le vois.", parts:[["Je","I"],["le","it/him"],["vois","see"]] },
      { en:"She reads it. (fem.)", fr:"Elle la lit.", parts:[["Elle","she"],["la","it/her"],["lit","reads"]] },
      { en:"We want them. (masc. pl.)", fr:"Nous les voulons.", parts:[["Nous","we"],["les","them"],["voulons","want"]] },
      { en:"He sees me.", fr:"Il me voit.", parts:[["Il","he"],["me","me"],["voit","sees"]] },
      { en:"She calls you back. (informal)", fr:"Elle te rappelle.", parts:[["Elle","she"],["te","you (informal)"],["rappelle","calls back"]] },
    ]
  },
  { id:"indirect", title:"Indirect object pronouns", sub:"To whom / for whom?", note:"lui replaces both 'to him' and 'to her'. French is generous there — one word does double duty. leur handles 'to them'.", type:"drill",
    items:[
      { en:"I give him the menu.", fr:"Je lui donne le menu.", parts:[["Je","I"],["lui","to him/her"],["donne","give"],["le menu","the menu"]] },
      { en:"She writes to them.", fr:"Elle leur écrit.", parts:[["Elle","she"],["leur","to them"],["écrit","writes"]] },
      { en:"He sends me the address.", fr:"Il m'envoie l'adresse.", parts:[["Il","he"],["m'","to me"],["envoie","sends"],["l'adresse","the address"]] },
      { en:"We tell you (formal) the truth.", fr:"Nous vous disons la vérité.", parts:[["Nous","we"],["vous","to you"],["disons","tell"],["la vérité","the truth"]] },
      { en:"I speak to her every day.", fr:"Je lui parle chaque jour.", parts:[["Je","I"],["lui","to her"],["parle","speak"],["chaque jour","every day"]] },
    ]
  },
  { id:"y_en", title:"y and en", sub:"Two small words that do a lot.", note:"y = 'there' or 'to/at it'. en = 'of it / some / from there'. Both go right before the verb, just like the others.", type:"drill",
    items:[
      { en:"I'm going there tomorrow.", fr:"J'y vais demain.", parts:[["J'","I"],["y","there"],["vais","am going"],["demain","tomorrow"]] },
      { en:"He thinks about it.", fr:"Il y pense.", parts:[["Il","he"],["y","about it"],["pense","thinks"]] },
      { en:"She has some.", fr:"Elle en a.", parts:[["Elle","she"],["en","some of it"],["a","has"]] },
      { en:"I want some.", fr:"J'en veux.", parts:[["J'","I"],["en","some"],["veux","want"]] },
      { en:"We come from there.", fr:"Nous en venons.", parts:[["Nous","we"],["en","from there"],["venons","come"]] },
    ]
  },
  { id:"mixed", title:"The mix", sub:"Real sentences — any pronoun type.", note:"This is where it all comes together. Pause, find the verb, then place the pronoun just before it.", type:"drill",
    items:[
      { en:"She gives it to him.", fr:"Elle le lui donne.", parts:[["Elle","she"],["le","it (masc.)"],["lui","to him"],["donne","gives"]] },
      { en:"I send them to you (formal).", fr:"Je vous les envoie.", parts:[["Je","I"],["vous","to you"],["les","them"],["envoie","send"]] },
      { en:"He tells me about it.", fr:"Il m'en parle.", parts:[["Il","he"],["m'","to me"],["en","about it"],["parle","tells"]] },
      { en:"We're going there with them.", fr:"Nous y allons avec eux.", parts:[["Nous","we"],["y","there"],["allons","are going"],["avec eux","with them"]] },
      { en:"Do you want some? (informal)", fr:"Tu en veux?", parts:[["Tu","you (informal)"],["en","some"],["veux","want"]] },
    ]
  }
];
const pronounCheatsheet = {
  "Subject": [["je","I"],["tu","you (informal)"],["il","he"],["elle","she"],["nous","we"],["vous","you (formal/pl.)"],["ils","they (masc.)"],["elles","they (fem.)"]],
  "Direct object": [["me","me"],["te","you"],["le","him/it (m)"],["la","her/it (f)"],["nous","us"],["vous","you"],["les","them"]],
  "Indirect object": [["me","to me"],["te","to you"],["lui","to him/her"],["nous","to us"],["vous","to you"],["leur","to them"]],
  "y and en": [["y","there/to it"],["en","some/of it/from there"]]
};
let frVoice=null;
function loadVoice(){const v=speechSynthesis.getVoices();frVoice=v.find(x=>x.lang.startsWith('fr'))||null;}
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=loadVoice;loadVoice();}
function speak(text,btn){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='fr-FR';utt.rate=0.88;
  if(frVoice)utt.voice=frVoice;
  if(btn){btn.classList.add('speaking');utt.onend=()=>btn.classList.remove('speaking');utt.onerror=()=>btn.classList.remove('speaking');}
  speechSynthesis.speak(utt);
}
let stageIndex=0,itemIndex=0,revealed=false,correct=0,total=0;
function drillStages(){return stages.filter(s=>s.type==='drill');}
function pct(){
  const ds=drillStages();const tot=ds.reduce((a,s)=>a+s.items.length,0);
  let done=0;for(let i=0;i<stageIndex;i++)if(stages[i].type==='drill')done+=stages[i].items.length;
  if(stages[stageIndex]&&stages[stageIndex].type==='drill')done+=itemIndex;
  return Math.round((done/tot)*100);
}
function render(){
  const app=document.getElementById('app');
  if(stageIndex>=stages.length){renderDone(app);return;}
  const stage=stages[stageIndex];
  if(stage.type==='reference'){renderRef(app,stage);return;}
  renderDrill(app,stage);
}
function renderRef(app,stage){
  let html=`<p class="stage-label">Pronoun reference</p><p class="stage-title">${stage.title}</p><p class="stage-sub">${stage.sub}</p><div class="noble-note">${stage.note}</div>`;
  Object.entries(pronounCheatsheet).forEach(([sec,items])=>{
    html+=`<p class="section-header">${sec}</p><div class="grid2">`;
    items.forEach(([fr,en])=>html+=`<div class="pron-chip"><span class="pron-fr">${fr}</span> <span class="pron-en">— ${en}</span></div>`);
    html+=`</div>`;
  });
  html+=`<div class="btn-row"><button class="primary" onclick="nextStage()">Start the drill ↗</button></div>`;
  app.innerHTML=html;
}
function renderDrill(app,stage){
  const item=stage.items[itemIndex];
  const stageNum=stages.filter((s,i)=>s.type==='drill'&&i<=stageIndex).length;
  let dots=stages.filter(s=>s.type==='drill').map((s,i)=>`<div class="stage-dot" style="${i<stageNum-1?'background:var(--gold)':i===stageNum-1?'background:var(--ink)':''}"></div>`).join('');
  let html=`<div class="progress-bar"><div class="progress-fill" style="width:${pct()}%"></div></div>
  <div class="stage-nav">${dots}</div>
  <p class="stage-label">Stage ${stageNum} of 5</p>
  <p class="stage-title">${stage.title}</p>
  <p class="stage-sub">${stage.sub}</p>
  <div class="noble-note">${stage.note}</div>
  <div class="card">
    <p class="item-counter">Sentence ${itemIndex+1} of ${stage.items.length}</p>
    <p class="say-aloud">▶ say out loud</p>
    <p class="prompt-en">${item.en}</p>
    <div class="answer-row">`;
  if(!revealed){
    html+=`<div class="answer-area" onclick="reveal()"><span class="hint">— tap to reveal —</span></div><button class="speak-btn" disabled style="opacity:0.25">▶</button>`;
  } else {
    html+=`<div class="answer-area revealed"><span class="reveal-text">${item.fr}</span></div><button class="speak-btn" id="spkbtn" onclick="speakCurrent(this)">▶</button>`;
  }
  html+=`</div>`;
  if(revealed){
    html+=`<div class="breakdown">`;
    item.parts.forEach(([fr,en])=>html+=`<div class="breakdown-row"><span class="bd-fr">${fr}</span><span class="bd-en">= ${en}</span></div>`);
    html+=`</div>`;
    if(item.tip)html+=`<div class="tip"><strong>Note:</strong> ${item.tip}</div>`;
    html+=`<p class="voice-note">Audio quality depends on your device's French voice.</p>`;
  }
  html+=`</div>`;
  if(revealed)html+=`<div class="btn-row"><button class="primary" onclick="markCorrect(true)">Got it ✓</button><button onclick="markCorrect(false)">Recycle — see again</button></div>`;
  if(total>0)html+=`<div class="score-area">Score: <span class="score-num">${correct}/${total}</span></div>`;
  app.innerHTML=html;
}
function speakCurrent(btn){speak(stages[stageIndex].items[itemIndex].fr,btn);}
function reveal(){revealed=true;total++;render();setTimeout(()=>{const b=document.getElementById('spkbtn');if(b)speakCurrent(b);},150);}
function markCorrect(ok){
  if(ok)correct++;else stages[stageIndex].items.push(stages[stageIndex].items[itemIndex]);
  itemIndex++;revealed=false;
  if(itemIndex>=stages[stageIndex].items.length)nextStage();else render();
}
function nextStage(){stageIndex++;itemIndex=0;revealed=false;render();}
function renderDone(app){
  const p=total>0?Math.round((correct/total)*100):0;
  const msg=p>=80?"Excellent — these patterns are moving into long-term memory.":p>=60?"Solid progress. Run it again and watch it accelerate.":"Keep at it — repetition is exactly how Noble's method works.";
  app.innerHTML=`<div class="card done-card"><p class="done-title">Drill complete!</p><p class="done-sub">${correct} out of ${total} — ${p}%<br><br>${msg}</p><div class="btn-row" style="justify-content:center"><button class="primary" onclick="restart()">Run it again ↗</button></div></div>`;
}
function restart(){stageIndex=0;itemIndex=0;revealed=false;correct=0;total=0;stages.forEach(s=>{if(s.type==='drill')s.items=s.items.slice(0,5);});render();}
render();
</script>
