 "Apprendre une langue en ligne", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 1, "appearances": ["Décembre 2025"], "hasDocs": true}, {"id": 63, "month": "Décembre 2025", "year": 2025, "title": "Animaux de compagnie au bureau : pour ou contre ?", "question": "", "docs": ["Apporter son animal au travail est une pratique qui se développe. Son intérêt ? Réduire le stress des employés. Les chiens ou les chats changent l'atmosphère de l'entreprise et diminuent les conflits entre collègues. C'est important, car chaque année, l'État français consacre 2 à 3 milliards d'euros pour soigner le stress au travail. Une enquête montre qu'un quart des salariés pensent que les animaux améliorent leur motivation.\n    - Doc 2 (Alba, 32 ans) : « Dans l'entreprise où je travaille, il est permis d'amener son animal. Pour ma part, cela me dérange. Je ne suis pas très à l'aise avec les animaux, qui peuvent agir de façon inattendue. Cela peut aussi poser des problèmes de santé : qu'en est-il des employés allergiques aux chats ? Et puis, cela constitue une source de distraction. Un chien ou un chat n'améliorera pas notre productivité ! »"], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Décembre 2025"], "hasDocs": true}, {"id": 64, "month": "Décembre 2025", "year": 2025, "title": "La publicité (alimentaire) ciblant les enfants", "question": "", "docs": ["Beaucoup trouvent la publicité agaçante, mais à mon avis elle est très utile pour les entreprises. Elle sert à présenter un produit ou un service. Parfois elle est même drôle ! Elle m'aide à découvrir les nouveautés et les offres spéciales. Comparer les articles grâce à la publicité permet de faire des économies. Enfin, les jeux gratuits sur téléphone dépendent des publicités ; sans elles, ils seraient payants.\n    - Doc 2 (Alma, 35 ans) : Nous sommes entourés de publicité tous les jours : journaux, radios, télévisions, smartphones, Internet… Les émissions télévisées sont souvent coupées par des pubs, ce qui est irritant. Recevoir des kilos de publicité chaque année dans la boîte aux lettres n'est pas bon pour l'environnement ! Il serait utile de créer une loi pour limiter les publicités à la télévision et par courrier. Des publicités plus discrètes seraient mieux reçues."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Décembre 2025"], "hasDocs": true}, {"id": 65, "month": "Novembre 2025", "year": 2025, "title": "Objets connectés", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 66, "month": "Novembre 2025", "year": 2025, "title": "L'accès gratuit aux musées", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 67, "month": "Novembre 2025", "year": 2025, "title": "Art urbain ou vandalisme ?", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 68, "month": "Novembre 2025", "year": 2025, "title": "La restauration rapide", "question": "", "docs": ["Je suis complètement contre les chaînes de fast-food, car on ignore souvent quels ingrédients sont utilisés. La qualité de la nourriture y est faible. Manger ce type d'aliments peut provoquer des maladies, comme le montre le documentaire « Supersize Me ». Certes, hamburgers, sandwichs et frites sont pratiques et bon marché. Mais il est important de faire d'autres choix pour rester en bonne santé.\n   - Doc 2 (Bernard) : Je soutiens la restauration rapide. Je travaille pour une chaîne célèbre et je pense qu'on peut y trouver des repas équilibrés. Les menus comprennent légumes, salades, pain et viande. Chaque client est responsable de ce qu'il mange : choisir plusieurs sandwiches et trop de sauce n'est pas un repas sain. Ces restaurants sont aussi très propres et faciles d'accès pour les familles ou groupes d'amis."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 69, "month": "Novembre 2025", "year": 2025, "title": "Maisons de retraite ou maintien à domicile ?", "question": "", "docs": ["Les maisons de retraite représentent une solution adaptée pour les personnes âgées. Elles y bénéficient de soins appropriés et d'un encadrement professionnel. Elles peuvent participer à diverses activités qui leur permettent de garder une vie sociale et d'éviter la solitude. Dans certains cas, c'est mieux que de rester seules chez elles.\n   - Doc 2 (Jean, retraité) : Les maisons de retraite peuvent priver les personnes âgées de la présence de leur famille et donner l'impression d'être abandonné. Les conditions de vie ne sont pas toujours satisfaisantes et certains établissements manquent de personnel compétent. Selon moi, l'aide à domicile est une meilleure solution pour vieillir auprès de ses proches."], "theme": "Éducation / École", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 70, "month": "Novembre 2025", "year": 2025, "title": "Faire ses courses : producteurs locaux ou supermarché ?", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 71, "month": "Novembre 2025", "year": 2025, "title": "Restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 72, "month": "Novembre 2025", "year": 2025, "title": "Chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Novembre 2025", "Août 2025", "Juillet 2025"], "hasDocs": true}, {"id": 73, "month": "Novembre 2025", "year": 2025, "title": "Sieste au travail", "question": "", "docs": ["Selon le site siestepourtous.com, une courte sieste au travail pourrait augmenter la productivité et la créativité des employés de 35 %, un vrai bénéfice pour le salarié comme pour l'entreprise. La sieste améliorerait la mémoire et la concentration. Un employé reposé serait plus disponible. Enfin, faire une sieste aiderait à réduire le stress et les risques cardiaques.", "Même si les bienfaits de la micro-sieste ont été prouvés scientifiquement, certaines personnes restent sceptiques. La sieste au bureau pose des difficultés pratiques : toutes les entreprises ne peuvent pas disposer de lits ou de salles spécifiques. Quand une entreprise instaure un temps de repos, elle doit respecter certaines règles : fournir un espace et du matériel adaptés pour éviter tout harcèlement, garantir l'égalité entre salariés et établir une charte encadrant cette pratique."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 74, "month": "Novembre 2025", "year": 2025, "title": "Distributeurs dans les lycées : avantages et inconvénients", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 75, "month": "Novembre 2025", "year": 2025, "title": "Productivité et confort au travail", "question": "", "docs": ["Dans notre entreprise, nous avons mis en place des bureaux réglables en hauteur pour que les employés travaillent dans la position qui leur convient. Ils sont satisfaits et se disent plus performants, par exemple lors des négociations au téléphone. Le climat social s'est amélioré et les échanges entre collègues sont plus fréquents.\n    - Doc 2 (Dubois, ingénieur) : Aujourd'hui, les entreprises cherchent à augmenter la productivité, et les employés passent plus de temps au travail. Elles essaient d'inciter leurs salariés à en faire plus tout en prenant soin de leur santé. Pour ma part, ce qui compte, c'est de réaliser mon travail pendant mes heures normales, sans heures supplémentaires."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 76, "month": "Novembre 2025", "year": 2025, "title": "Jeux vidéo : un loisir utile ou dangereux ?", "question": "", "docs": ["Des recherches ont montré que certaines parties du cerveau des adultes peuvent se développer grâce aux jeux vidéo. Jouer peut être bénéfique : cela aide à renforcer l'analyse, la prise de décision et la rapidité de réaction. C'est une bonne nouvelle, puisque 83 % des joueurs sont des adultes. Toutefois, il faut rester vigilant, car certains jeux n'apportent pas ces effets positifs.", "Durant trois ans, des chercheurs ont observé des enfants de 8 à 17 ans. Les conclusions indiquent que les enfants qui jouent beaucoup deviennent plus violents, plus tendus et plus stressés, et réussissent moins bien à l'école. C'est pourquoi il est conseillé aux parents de contrôler le temps passé devant les jeux vidéo."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Novembre 2025"], "hasDocs": true}, {"id": 77, "month": "Octobre 2025", "year": 2025, "title": "L'art urbain", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 2, "appearances": ["Octobre 2025", "Février 2025"], "hasDocs": true}, {"id": 78, "month": "Octobre 2025", "year": 2025, "title": "Parents exigeants ou permissifs", "question": "", "docs": [], "theme": "Famille / Enfants", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": false}, {"id": 79, "month": "Octobre 2025", "year": 2025, "title": "Petits commerces vs grandes surfaces : où faire ses courses ?", "question": "", "docs": ["Faire ses courses au supermarché est avantageux, puisqu'on y trouve une grande diversité de produits au même endroit. Vous pouvez garer votre voiture et passer d'un rayon à l'autre pour acheter ce dont vous avez besoin : fruits, légumes, fromages, viandes, boissons. De plus, plusieurs marques sont proposées pour chaque produit, avec des offres promotionnelles régulières.\n   - Doc 2 (Association pour la défense des commerces de proximité) : L'initiative « Février sans supermarché » vise à limiter le pouvoir des supermarchés et à soutenir la survie des petits commerces en améliorant leurs ventes. Le principe : ne pas faire ses courses dans les grandes surfaces durant un mois et privilégier les épiceries de quartier. Les clients en retirent des avantages : produits plus frais et de qualité, et moments d'échange avec leurs voisins."], "theme": "Éducation / École", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": true}, {"id": 80, "month": "Octobre 2025", "year": 2025, "title": "La publicité : utile ou gênante ?", "question": "", "docs": ["Beaucoup trouvent la publicité agaçante, mais à mon avis elle est très utile pour les entreprises. Elle sert à présenter un produit ou un service. Parfois elle est même drôle ! Elle m'aide à découvrir les nouveautés et les offres spéciales. Comparer les articles grâce à la publicité permet de faire des économies. Enfin, les jeux gratuits sur téléphone dépendent des publicités ; sans elles, ils seraient payants.\n    - Doc 2 (Alma, 35 ans) : Nous sommes entourés de publicité tous les jours : journaux, radios, télévisions, smartphones, Internet… Les émissions télévisées sont souvent coupées par des pubs, ce qui est irritant. Recevoir des kilos de publicité chaque année dans la boîte aux lettres n'est pas bon pour l'environnement ! Il serait utile de créer une loi pour limiter les publicités à la télévision et par courrier. Des publicités plus discrètes seraient mieux reçues."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": true}, {"id": 81, "month": "Octobre 2025", "year": 2025, "title": "Les vols low-cost", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": true}, {"id": 82, "month": "Octobre 2025", "year": 2025, "title": "Cours de langue en ligne", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": true}, {"id": 83, "month": "Octobre 2025", "year": 2025, "title": "Maisons de retraite : pour ou contre ?", "question": "", "docs": ["Je vis dans un pays où les maisons de retraite sont très rares. Ici, lorsqu'une personne âgée ne peut plus vivre seule, elle s'installe chez les plus jeunes, et en général cela ne crée pas de grands problèmes. Pour nous, il est inhabituel de laisser nos parents ou grands-parents à des inconnus.", "Les maisons de retraite sont souvent mal perçues, pourtant elles sont une solution efficace pour les personnes âgées. Elles évitent l'isolement puisqu'on y trouve d'autres seniors. Elles proposent aussi des soins médicaux adaptés. De plus, elles sont pratiques et rassurantes pour les familles. Le seul problème est que leur prix reste encore trop élevé pour beaucoup."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Octobre 2025"], "hasDocs": true}, {"id": 84, "month": "Septembre 2025", "year": 2025, "title": "Le travail : un bénéfice ou un frein ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Septembre 2025"], "hasDocs": true}, {"id": 85, "month": "Septembre 2025", "year": 2025, "title": "Colocation : bénéfices et inconvénients", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 2, "appearances": ["Mars 2026", "Septembre 2025"], "hasDocs": true}, {"id": 86, "month": "Septembre 2025", "year": 2025, "title": "Cuisiner pour le plaisir ou comme métier ?", "question": "", "docs": ["Les passionnés de cuisine arrivent à préparer quelques plats, mais ils manquent généralement des techniques et de l'expérience des chefs. Maîtriser l'art culinaire nécessite apprentissage et pratique approfondie.", "Grâce aux réseaux sociaux et aux cours en ligne, certains autodidactes se sont distingués. Le parcours d'une passionnée devenue cheffe et auteure de livres de cuisine démontre qu'il est possible de réussir autrement que par la voie classique."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Mars 2026", "Septembre 2025"], "hasDocs": true}, {"id": 87, "month": "Septembre 2025", "year": 2025, "title": "Ville ou campagne : choisir son cadre de vie", "question": "", "docs": ["Depuis que j'ai déménagé à la campagne, ma vie a changé. Les chants des oiseaux et mon jardin ont remplacé les pharmacies et cinémas de la ville. Je voulais fuir le bruit, la pollution et la foule pour profiter du calme et des espaces verts. Ici, je savoure la tranquillité et de grands espaces sans voisins proches.\n   - Doc 2 (Claire) : La vie rurale n'est pas adaptée à tous. Les commerces, loisirs et services essentiels (écoles, hôpitaux) peuvent se trouver à plusieurs kilomètres. Il faut souvent utiliser la voiture, et Internet n'est pas toujours fiable. La ville facilite les déplacements et procure un confort quotidien supérieur."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Septembre 2025"], "hasDocs": true}, {"id": 88, "month": "Septembre 2025", "year": 2025, "title": "Privilégier la ferme ou le supermarché pour ses courses ?", "question": "", "docs": [], "theme": "Éducation / École", "freq": 1, "appearances": ["Septembre 2025"], "hasDocs": false}, {"id": 89, "month": "Août 2025", "year": 2025, "title": "Sieste au travail", "question": "", "docs": ["Selon le site siestepourtous.com, une courte sieste au travail pourrait augmenter la productivité et la créativité des employés de 35 %, un vrai bénéfice pour le salarié comme pour l'entreprise. La sieste améliorerait la mémoire et la concentration. Un employé reposé serait plus disponible. Enfin, faire une sieste aiderait à réduire le stress et les risques cardiaques.", "Même si les bienfaits de la micro-sieste ont été prouvés scientifiquement, certaines personnes restent sceptiques. La sieste au bureau pose des difficultés pratiques : toutes les entreprises ne peuvent pas disposer de lits ou de salles spécifiques. Quand une entreprise instaure un temps de repos, elle doit respecter certaines règles : fournir un espace et du matériel adaptés pour éviter tout harcèlement, garantir l'égalité entre salariés et établir une charte encadrant cette pratique."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 90, "month": "Août 2025", "year": 2025, "title": "Jeunes et emploi : faut-il privilégier diplôme ou expérience ?", "question": "", "docs": ["Beaucoup de jeunes sortant de l'université se retrouvent sans emploi. La valeur des diplômes sur le marché du travail pose question. Les recruteurs leur reprochent d'avoir trop étudié et trop peu d'expérience, ou considèrent leur jeunesse comme un frein. Plus de 60 % des diplômés restent sans travail un an après leurs études. Il paraît urgent de mieux reconnaître les diplômes et de faciliter l'insertion professionnelle.", "On parle souvent de dirigeants célèbres qui ont réussi sans cursus universitaire. Ces exemples laissent penser qu'il suffit d'être talentueux pour diriger une entreprise. Certains chefs d'entreprise considèrent que l'université peut freiner la créativité : elle pousse à suivre des parcours standards et limite l'innovation. Pour les futurs entrepreneurs, rien ne remplacerait l'expérience pratique et l'autoformation, sans dépendre d'une institution académique."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Août 2025"], "hasDocs": true}, {"id": 91, "month": "Août 2025", "year": 2025, "title": "Vivre en ville ou à la campagne", "question": "", "docs": ["À mon avis, vivre en ville permet de profiter de nombreuses activités de loisirs. Aller au cinéma, dîner au restaurant ou faire les magasins est très facile. Tout est à proximité, donc on n'a pas besoin de se déplacer longtemps pour se divertir. On peut marcher ou prendre un taxi si nécessaire. La ville offre aussi une grande variété d'activités culturelles comme les musées, le théâtre ou l'opéra.", "Il y a peu de temps, j'ai choisi de m'installer à la campagne après avoir quitté la ville, car je voulais un environnement plus naturel et tranquille. Plutôt que de sortir au restaurant ou dans les bars, j'invite mes amis à la maison pour partager un verre sur la terrasse ou organiser un barbecue. Le prix des logements a aussi été un élément important : à la campagne, les maisons coûtent beaucoup moins cher. Avec le même budget, j'ai pu acheter une grande maison avec un jardin, ce qui n'aurait pas été possible en zone urbaine."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Août 2025"], "hasDocs": true}, {"id": 92, "month": "Août 2025", "year": 2025, "title": "Publicité et enfants : est-ce bénéfique ou nocif ?", "question": "", "docs": ["D'après une enquête, les enfants sont en permanence confrontés à de nombreuses publicités (télévision, journaux, Internet), souvent dans des espaces où ils sont vulnérables. Celles-ci ciblent principalement les jouets, les jeux vidéo et les aliments peu sains, ce qui influence leurs décisions et leurs demandes familiales.", "Une recherche parue dans une revue scientifique montre que les enfants comprennent difficilement les messages publicitaires, même s'ils savent que le but est de persuader. Pourtant, d'autres facteurs comme l'éducation des parents, la société et la culture ont un poids plus fort sur leurs choix de consommation que la publicité."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Août 2025"], "hasDocs": true}, {"id": 93, "month": "Août 2025", "year": 2025, "title": "Caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Août 2025", "Décembre 2024", "Novembre 2024"], "hasDocs": true}, {"id": 94, "month": "Août 2025", "year": 2025, "title": "Réduction du temps de travail", "question": "", "docs": ["Réduire le temps de travail aide les employés à trouver un meilleur équilibre entre vie professionnelle et personnelle. Avec plus de temps libre, ils consacrent davantage de moments à leur famille, leurs loisirs et leur santé. Cela améliore la satisfaction au travail, diminue le stress et augmente l'efficacité globale.", "Réduire les heures de travail peut aider les entreprises en réduisant l'absentéisme et en augmentant la fidélisation. Avec des horaires plus flexibles, les employés sont plus motivés et impliqués. Cependant, cela nécessite une organisation efficace et une adaptation des processus pour maintenir la productivité et répondre aux besoins de l'entreprise."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Août 2025", "Avril 2025", "Novembre 2024"], "hasDocs": true}, {"id": 95, "month": "Août 2025", "year": 2025, "title": "Impact des vêtements de marque sur les enfants", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 2, "appearances": ["Août 2025", "Avril 2025"], "hasDocs": true}, {"id": 96, "month": "Août 2025", "year": 2025, "title": "L'accès gratuit aux musées : avantage ou inconvénient ?", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Août 2025"], "hasDocs": true}, {"id": 97, "month": "Août 2025", "year": 2025, "title": "Objets connectés", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 98, "month": "Août 2025", "year": 2025, "title": "L'art urbain : pour ou contre ?", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 4, "appearances": ["Août 2025", "Juillet 2024", "Janvier 2024", "Octobre 2023"], "hasDocs": true}, {"id": 99, "month": "Août 2025", "year": 2025, "title": "Chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Novembre 2025", "Août 2025", "Juillet 2025"], "hasDocs": true}, {"id": 100, "month": "Août 2025", "year": 2025, "title": "Producteurs locaux ou supermarché ?", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Août 2025", "Février 2025"], "hasDocs": true}, {"id": 101, "month": "Août 2025", "year": 2025, "title": "La restauration rapide", "question": "", "docs": ["Je suis complètement contre les chaînes de fast-food, car on ignore souvent quels ingrédients sont utilisés. La qualité de la nourriture y est faible. Manger ce type d'aliments peut provoquer des maladies, comme le montre le documentaire « Supersize Me ». Certes, hamburgers, sandwichs et frites sont pratiques et bon marché. Mais il est important de faire d'autres choix pour rester en bonne santé.\n   - Doc 2 (Bernard) : Je soutiens la restauration rapide. Je travaille pour une chaîne célèbre et je pense qu'on peut y trouver des repas équilibrés. Les menus comprennent légumes, salades, pain et viande. Chaque client est responsable de ce qu'il mange : choisir plusieurs sandwiches et trop de sauce n'est pas un repas sain. Ces restaurants sont aussi très propres et faciles d'accès pour les familles ou groupes d'amis."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 102, "month": "Août 2025", "year": 2025, "title": "Maisons de retraite ou maintien à domicile ?", "question": "", "docs": ["Les maisons de retraite représentent une solution adaptée pour les personnes âgées. Elles y bénéficient de soins appropriés et d'un encadrement professionnel. Elles peuvent participer à diverses activités qui leur permettent de garder une vie sociale et d'éviter la solitude. Dans certains cas, c'est mieux que de rester seules chez elles.\n   - Doc 2 (Jean, retraité) : Les maisons de retraite peuvent priver les personnes âgées de la présence de leur famille et donner l'impression d'être abandonné. Les conditions de vie ne sont pas toujours satisfaisantes et certains établissements manquent de personnel compétent. Selon moi, l'aide à domicile est une meilleure solution pour vieillir auprès de ses proches."], "theme": "Éducation / École", "freq": 2, "appearances": ["Novembre 2025", "Août 2025"], "hasDocs": true}, {"id": 103, "month": "Août 2025", "year": 2025, "title": "La colocation : entre avantages et inconvénients", "question": "", "docs": ["Vivre en colocation peut être une belle expérience humaine. Avec un ami ou une personne qu'on apprend à connaître, cela permet de créer de nouveaux liens, de partager des moments agréables en rentrant le soir (discuter autour d'un repas, regarder un film). C'est aussi un bon moyen de se répartir les tâches ménagères et de bénéficier des compétences de chacun (cuisine, bricolage).", "Vivre en colocation est très différent de la vie en famille. Chacun a son rythme, sa personnalité et ses priorités, ce qui peut compliquer la cohabitation. Si le courant ne passe pas avec le colocataire, cela devient vite difficile. Les conflits surviennent souvent à cause du non-respect des tâches partagées ou du manque d'intimité. Le bruit peut aussi poser problème (un colocataire qui joue aux jeux vidéo tard la nuit)."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Avril 2025"], "hasDocs": true}, {"id": 104, "month": "Août 2025", "year": 2025, "title": "Photo sur le CV : pour ou contre ?", "question": "", "docs": ["Certains candidats mettent une photo sur leur CV, d'autres préfèrent ne pas en mettre. Il faudrait interdire cette pratique pour éviter toute discrimination. Selon une étude de spécialistes du recrutement, la photo n'a pas de réelle utilité : les employeurs accordent plus d'attention à l'expérience professionnelle (32 %) et aux diplômes (15 %) qu'au physique. Seuls 2 % des recruteurs commencent par regarder la photo, ce qui est surprenant compte tenu de l'importance donnée à l'apparence.", "L'utilisation d'une photo sur le CV divise les recruteurs. Certains estiment qu'elle aide à se faire une idée du candidat avant la rencontre et facilite la mémorisation quand beaucoup de CV sont reçus. D'autres pensent que tout dépend du métier : pour les postes liés à l'accueil, la photo peut être appropriée. Cependant, elle doit toujours être professionnelle pour créer une impression positive."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Août 2025", "Juin 2025"], "hasDocs": true}, {"id": 105, "month": "Août 2025", "year": 2025, "title": "L'aide aux personnes en difficulté", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Mars 2025"], "hasDocs": true}, {"id": 106, "month": "Août 2025", "year": 2025, "title": "Les zoos : outils de conservation ou prisons pour animaux ?", "question": "", "docs": ["Les animaux sauvages ne doivent pas vivre dans les zoos, car ce n'est pas leur milieu naturel. Les zoos ressemblent à des prisons. Il y a même des ours polaires dans des endroits trop chauds. Les animaux doivent rester libres, dans la nature.", "Les zoos ont beaucoup d'avantages. Ils aident à protéger les animaux en voie de disparition. Les animaux y sont bien soignés. Grâce aux zoos, il y a plus de naissances et cela peut sauver certaines espèces."], "theme": "Animaux", "freq": 1, "appearances": ["Août 2025"], "hasDocs": true}, {"id": 107, "month": "Août 2025", "year": 2025, "title": "Les jeux vidéo : bienfaits cognitifs ou risque de dépendance ?", "question": "", "docs": ["Contrairement à l'idée reçue que les jeux vidéo rendent moins intelligents, de nombreuses études montrent le contraire. Les jeux de course améliorent le sens de l'orientation, la mémoire et la précision des mouvements. D'autres recherches indiquent des bénéfices pour la rapidité et la concentration. Certains jeux d'entraînement sont conçus pour renforcer la mémoire et la vivacité d'esprit chez les personnes âgées. En somme, les jeux vidéo peuvent avoir des effets positifs sur les capacités cognitives.", "Les jeux vidéo (console, ordinateur, à domicile ou en salle, seul, entre amis ou en ligne) peuvent entraîner une dépendance. L'addiction survient lorsque le jeu devient la principale (ou seule) source d'intérêt, au détriment des relations sociales, du travail, des études ou des loisirs. Ce phénomène est particulièrement préoccupant à l'adolescence, où l'impact peut nuire aux performances scolaires."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Août 2025", "Mai 2025"], "hasDocs": true}, {"id": 108, "month": "Août 2025", "year": 2025, "title": "Les bienfaits cognitifs des jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Août 2025", "Mai 2025"], "hasDocs": true}, {"id": 109, "month": "Août 2025", "year": 2025, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 110, "month": "Juillet 2025", "year": 2025, "title": "Chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Novembre 2025", "Août 2025", "Juillet 2025"], "hasDocs": true}, {"id": 111, "month": "Juillet 2025", "year": 2025, "title": "Les produits faits maison : un choix judicieux ou un risque ?", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Juillet 2025", "Avril 2025"], "hasDocs": true}, {"id": 112, "month": "Juillet 2025", "year": 2025, "title": "La livraison de repas au bureau : pratique ou problématique ?", "question": "", "docs": ["La livraison de repas représente un gain de temps appréciable, notamment pour les personnes actives. On peut se faire livrer directement sur son lieu de travail, ce qui évite de se déplacer pendant la pause déjeuner, optimise l'emploi du temps et permet de rentrer plus tôt. Ce service offre une grande variété de choix : chacun commande ce qu'il souhaite, même dans des restaurants différents, ce qui évite les désaccords. Autre avantage : la disponibilité permanente (certains établissements ouverts 24h/24).\n   - Doc 2 (Ahmed) : La livraison de repas séduit de plus en plus, en particulier ceux qui manquent de temps ou ne veulent pas cuisiner. Cependant, ce service a un impact environnemental non négligeable : les livraisons sont souvent faites en scooter ou en voiture, des moyens de transport polluants. Ce mode de consommation peut aussi nuire à la vie sociale : recevoir ses repas au bureau ou à domicile pousse à rester à l'intérieur et à limiter ses interactions. Or sortir, prendre l'air et rencontrer d'autres personnes reste essentiel pour le bien-être."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Juillet 2025"], "hasDocs": true}, {"id": 113, "month": "Juillet 2025", "year": 2025, "title": "Caméras de surveillance : utile ou excessive ?", "question": "", "docs": ["De nos jours, les caméras de surveillance se multiplient dans les villes. Elles sont appréciées par de nombreux Français, car elles apportent plus de sécurité. Selon une enquête, 75 % des personnes sont pour leur utilisation. La majorité accepte d'être filmée dans les espaces publics, mais pas dans les entreprises.", "Selon certaines recherches, la vidéosurveillance est onéreuse et peu performante. Les caméras sont souvent repérées, ce qui limite leur efficacité contre les infractions comme le vol ou la violence. En plus, leur utilisation demande des ressources humaines importantes. Une étude en Allemagne montre qu'il faut jusqu'à sept personnes pour surveiller une seule caméra."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Juillet 2025", "Avril 2025"], "hasDocs": true}, {"id": 114, "month": "Juin 2025", "year": 2025, "title": "La colocation : entre avantages et inconvénients", "question": "", "docs": ["Vivre en colocation peut être une belle expérience humaine. Avec un ami ou une personne qu'on apprend à connaître, cela permet de créer de nouveaux liens, de partager des moments agréables en rentrant le soir (discuter autour d'un repas, regarder un film). C'est aussi un bon moyen de se répartir les tâches ménagères et de bénéficier des compétences de chacun (cuisine, bricolage).", "Vivre en colocation est très différent de la vie en famille. Chacun a son rythme, sa personnalité et ses priorités, ce qui peut compliquer la cohabitation. Si le courant ne passe pas avec le colocataire, cela devient vite difficile. Les conflits surviennent souvent à cause du non-respect des tâches partagées ou du manque d'intimité. Le bruit peut aussi poser problème (un colocataire qui joue aux jeux vidéo tard la nuit)."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Avril 2025"], "hasDocs": true}, {"id": 115, "month": "Juin 2025", "year": 2025, "title": "Photo sur le CV : pour ou contre ?", "question": "", "docs": ["Certains candidats mettent une photo sur leur CV, d'autres préfèrent ne pas en mettre. Il faudrait interdire cette pratique pour éviter toute discrimination. Selon une étude de spécialistes du recrutement, la photo n'a pas de réelle utilité : les employeurs accordent plus d'attention à l'expérience professionnelle (32 %) et aux diplômes (15 %) qu'au physique. Seuls 2 % des recruteurs commencent par regarder la photo, ce qui est surprenant compte tenu de l'importance donnée à l'apparence.", "L'utilisation d'une photo sur le CV divise les recruteurs. Certains estiment qu'elle aide à se faire une idée du candidat avant la rencontre et facilite la mémorisation quand beaucoup de CV sont reçus. D'autres pensent que tout dépend du métier : pour les postes liés à l'accueil, la photo peut être appropriée. Cependant, elle doit toujours être professionnelle pour créer une impression positive."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Août 2025", "Juin 2025"], "hasDocs": true}, {"id": 116, "month": "Juin 2025", "year": 2025, "title": "L'aide aux personnes en difficulté", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Mars 2025"], "hasDocs": true}, {"id": 117, "month": "Mai 2025", "year": 2025, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 118, "month": "Mai 2025", "year": 2025, "title": "Les bienfaits cognitifs des jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Août 2025", "Mai 2025"], "hasDocs": true}, {"id": 119, "month": "Mai 2025", "year": 2025, "title": "Les zoos : conservation ou prisons pour animaux ?", "question": "", "docs": ["Les animaux sauvages ne doivent pas vivre dans les zoos, car ce n'est pas leur milieu naturel. Les zoos ressemblent à des prisons. Il y a même des ours polaires dans des endroits trop chauds. Les animaux doivent rester libres, dans la nature.", "Les zoos ont beaucoup d'avantages. Ils aident à protéger les animaux en voie de disparition. Les animaux y sont bien soignés. Grâce aux zoos, il y a plus de naissances et cela peut sauver certaines espèces."], "theme": "Animaux", "freq": 1, "appearances": ["Mai 2025"], "hasDocs": true}, {"id": 120, "month": "Mai 2025", "year": 2025, "title": "Les jeux vidéo : bienfaits cognitifs ou risque de dépendance ?", "question": "", "docs": ["Contrairement à l'idée reçue que les jeux vidéo rendent moins intelligents, de nombreuses études montrent le contraire. Les jeux de course améliorent le sens de l'orientation, la mémoire et la précision des mouvements. D'autres recherches indiquent des bénéfices pour la rapidité et la concentration. Certains jeux d'entraînement sont conçus pour renforcer la mémoire et la vivacité d'esprit chez les personnes âgées. En somme, les jeux vidéo peuvent avoir des effets positifs sur les capacités cognitives.", "Les jeux vidéo (console, ordinateur, à domicile ou en salle, seul, entre amis ou en ligne) peuvent entraîner une dépendance. L'addiction survient lorsque le jeu devient la principale (ou seule) source d'intérêt, au détriment des relations sociales, du travail, des études ou des loisirs. Ce phénomène est particulièrement préoccupant à l'adolescence, où l'impact peut nuire aux performances scolaires."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Août 2025", "Mai 2025"], "hasDocs": true}, {"id": 121, "month": "Avril 2025", "year": 2025, "title": "Impact des jeux vidéo sur les enfants", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 122, "month": "Avril 2025", "year": 2025, "title": "Uniforme scolaire", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 2, "appearances": ["Avril 2025", "Décembre 2024"], "hasDocs": true}, {"id": 123, "month": "Avril 2025", "year": 2025, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 124, "month": "Avril 2025", "year": 2025, "title": "La colocation : entre avantages et inconvénients", "question": "", "docs": ["Vivre en colocation peut être une belle expérience humaine. Avec un ami ou une personne qu'on apprend à connaître, cela permet de créer de nouveaux liens, de partager des moments agréables en rentrant le soir (discuter autour d'un repas, regarder un film). C'est aussi un bon moyen de se répartir les tâches ménagères et de bénéficier des compétences de chacun (cuisine, bricolage).", "Vivre en colocation est très différent de la vie en famille. Chacun a son rythme, sa personnalité et ses priorités, ce qui peut compliquer la cohabitation. Si le courant ne passe pas avec le colocataire, cela devient vite difficile. Les conflits surviennent souvent à cause du non-respect des tâches partagées ou du manque d'intimité. Le bruit peut aussi poser problème (un colocataire qui joue aux jeux vidéo tard la nuit)."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Avril 2025"], "hasDocs": true}, {"id": 125, "month": "Avril 2025", "year": 2025, "title": "La question de la consommation de viande", "question": "", "docs": ["Je suis opposé à la consommation de viande. D'un point de vue éthique, tous les animaux méritent de vivre librement, et l'élevage industriel entraîne souvent des conditions de vie cruelles. Sur le plan environnemental, la production de viande génère beaucoup de gaz à effet de serre et consomme d'énormes ressources en terres et en eau, ce qui accélère le changement climatique et la déforestation.\n   - Doc 2 (Alain) : La consommation de viande reste justifiée, car elle fournit des nutriments essentiels comme les protéines, les vitamines B, le fer et le zinc. Bien qu'on puisse les trouver dans des sources végétales, ils sont souvent mieux assimilés depuis la viande. De plus, la viande joue un rôle clé dans de nombreuses cultures et traditions culinaires. Toutefois, il faut choisir de la viande issue de pratiques d'élevage responsables, respectueuses de l'environnement et du bien-être animal."], "theme": "Santé / Bien-être", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 126, "month": "Avril 2025", "year": 2025, "title": "Végétarisme : un choix à réfléchir", "question": "", "docs": ["Le végétarisme offre plusieurs bénéfices. Il contribue à une meilleure santé en réduisant les risques de maladies (problèmes cardiaques) grâce aux fruits et légumes. Il joue un rôle dans la protection de l'environnement en réduisant la pollution liée à la production de viande. Enfin, il permet de respecter les animaux, un principe de plus en plus soutenu par les Européens.", "Le végétarisme ne convient pas à tout le monde. Certaines personnes ont besoin de viande pour obtenir des nutriments essentiels (fer, protéines). Les habitudes alimentaires traditionnelles en Europe incluent souvent la viande, ce qui rend le changement difficile. Adopter un régime végétarien peut demander plus de temps et de connaissances pour équilibrer les repas, ce qui n'est pas pratique pour tous."], "theme": "Santé / Bien-être", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 127, "month": "Avril 2025", "year": 2025, "title": "L'impact des grands événements sportifs", "question": "", "docs": ["L'organisation d'événements sportifs majeurs (Jeux Olympiques, Coupe du Monde, Coupe d'Afrique) est une opportunité exceptionnelle. C'est une occasion de promouvoir notre culture à l'échelle mondiale et de capter l'attention internationale. De plus, ces compétitions stimulent l'économie locale par la création d'emplois et la modernisation des infrastructures, avec des bénéfices durables pour toute la population.", "Organiser de grands événements sportifs engendre des coûts importants pour l'État. Il serait plus judicieux d'investir les fonds publics en priorité dans la santé et l'éducation. L'expérience montre que ces compétitions peuvent endetter les pays hôtes sans apporter de bénéfices concrets à la population."], "theme": "Santé / Bien-être", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 128, "month": "Avril 2025", "year": 2025, "title": "Interdiction de la circulation en zones urbaines", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 2, "appearances": ["Avril 2025", "Janvier 2025"], "hasDocs": true}, {"id": 129, "month": "Avril 2025", "year": 2025, "title": "Les menus sans viande dans les cantines scolaires", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Mai 2026", "Avril 2025", "Janvier 2025", "Octobre 2024"], "hasDocs": true}, {"id": 130, "month": "Avril 2025", "year": 2025, "title": "Les vols à bas prix", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Avril 2025", "Janvier 2025", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 131, "month": "Avril 2025", "year": 2025, "title": "Caméras de surveillance à l'école : pour ou contre ?", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 2, "appearances": ["Avril 2026", "Avril 2025"], "hasDocs": true}, {"id": 132, "month": "Avril 2025", "year": 2025, "title": "Impact des vêtements de marque sur les enfants", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 2, "appearances": ["Août 2025", "Avril 2025"], "hasDocs": true}, {"id": 133, "month": "Avril 2025", "year": 2025, "title": "Réduction du temps de travail", "question": "", "docs": ["Réduire le temps de travail aide les employés à trouver un meilleur équilibre entre vie professionnelle et personnelle. Avec plus de temps libre, ils consacrent davantage de moments à leur famille, leurs loisirs et leur santé. Cela améliore la satisfaction au travail, diminue le stress et augmente l'efficacité globale.", "Réduire les heures de travail peut aider les entreprises en réduisant l'absentéisme et en augmentant la fidélisation. Avec des horaires plus flexibles, les employés sont plus motivés et impliqués. Cependant, cela nécessite une organisation efficace et une adaptation des processus pour maintenir la productivité et répondre aux besoins de l'entreprise."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Août 2025", "Avril 2025", "Novembre 2024"], "hasDocs": true}, {"id": 134, "month": "Avril 2025", "year": 2025, "title": "Les enfants face aux nouvelles technologies", "question": "", "docs": ["Les élèves du primaire ont la possibilité d'utiliser la technologie pour chercher des vidéos liées à leurs leçons étudiées en classe ou pour s'exercer avec des jeux qui développent leurs compétences en mathématiques, en lecture et en saisie au clavier.", "Aujourd'hui, les technologies poussent les enfants à rester inactifs, ce qui inquiète beaucoup les parents. Cela limite les jeux créatifs, les échanges sociaux directs et l'activité physique. Pourquoi ne pas encourager vos enfants à poser leurs appareils en essayant des activités ludiques ?"], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 135, "month": "Avril 2025", "year": 2025, "title": "L'agrandissement des villes", "question": "", "docs": ["De nos jours, les villes s'agrandissent sans cesse, ce qui affecte l'environnement. Plus une ville se développe, plus ses effets sur la nature et sur l'homme sont néfastes. L'un des exemples les plus visibles est la déforestation. Les arbres et les espaces verts retiennent le carbone. Quand ils sont abattus pour construire des immeubles ou des routes, on détruit des zones importantes pour le stockage du carbone.", "Plus de la moitié des habitants de la planète vivent dans des villes, et dans les pays riches, huit habitants sur dix sont citadins. La vie urbaine constitue donc un enjeu écologique majeur. On affirme souvent que les villes ne respectent pas l'environnement et que leur développement augmente la pollution. Cependant, il faut relativiser : un habitant de la ville consomme souvent moins d'énergie qu'une personne à la campagne."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 136, "month": "Avril 2025", "year": 2025, "title": "Les produits faits maison : un choix judicieux ou un risque ?", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Juillet 2025", "Avril 2025"], "hasDocs": true}, {"id": 137, "month": "Avril 2025", "year": 2025, "title": "La chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Avril 2025", "Décembre 2022", "Novembre 2022"], "hasDocs": true}, {"id": 138, "month": "Avril 2025", "year": 2025, "title": "Faut-il se faire livrer les repas au travail ?", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 139, "month": "Avril 2025", "year": 2025, "title": "Caméras de surveillance : utile ou excessive ?", "question": "", "docs": ["De nos jours, les caméras de surveillance se multiplient dans les villes. Elles sont appréciées par de nombreux Français, car elles apportent plus de sécurité. Selon une enquête, 75 % des personnes sont pour leur utilisation. La majorité accepte d'être filmée dans les espaces publics, mais pas dans les entreprises.", "Selon certaines recherches, la vidéosurveillance est onéreuse et peu performante. Les caméras sont souvent repérées, ce qui limite leur efficacité contre les infractions comme le vol ou la violence. En plus, leur utilisation demande des ressources humaines importantes. Une étude en Allemagne montre qu'il faut jusqu'à sept personnes pour surveiller une seule caméra."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Juillet 2025", "Avril 2025"], "hasDocs": true}, {"id": 140, "month": "Avril 2025", "year": 2025, "title": "Livraison de repas", "question": "", "docs": ["La livraison de repas représente un gain de temps appréciable, notamment pour les personnes actives. On peut se faire livrer directement sur son lieu de travail, ce qui évite de se déplacer pendant la pause déjeuner, optimise l'emploi du temps et permet de rentrer plus tôt. Ce service offre une grande variété de choix : chacun commande ce qu'il souhaite, même dans des restaurants différents, ce qui évite les désaccords. Autre avantage : la disponibilité permanente (certains établissements ouverts 24h/24).\n   - Doc 2 (Ahmed) : La livraison de repas séduit de plus en plus, en particulier ceux qui manquent de temps ou ne veulent pas cuisiner. Cependant, ce service a un impact environnemental non négligeable : les livraisons sont souvent faites en scooter ou en voiture, des moyens de transport polluants. Ce mode de consommation
