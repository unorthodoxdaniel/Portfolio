 peut aussi nuire à la vie sociale : recevoir ses repas au bureau ou à domicile pousse à rester à l'intérieur et à limiter ses interactions. Or sortir, prendre l'air et rencontrer d'autres personnes reste essentiel pour le bien-être."], "theme": "Alimentation / Cuisine", "freq": 1, "appearances": ["Avril 2025"], "hasDocs": true}, {"id": 141, "month": "Mars 2025", "year": 2025, "title": "Distributeurs automatiques dans les écoles", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 2, "appearances": ["Mars 2025", "Janvier 2025"], "hasDocs": true}, {"id": 142, "month": "Mars 2025", "year": 2025, "title": "Photo sur le CV", "question": "", "docs": ["Certains candidats mettent une photo sur leur CV, d'autres préfèrent ne pas en mettre. Il faudrait interdire cette pratique pour éviter toute discrimination. Selon une étude de spécialistes du recrutement, la photo n'a pas de réelle utilité : les employeurs accordent plus d'attention à l'expérience professionnelle (32 %) et aux diplômes (15 %) qu'au physique. Seuls 2 % des recruteurs commencent par regarder la photo, ce qui est surprenant compte tenu de l'importance donnée à l'apparence.", "L'utilisation d'une photo sur le CV divise les recruteurs. Certains estiment qu'elle aide à se faire une idée du candidat avant la rencontre et facilite la mémorisation quand beaucoup de CV sont reçus. D'autres pensent que tout dépend du métier : pour les postes liés à l'accueil, la photo peut être appropriée. Cependant, elle doit toujours être professionnelle pour créer une impression positive."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 143, "month": "Mars 2025", "year": 2025, "title": "Vivre en colocation", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Mars 2025", "Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 144, "month": "Mars 2025", "year": 2025, "title": "L'aide aux personnes en difficulté", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 3, "appearances": ["Août 2025", "Juin 2025", "Mars 2025"], "hasDocs": true}, {"id": 145, "month": "Mars 2025", "year": 2025, "title": "Les billets d'avion à prix réduits", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Voyage / Tourisme", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 146, "month": "Mars 2025", "year": 2025, "title": "Faire ses courses : épiceries locales ou supermarchés ?", "question": "", "docs": ["Faire ses courses au supermarché est avantageux, puisqu'on y trouve une grande diversité de produits au même endroit. Vous pouvez garer votre voiture et passer d'un rayon à l'autre pour acheter ce dont vous avez besoin : fruits, légumes, fromages, viandes, boissons. De plus, plusieurs marques sont proposées pour chaque produit, avec des offres promotionnelles régulières.\n   - Doc 2 (Association pour la défense des commerces de proximité) : L'initiative « Février sans supermarché » vise à limiter le pouvoir des supermarchés et à soutenir la survie des petits commerces en améliorant leurs ventes. Le principe : ne pas faire ses courses dans les grandes surfaces durant un mois et privilégier les épiceries de quartier. Les clients en retirent des avantages : produits plus frais et de qualité, et moments d'échange avec leurs voisins."], "theme": "Éducation / École", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 147, "month": "Mars 2025", "year": 2025, "title": "Sévérité parentale : atout ou frein ?", "question": "", "docs": [], "theme": "Famille / Enfants", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": false}, {"id": 148, "month": "Mars 2025", "year": 2025, "title": "Les produits faits maison", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Mars 2025", "Novembre 2024"], "hasDocs": true}, {"id": 149, "month": "Mars 2025", "year": 2025, "title": "Écoles privées ou publiques : quel choix faire ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 150, "month": "Mars 2025", "year": 2025, "title": "Les devoirs à domicile : atout ou contrainte ?", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 151, "month": "Mars 2025", "year": 2025, "title": "Les nouvelles technologies à l'école : atout ou risque ?", "question": "", "docs": ["Je suis persuadé que l'intégration des nouvelles technologies dans les écoles est essentielle pour préparer les élèves à l'avenir numérique. L'utilisation des tablettes et ordinateurs motive les élèves et enrichit leur expérience d'apprentissage en leur donnant accès à diverses ressources, favorisant ainsi leur créativité et leur autonomie.\n   - Doc 2 (Inès) : Je reste dubitative face à l'utilisation excessive des technologies dans l'éducation. Cela peut limiter les interactions humaines et entraîner une dépendance aux écrans. À mon avis, les méthodes traditionnelles et le contact direct entre enseignants et élèves sont essentiels pour un développement équilibré des compétences des jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 152, "month": "Mars 2025", "year": 2025, "title": "L'attrait des grandes marques vestimentaires", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 153, "month": "Mars 2025", "year": 2025, "title": "Les animaux de compagnie sont-ils bénéfiques pour les enfants ?", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 154, "month": "Mars 2025", "year": 2025, "title": "Les bienfaits de la lecture pour les plus jeunes", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 1, "appearances": ["Mars 2025"], "hasDocs": true}, {"id": 155, "month": "Février 2025", "year": 2025, "title": "Location courte durée", "question": "", "docs": ["Offrant flexibilité et confort, la location courte durée est une option pratique pour les voyageurs. Elle permet de louer un logement pour un temps limité, idéal pour des vacances ou des déplacements professionnels, avec un hébergement adapté aux besoins spécifiques et sans engagement à long terme.", "Dans les zones touristiques, la location courte durée peut être coûteuse et la disponibilité restreinte, surtout en haute affluence. Il est donc essentiel de planifier à l'avance et de réserver pour obtenir les meilleures options."], "theme": "Logement / Ville", "freq": 2, "appearances": ["Février 2025", "Décembre 2024"], "hasDocs": true}, {"id": 156, "month": "Février 2025", "year": 2025, "title": "Le cyclisme urbain", "question": "", "docs": ["Le vélo évoque le sport et les loisirs, mais on oublie qu'il est avant tout un moyen de déplacement quotidien, personnel comme professionnel. En milieu urbain, il est rapide et apaisant, offrant une échappatoire au trafic saturé aux heures de pointe. Une solution idéale pour allier activité physique et déplacements utiles.", "Circuler à vélo en ville comporte des risques, comme en témoignent les accidents routiers annuels. La forte concentration de véhicules, les manquements aux règles et l'insuffisance des infrastructures cyclables créent un environnement dangereux. S'y ajoute l'exposition aux polluants atmosphériques (monoxyde de carbone) aux effets toxiques avérés. Le cyclisme urbain soulève une double problématique : sécuritaire et sanitaire."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 157, "month": "Février 2025", "year": 2025, "title": "L'enseignement à domicile", "question": "", "docs": ["Les raisons de choisir la scolarisation à domicile sont multiples : approche pédagogique personnalisée, plus de temps pour les difficultés de l'enfant, activités ludiques. L'enfant gère son apprentissage à son rythme, approfondit ce qui le passionne et ne subit pas la pression des progrès inégaux des camarades. Autre avantage : absence de notes décourageantes, suivi continu, élimination du stress des évaluations et devoirs.", "C'est un défi avec plusieurs inconvénients : investissement considérable en temps, organisation rigoureuse, coûts (matériel, livres, manuels, sorties éducatives), souvent l'arrêt de l'activité professionnelle d'un parent. L'école à domicile revient généralement plus cher que le public. De plus, l'enfant ne côtoie pas quotidiennement des camarades, ce qui limite ses interactions sociales."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 158, "month": "Février 2025", "year": 2025, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Février 2025", "Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 159, "month": "Février 2025", "year": 2025, "title": "L'utilisation du plastique : faut-il continuer à l'utiliser ?", "question": "", "docs": ["Défend une utilisation restreinte du plastique, soulignant son importance dans l'alimentation et la médecine (conservation des produits alimentaires, stérilisation des équipements médicaux). Il prône une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 160, "month": "Février 2025", "year": 2025, "title": "Choix entre manger à l'extérieur ou chez soi", "question": "", "docs": ["Préfère dîner à l'extérieur plutôt que manger seule. Elle apprécie de sortir à tout moment à Lyon et de partager des repas conviviaux avec ses amis, impossible dans son petit appartement. Elle note que peu de gens de sa génération prennent le temps de cuisiner.\n   - Doc 2 (Laura, mère de famille, 45 ans) : Manger au restaurant est souvent trop coûteux pour elle. Le budget familial l'en empêche, même si elle aimerait parfois éviter la cuisine. Elle critique aussi la qualité des plats au restaurant et préfère savoir exactement ce qu'elle mange en cuisinant chez elle.\n\n*Thèmes déjà présents (références) :*"], "theme": "Alimentation / Cuisine", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 161, "month": "Février 2025", "year": 2025, "title": "Nouvelles technologies en milieu scolaire", "question": "", "docs": ["Je suis persuadé que l'intégration des nouvelles technologies dans les écoles est essentielle pour préparer les élèves à l'avenir numérique. L'utilisation des tablettes et ordinateurs motive les élèves et enrichit leur expérience d'apprentissage en leur donnant accès à diverses ressources, favorisant ainsi leur créativité et leur autonomie.\n   - Doc 2 (Inès) : Je reste dubitative face à l'utilisation excessive des technologies dans l'éducation. Cela peut limiter les interactions humaines et entraîner une dépendance aux écrans. À mon avis, les méthodes traditionnelles et le contact direct entre enseignants et élèves sont essentiels pour un développement équilibré des compétences des jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 162, "month": "Février 2025", "year": 2025, "title": "Travaux scolaires à domicile / devoirs", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 163, "month": "Février 2025", "year": 2025, "title": "École privée ou publique", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 164, "month": "Février 2025", "year": 2025, "title": "Produits maison", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 165, "month": "Février 2025", "year": 2025, "title": "Caméras de surveillance dans les écoles", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 166, "month": "Février 2025", "year": 2025, "title": "Tenue uniforme à l'école", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 167, "month": "Février 2025", "year": 2025, "title": "Habits de marques réputées", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 168, "month": "Février 2025", "year": 2025, "title": "L'art urbain", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 2, "appearances": ["Octobre 2025", "Février 2025"], "hasDocs": true}, {"id": 169, "month": "Février 2025", "year": 2025, "title": "Les objets intelligents", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 170, "month": "Février 2025", "year": 2025, "title": "Accès gratuit aux musées", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 171, "month": "Février 2025", "year": 2025, "title": "Restauration express/rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Autre", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 172, "month": "Février 2025", "year": 2025, "title": "Cours de langues en ligne", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 173, "month": "Février 2025", "year": 2025, "title": "Animaux de compagnie pour enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 3, "appearances": ["Février 2026", "Décembre 2025", "Février 2025"], "hasDocs": true}, {"id": 174, "month": "Février 2025", "year": 2025, "title": "Producteurs locaux ou supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Août 2025", "Février 2025"], "hasDocs": true}, {"id": 175, "month": "Février 2025", "year": 2025, "title": "Rôle de la télévision dans l'éducation", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 1, "appearances": ["Février 2025"], "hasDocs": true}, {"id": 176, "month": "Février 2025", "year": 2025, "title": "Livraison des repas au bureau", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 177, "month": "Février 2025", "year": 2025, "title": "Cuisinier amateur ou professionnel", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Février 2025", "Janvier 2025", "Novembre 2024"], "hasDocs": true}, {"id": 178, "month": "Février 2025", "year": 2025, "title": "Vivre en colocation", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Mars 2025", "Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 179, "month": "Février 2025", "year": 2025, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 180, "month": "Février 2025", "year": 2025, "title": "Les relations amicales au travail", "question": "", "docs": ["Les amitiés entre collègues peuvent être très avantageuses. Elles contribuent à instaurer un environnement de travail agréable et une atmosphère positive. Avoir des amis parmi ses collègues solidifie les relations professionnelles et instaure un esprit de camaraderie. Cela peut améliorer la communication, favoriser une collaboration plus étroite et faciliter la résolution des problèmes. Partager des moments conviviaux en dehors du bureau (déjeuners, sorties) renforce les liens et crée une dynamique de groupe forte.", "Il est essentiel de trouver un juste équilibre entre amitié et professionnalisme. Des amitiés trop proches peuvent engendrer des tensions ou des conflits, surtout lors de décisions professionnelles. Des amitiés exclusives peuvent marginaliser les autres, ce qui affecte la cohésion de l'équipe. Il est donc crucial de poser des limites claires et de s'assurer que les amitiés ne compromettent pas le professionnalisme, la hiérarchie ou la productivité."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 181, "month": "Février 2025", "year": 2025, "title": "L'éducation des enfants", "question": "", "docs": ["« J'ai 19 ans et j'habite toujours chez mes parents. Je suis majeure et responsable mais mes parents restent sévères avec moi. Jusqu'à 18 ans, quand je sortais, je devais rentrer avant 20 h et je n'avais pas le droit de dormir chez mes amies. Même si aujourd'hui j'ai le droit de rentrer plus tard, ma mère s'inquiète encore. Elle m'appelle pour me demander où je suis et n'arrive pas à dormir avant mon retour. Mes parents me laissent de la liberté mais j'en ai moins que les autres. »", "Certains parents qui ne veulent pas être trop sévères ont peu de contrôle sur leurs enfants. Ils ont peur que leurs enfants, privés de liberté, soient malheureux et manquent de personnalité. Ces parents acceptent donc toutes les demandes. Cette situation aura peu de conséquences jusqu'à l'adolescence. Cependant, à l'âge adulte, ils auront des difficultés à vivre en société car ils auront du mal à accepter les règles."], "theme": "Éducation / École", "freq": 2, "appearances": ["Mars 2026", "Février 2025"], "hasDocs": true}, {"id": 182, "month": "Janvier 2025", "year": 2025, "title": "Les vols à bas prix", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Avril 2025", "Janvier 2025", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 183, "month": "Janvier 2025", "year": 2025, "title": "Les menus sans viande dans les cantines scolaires", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Mai 2026", "Avril 2025", "Janvier 2025", "Octobre 2024"], "hasDocs": true}, {"id": 184, "month": "Janvier 2025", "year": 2025, "title": "Interdiction de la circulation en zones urbaines", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 2, "appearances": ["Avril 2025", "Janvier 2025"], "hasDocs": true}, {"id": 185, "month": "Janvier 2025", "year": 2025, "title": "L'aide aux personnes pauvres / en difficulté", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 2, "appearances": ["Janvier 2025", "Juin 2024"], "hasDocs": true}, {"id": 186, "month": "Janvier 2025", "year": 2025, "title": "Vivre en colocation : avantages et inconvénients", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 187, "month": "Janvier 2025", "year": 2025, "title": "Cuisinier amateur ou professionnel ?", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Février 2025", "Janvier 2025", "Novembre 2024"], "hasDocs": true}, {"id": 188, "month": "Janvier 2025", "year": 2025, "title": "Distributeurs automatiques dans les écoles", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 2, "appearances": ["Mars 2025", "Janvier 2025"], "hasDocs": true}, {"id": 189, "month": "Janvier 2025", "year": 2025, "title": "Manger au restaurant ou cuisiner chez soi ?", "question": "", "docs": ["Préfère dîner à l'extérieur plutôt que manger seule. Elle apprécie de sortir à tout moment à Lyon et de partager des repas conviviaux avec ses amis, impossible dans son petit appartement. Elle note que peu de gens de sa génération prennent le temps de cuisiner.\n   - Doc 2 (Laura, mère de famille, 45 ans) : Manger au restaurant est souvent trop coûteux pour elle. Le budget familial l'en empêche, même si elle aimerait parfois éviter la cuisine. Elle critique aussi la qualité des plats au restaurant et préfère savoir exactement ce qu'elle mange en cuisinant chez elle.\n\n*Thèmes déjà présents (références) :*"], "theme": "Alimentation / Cuisine", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 190, "month": "Janvier 2025", "year": 2025, "title": "Livre papier ou livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 191, "month": "Janvier 2025", "year": 2025, "title": "L'impact / l'utilisation du plastique", "question": "", "docs": ["Défend une utilisation restreinte du plastique, soulignant son importance dans l'alimentation et la médecine (conservation des produits alimentaires, stérilisation des équipements médicaux). Il prône une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 192, "month": "Janvier 2025", "year": 2025, "title": "Les cours de langues en ligne", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 193, "month": "Janvier 2025", "year": 2025, "title": "Livraison de repas au bureau", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 194, "month": "Janvier 2025", "year": 2025, "title": "L'impact de la télévision sur l'éducation des enfants", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 195, "month": "Janvier 2025", "year": 2025, "title": "Faut-il rendre les musées gratuits ?", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Janvier 2025"], "hasDocs": true}, {"id": 196, "month": "Décembre 2024", "year": 2024, "title": "Les vêtements de marque : pour ou contre ?", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 4, "appearances": ["Décembre 2024", "Octobre 2023", "Septembre 2023", "Août 2023"], "hasDocs": true}, {"id": 197, "month": "Décembre 2024", "year": 2024, "title": "Uniforme scolaire", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 2, "appearances": ["Avril 2025", "Décembre 2024"], "hasDocs": true}, {"id": 198, "month": "Décembre 2024", "year": 2024, "title": "Caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Août 2025", "Décembre 2024", "Novembre 2024"], "hasDocs": true}, {"id": 199, "month": "Décembre 2024", "year": 2024, "title": "Location courte durée", "question": "", "docs": ["Offrant flexibilité et confort, la location courte durée est une option pratique pour les voyageurs. Elle permet de louer un logement pour un temps limité, idéal pour des vacances ou des déplacements professionnels, avec un hébergement adapté aux besoins spécifiques et sans engagement à long terme.", "Dans les zones touristiques, la location courte durée peut être coûteuse et la disponibilité restreinte, surtout en haute affluence. Il est donc essentiel de planifier à l'avance et de réserver pour obtenir les meilleures options."], "theme": "Logement / Ville", "freq": 2, "appearances": ["Février 2025", "Décembre 2024"], "hasDocs": true}, {"id": 200, "month": "Décembre 2024", "year": 2024, "title": "Rôle de la télévision dans l'éducation des enfants", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 2, "appearances": ["Décembre 2024", "Novembre 2024"], "hasDocs": true}, {"id": 201, "month": "Décembre 2024", "year": 2024, "title": "Vie en colocation entre adultes", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 1, "appearances": ["Décembre 2024"], "hasDocs": true}, {"id": 202, "month": "Décembre 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 203, "month": "Décembre 2024", "year": 2024, "title": "Limitation / interdiction des voitures dans les centres-villes", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Décembre 2024"], "hasDocs": true}, {"id": 204, "month": "Décembre 2024", "year": 2024, "title": "Les jeux vidéo : pour ou contre ?", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 205, "month": "Décembre 2024", "year": 2024, "title": "La gratuité des transports en commun : pour ou contre ?", "question": "", "docs": ["La gratuité des transports en commun est une initiative très positive. Elle permet de réduire le trafic automobile et de limiter les bouchons. Elle contribue aussi à diminuer la pollution et les risques pour la santé liés à l'air. Dans ma ville, où les transports sont gratuits, on constate une hausse de leur utilisation. Cette mesure a également favorisé le commerce local, car les habitants se rendent plus facilement au centre-ville pour leurs achats.", "À mon avis, cette mesure n'est pas appropriée. D'abord, la gratuité des transports représente un coût élevé pour les villes, et certaines, comme Toulouse, ont d'autres priorités, par exemple l'aménagement des espaces verts. Ensuite, il vaudrait mieux améliorer la desserte des transports publics plutôt que de les rendre gratuits, car certains quartiers en sont mal équipés. Enfin, garder les transports payants encourage les usagers à mieux respecter les installations, puisqu'ils financent leur fonctionnement."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Décembre 2024", "Septembre 2024", "Décembre 2023"], "hasDocs": true}, {"id": 206, "month": "Décembre 2024", "year": 2024, "title": "Les distributeurs de boissons dans les lycées", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 1, "appearances": ["Décembre 2024"], "hasDocs": true}, {"id": 207, "month": "Décembre 2024", "year": 2024, "title": "Les devoirs à la maison", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 7, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2023", "Août 2023", "Avril 2023", "Janvier 2022"], "hasDocs": true}, {"id": 208, "month": "Décembre 2024", "year": 2024, "title": "La sévérité des parents envers leurs enfants", "question": "", "docs": ["« J'ai 19 ans et j'habite toujours chez mes parents. Je suis majeure et responsable mais mes parents restent sévères avec moi. Jusqu'à 18 ans, quand je sortais, je devais rentrer avant 20 h et je n'avais pas le droit de dormir chez mes amies. Même si aujourd'hui j'ai le droit de rentrer plus tard, ma mère s'inquiète encore. Elle m'appelle pour me demander où je suis et n'arrive pas à dormir avant mon retour. Mes parents me laissent de la liberté mais j'en ai moins que les autres. »", "Certains parents qui ne veulent pas être trop sévères ont peu de contrôle sur leurs enfants. Ils ont peur que leurs enfants, privés de liberté, soient malheureux et manquent de personnalité. Ces parents acceptent donc toutes les demandes. Cette situation aura peu de conséquences jusqu'à l'adolescence. Cependant, à l'âge adulte, ils auront des difficultés à vivre en société car ils auront du mal à accepter les règles."], "theme": "Famille / Enfants", "freq": 4, "appearances": ["Décembre 2024", "Septembre 2023", "Août 2023", "Avril 2023"], "hasDocs": true}, {"id": 209, "month": "Novembre 2024", "year": 2024, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 210, "month": "Novembre 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 211, "month": "Novembre 2024", "year": 2024, "title": "Nouvelles technologies dans les écoles", "question": "", "docs": ["Je suis persuadé que l'intégration des nouvelles technologies dans les écoles est essentielle pour préparer les élèves à l'avenir numérique. L'utilisation des tablettes et ordinateurs motive les élèves et enrichit leur expérience d'apprentissage en leur donnant accès à diverses ressources, favorisant ainsi leur créativité et leur autonomie.\n   - Doc 2 (Inès) : Je reste dubitative face à l'utilisation excessive des technologies dans l'éducation. Cela peut limiter les interactions humaines et entraîner une dépendance aux écrans. À mon avis, les méthodes traditionnelles et le contact direct entre enseignants et élèves sont essentiels pour un développement équilibré des compétences des jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Novembre 2024"], "hasDocs": true}, {"id": 212, "month": "Novembre 2024", "year": 2024, "title": "Les devoirs à la maison", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 7, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2023", "Août 2023", "Avril 2023", "Janvier 2022"], "hasDocs": true}, {"id": 213, "month": "Novembre 2024", "year": 2024, "title": "Écoles privées ou publiques ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Éducation / École", "freq": 1, "appearances": ["Novembre 2024"], "hasDocs": true}, {"id": 214, "month": "Novembre 2024", "year": 2024, "title": "Les produits faits maison", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Alimentation / Cuisine", "freq": 2, "appearances": ["Mars 2025", "Novembre 2024"], "hasDocs": true}, {"id": 215, "month": "Novembre 2024", "year": 2024, "title": "Les vêtements de grande marque", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 2, "appearances": ["Novembre 2024", "Mai 2023"], "hasDocs": true}, {"id": 216, "month": "Novembre 2024", "year": 2024, "title": "Caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Août 2025", "Décembre 2024", "Novembre 2024"], "hasDocs": true}, {"id": 217, "month": "Novembre 2024", "year": 2024, "title": "Réduction du temps de travail", "question": "", "docs": ["Réduire le temps de travail aide les employés à trouver un meilleur équilibre entre vie professionnelle et personnelle. Avec plus de temps libre, ils consacrent davantage de moments à leur famille, leurs loisirs et leur santé. Cela améliore la satisfaction au travail, diminue le stress et augmente l'efficacité globale.", "Réduire les heures de travail peut aider les entreprises en réduisant l'absentéisme et en augmentant la fidélisation. Avec des horaires plus flexibles, les employés sont
