plus motivés et impliqués. Cependant, cela nécessite une organisation efficace et une adaptation des processus pour maintenir la productivité et répondre aux besoins de l'entreprise."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Août 2025", "Avril 2025", "Novembre 2024"], "hasDocs": true}, {"id": 218, "month": "Novembre 2024", "year": 2024, "title": "Les grands événements sportifs", "question": "", "docs": ["L'organisation d'événements sportifs majeurs (Jeux Olympiques, Coupe du Monde, Coupe d'Afrique) est une opportunité exceptionnelle. C'est une occasion de promouvoir notre culture à l'échelle mondiale et de capter l'attention internationale. De plus, ces compétitions stimulent l'économie locale par la création d'emplois et la modernisation des infrastructures, avec des bénéfices durables pour toute la population.", "Organiser de grands événements sportifs engendre des coûts importants pour l'État. Il serait plus judicieux d'investir les fonds publics en priorité dans la santé et l'éducation. L'expérience montre que ces compétitions peuvent endetter les pays hôtes sans apporter de bénéfices concrets à la population."], "theme": "Santé / Bien-être", "freq": 1, "appearances": ["Novembre 2024"], "hasDocs": true}, {"id": 219, "month": "Novembre 2024", "year": 2024, "title": "Livraison des repas au bureau", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 220, "month": "Novembre 2024", "year": 2024, "title": "Rôle de la télévision dans l'éducation des enfants", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 2, "appearances": ["Décembre 2024", "Novembre 2024"], "hasDocs": true}, {"id": 221, "month": "Novembre 2024", "year": 2024, "title": "Cuisinier amateur ou professionnel ?", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Février 2025", "Janvier 2025", "Novembre 2024"], "hasDocs": true}, {"id": 222, "month": "Novembre 2024", "year": 2024, "title": "Vivre en colocation", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Mars 2025", "Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 223, "month": "Novembre 2024", "year": 2024, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 224, "month": "Novembre 2024", "year": 2024, "title": "Les relations amicales au travail", "question": "", "docs": ["Les amitiés entre collègues peuvent être très avantageuses. Elles contribuent à instaurer un environnement de travail agréable et une atmosphère positive. Avoir des amis parmi ses collègues solidifie les relations professionnelles et instaure un esprit de camaraderie. Cela peut améliorer la communication, favoriser une collaboration plus étroite et faciliter la résolution des problèmes. Partager des moments conviviaux en dehors du bureau (déjeuners, sorties) renforce les liens et crée une dynamique de groupe forte.", "Il est essentiel de trouver un juste équilibre entre amitié et professionnalisme. Des amitiés trop proches peuvent engendrer des tensions ou des conflits, surtout lors de décisions professionnelles. Des amitiés exclusives peuvent marginaliser les autres, ce qui affecte la cohésion de l'équipe. Il est donc crucial de poser des limites claires et de s'assurer que les amitiés ne compromettent pas le professionnalisme, la hiérarchie ou la productivité."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Février 2025", "Novembre 2024"], "hasDocs": true}, {"id": 225, "month": "Novembre 2024", "year": 2024, "title": "L'interdiction des voitures en ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 9, "appearances": ["Mai 2026", "Février 2026", "Décembre 2025", "Novembre 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 226, "month": "Octobre 2024", "year": 2024, "title": "Les parcs zoologiques : pour ou contre ?", "question": "", "docs": ["Les animaux sauvages ne doivent pas vivre dans les zoos, car ce n'est pas leur milieu naturel. Les zoos ressemblent à des prisons. Il y a même des ours polaires dans des endroits trop chauds. Les animaux doivent rester libres, dans la nature.", "Les zoos ont beaucoup d'avantages. Ils aident à protéger les animaux en voie de disparition. Les animaux y sont bien soignés. Grâce aux zoos, il y a plus de naissances et cela peut sauver certaines espèces."], "theme": "Animaux", "freq": 5, "appearances": ["Octobre 2024", "Juillet 2024", "Décembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 227, "month": "Octobre 2024", "year": 2024, "title": "Jeux vidéo : abrutissants ou bénéfiques ?", "question": "", "docs": ["Beaucoup de gens pensent encore que les jeux vidéo nous rendent bêtes. Pourtant, de nombreuses études prouvent le contraire. Ainsi, selon l'une d'elles, les utilisateurs de jeux de course développeraient leur sens de l'orientation, leur mémoire et la précision de leurs mouvements. D'autres études montrent clairement une amélioration de la rapidité et de la concentration de tous les joueurs. Et c'est sans parler des jeux d'entraînement destinés aux personnes âgées pour consolider la mémoire et la vivacité d'esprit. Bref, c'est scientifique : le jeu vidéo rend plus intelligent !", "Les jeux vidéo — sur console ou ordinateur, chez soi ou en salle, seul, avec des amis ou en ligne avec des inconnus — peuvent provoquer une dépendance chez certaines personnes. On parle d'addiction quand le jeu vidéo devient le principal (ou l'unique) centre d'intérêt, au détriment d'autres activités (relationnelles, professionnelles, scolaires, loisirs, sport). Cette dépendance est particulièrement préoccupante à l'adolescence, période importante où les jeux vidéo peuvent avoir un impact négatif sur les résultats scolaires."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Octobre 2024"], "hasDocs": true}, {"id": 228, "month": "Octobre 2024", "year": 2024, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 229, "month": "Octobre 2024", "year": 2024, "title": "Les vols à bas prix / low-cost", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 2, "appearances": ["Octobre 2024", "Août 2024"], "hasDocs": true}, {"id": 230, "month": "Octobre 2024", "year": 2024, "title": "Les menus sans viande dans les cantines scolaires", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Mai 2026", "Avril 2025", "Janvier 2025", "Octobre 2024"], "hasDocs": true}, {"id": 231, "month": "Octobre 2024", "year": 2024, "title": "Limitation des voitures dans les centres-villes", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Octobre 2024"], "hasDocs": true}, {"id": 232, "month": "Octobre 2024", "year": 2024, "title": "La restauration rapide : pour ou contre ?", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 2, "appearances": ["Octobre 2024", "Septembre 2023"], "hasDocs": true}, {"id": 233, "month": "Octobre 2024", "year": 2024, "title": "L'uniforme scolaire", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 3, "appearances": ["Octobre 2024", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 234, "month": "Octobre 2024", "year": 2024, "title": "Égalité homme/femme en milieu de travail", "question": "", "docs": ["Certains postes sont majoritairement occupés par des hommes. Au Québec, l'égalité entre les femmes et les hommes est respectée : les femmes peuvent exercer les métiers réservés aux hommes, tels que les postes de direction.", "Malgré les efforts pour imposer la parité à tous les postes dans les entreprises et les collectivités, il existe, dans les faits, des métiers où les femmes sont largement majoritaires, comme celui de sage-femme. De plus, certains estiment que les femmes ne devraient pas faire les métiers d'hommes, car elles doivent prendre soin de leurs enfants."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Octobre 2024"], "hasDocs": true}, {"id": 235, "month": "Octobre 2024", "year": 2024, "title": "Le travail des étudiants pendant les vacances : pour ou contre ?", "question": "", "docs": ["Je suis fermement pour le travail des jeunes pendant les vacances. C'est une excellente occasion d'acquérir des compétences pratiques, d'apprendre à travailler en équipe et de découvrir différents secteurs. Les jeunes peuvent gagner de l'argent à économiser pour l'avenir ou à consacrer à des loisirs. De plus, une expérience de travail sur le CV constitue un avantage pour postuler à des emplois ou à des stages. Les vacances d'été sont longues : il y a amplement le temps de se reposer et de travailler.\n    - Doc 2 (Élise, psychologue pour adolescents) : Je suis contre l'idée que les jeunes doivent travailler pendant leurs vacances. Les adolescents subissent déjà une énorme pression pendant l'année scolaire (études, examens, activités parascolaires). Les vacances doivent être une période pour se détendre, décompresser et poursuivre des intérêts personnels. Les forcer à travailler pourrait aggraver le stress et l'épuisement. Il est aussi important de disposer de temps non structuré pour explorer sa créativité, voir ses amis et sa famille, et simplement être des enfants. Le travail peut attendre."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Octobre 2024"], "hasDocs": true}, {"id": 236, "month": "Octobre 2024", "year": 2024, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 237, "month": "Octobre 2024", "year": 2024, "title": "L'école à domicile : pour ou contre ?", "question": "", "docs": ["Les raisons de choisir la scolarisation à domicile sont multiples : approche pédagogique personnalisée, plus de temps pour les difficultés de l'enfant, activités ludiques. L'enfant gère son apprentissage à son rythme, approfondit ce qui le passionne et ne subit pas la pression des progrès inégaux des camarades. Autre avantage : absence de notes décourageantes, suivi continu, élimination du stress des évaluations et devoirs.", "C'est un défi avec plusieurs inconvénients : investissement considérable en temps, organisation rigoureuse, coûts (matériel, livres, manuels, sorties éducatives), souvent l'arrêt de l'activité professionnelle d'un parent. L'école à domicile revient généralement plus cher que le public. De plus, l'enfant ne côtoie pas quotidiennement des camarades, ce qui limite ses interactions sociales."], "theme": "Éducation / École", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 238, "month": "Octobre 2024", "year": 2024, "title": "Le vélo en ville : pour ou contre ?", "question": "", "docs": ["Le vélo évoque le sport et les loisirs, mais on oublie qu'il est avant tout un moyen de déplacement quotidien, personnel comme professionnel. En milieu urbain, il est rapide et apaisant, offrant une échappatoire au trafic saturé aux heures de pointe. Une solution idéale pour allier activité physique et déplacements utiles.", "Circuler à vélo en ville comporte des risques, comme en témoignent les accidents routiers annuels. La forte concentration de véhicules, les manquements aux règles et l'insuffisance des infrastructures cyclables créent un environnement dangereux. S'y ajoute l'exposition aux polluants atmosphériques (monoxyde de carbone) aux effets toxiques avérés. Le cyclisme urbain soulève une double problématique : sécuritaire et sanitaire."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 239, "month": "Octobre 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 240, "month": "Octobre 2024", "year": 2024, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 241, "month": "Octobre 2024", "year": 2024, "title": "Les devoirs à la maison", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 7, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2023", "Août 2023", "Avril 2023", "Janvier 2022"], "hasDocs": true}, {"id": 242, "month": "Octobre 2024", "year": 2024, "title": "Les objets connectés", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mai 2023", "Janvier 2022"], "hasDocs": true}, {"id": 243, "month": "Septembre 2024", "year": 2024, "title": "Vivre chez ses parents : pour ou contre ?", "question": "", "docs": ["Vivre chez ses parents pendant les études permet aux jeunes d'économiser les frais de logement. On ne paie ni le loyer (souvent très cher) ni la nourriture, le ménage est fait et les vêtements sont propres. Cela offre une certaine stabilité psychologique et permet de mettre de l'argent de côté pour ses projets de vie. Deux jeunes en témoignent : pour la première, étudier loin de chez soi coûte trop cher ; pour le second, vivre chez ses parents est plus confortable (bonne nourriture, linge propre, pas de solitude).\n   - Doc 2 (inconvénients) : Le principal inconvénient est le manque de liberté. Vivre seul rend indépendant, tandis que les jeunes restés chez leurs parents s'ennuient parfois car ceux-ci décident à leur place et ils restent dépendants. Un homme de 25 ans, ayant perdu son emploi, a dû retourner vivre chez ses parents : il a perdu son espace d'intimité. Un autre jeune considère que revenir chez ses parents, c'est « revenir en arrière »."], "theme": "Famille / Enfants", "freq": 4, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023"], "hasDocs": true}, {"id": 244, "month": "Septembre 2024", "year": 2024, "title": "Les nouvelles technologies pour les enfants", "question": "", "docs": ["Les enfants de l'école primaire peuvent utiliser la technologie pour trouver des vidéos sur les sujets étudiés à l'école, ou pour jouer à des jeux qui améliorent leur aisance en mathématiques, leur compréhension de la lecture ou leurs compétences en dactylographie.", "Les nouvelles technologies encouragent les enfants à être sédentaires, ce qui est une préoccupation majeure pour les parents. Elles ne mènent à aucun jeu libre créatif, à aucune interaction sociale en face à face, ni à aucun effort physique. Pourquoi ne pas proposer des activités amusantes pour encourager les enfants à ranger leurs appareils ?"], "theme": "Technologie / Numérique", "freq": 5, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Octobre 2022"], "hasDocs": true}, {"id": 245, "month": "Septembre 2024", "year": 2024, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 246, "month": "Septembre 2024", "year": 2024, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 247, "month": "Septembre 2024", "year": 2024, "title": "Louer son appartement à des inconnus : bonne idée ?", "question": "", "docs": ["De plus en plus de gens louent leur logement ou une chambre à des voyageurs, pour gagner un revenu supplémentaire ou pour rencontrer de nouvelles personnes. Ce système, fondé sur la confiance, permet aux visiteurs de se loger pour moins cher qu'à l'hôtel. Si le propriétaire est d'accord, ils peuvent même utiliser la cuisine et éviter le restaurant. La personne qui les accueille peut leur servir de guide et les conseiller sur les visites. C'est un échange précieux pour tout le monde. *(D'après rapidloc.com)*", "L'an dernier, j'ai loué mon appartement à un couple de touristes pour une semaine à Marseille. Ce fut une très mauvaise expérience qui m'a fait changer d'avis. Ils sont arrivés en retard et j'ai dû les attendre pour leur donner la clé. Ils ont fait beaucoup de bruit et dérangé mes voisins. En plus, ils ont quitté l'appartement sans faire la vaisselle, en laissant leurs déchets. J'ai passé trois heures à nettoyer. *(Julien, 38 ans)*"], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Septembre 2024"], "hasDocs": true}, {"id": 248, "month": "Septembre 2024", "year": 2024, "title": "La gratuité des transports en commun : pour ou contre ?", "question": "", "docs": ["La gratuité des transports en commun est une initiative très positive. Elle permet de réduire le trafic automobile et de limiter les bouchons. Elle contribue aussi à diminuer la pollution et les risques pour la santé liés à l'air. Dans ma ville, où les transports sont gratuits, on constate une hausse de leur utilisation. Cette mesure a également favorisé le commerce local, car les habitants se rendent plus facilement au centre-ville pour leurs achats.", "À mon avis, cette mesure n'est pas appropriée. D'abord, la gratuité des transports représente un coût élevé pour les villes, et certaines, comme Toulouse, ont d'autres priorités, par exemple l'aménagement des espaces verts. Ensuite, il vaudrait mieux améliorer la desserte des transports publics plutôt que de les rendre gratuits, car certains quartiers en sont mal équipés. Enfin, garder les transports payants encourage les usagers à mieux respecter les installations, puisqu'ils financent leur fonctionnement."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Décembre 2024", "Septembre 2024", "Décembre 2023"], "hasDocs": true}, {"id": 249, "month": "Septembre 2024", "year": 2024, "title": "L'interdiction des voitures dans les centres-villes", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Septembre 2024", "Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 250, "month": "Septembre 2024", "year": 2024, "title": "Les jeux vidéo : pour ou contre ?", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 251, "month": "Septembre 2024", "year": 2024, "title": "Les vêtements de grandes marques", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Septembre 2024", "Août 2024", "Juillet 2024"], "hasDocs": true}, {"id": 252, "month": "Septembre 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 253, "month": "Août 2024", "year": 2024, "title": "Les vols à bas prix / low-cost", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 2, "appearances": ["Octobre 2024", "Août 2024"], "hasDocs": true}, {"id": 254, "month": "Août 2024", "year": 2024, "title": "Faire ses courses dans les petits magasins ou les supermarchés ?", "question": "", "docs": ["Faire ses courses au supermarché est avantageux, puisqu'on y trouve une grande diversité de produits au même endroit. Vous pouvez garer votre voiture et passer d'un rayon à l'autre pour acheter ce dont vous avez besoin : fruits, légumes, fromages, viandes, boissons. De plus, plusieurs marques sont proposées pour chaque produit, avec des offres promotionnelles régulières.\n   - Doc 2 (Association pour la défense des commerces de proximité) : L'initiative « Février sans supermarché » vise à limiter le pouvoir des supermarchés et à soutenir la survie des petits commerces en améliorant leurs ventes. Le principe : ne pas faire ses courses dans les grandes surfaces durant un mois et privilégier les épiceries de quartier. Les clients en retirent des avantages : produits plus frais et de qualité, et moments d'échange avec leurs voisins."], "theme": "Éducation / École", "freq": 1, "appearances": ["Août 2024"], "hasDocs": true}, {"id": 255, "month": "Août 2024", "year": 2024, "title": "La sévérité des parents envers les enfants", "question": "", "docs": ["À 22 ans, je vis toujours chez mes parents, qui restent très stricts avec moi malgré mon âge. Plus jeune, il m'était interdit de dormir à l'extérieur ou de rentrer après 21h. Aujourd'hui, bien que je puisse sortir plus tard, ma mère m'appelle sans cesse jusqu'à mon retour à la maison.", "Certains parents hésitent à être trop stricts, de peur que cela freine l'épanouissement et la personnalité de leurs enfants. Toutefois, céder à toutes leurs demandes peut avoir des conséquences négatives à l'âge adulte. Vivre en société implique le respect de certaines règles essentielles."], "theme": "Famille / Enfants", "freq": 3, "appearances": ["Mai 2026", "Avril 2026", "Août 2024"], "hasDocs": true}, {"id": 256, "month": "Août 2024", "year": 2024, "title": "Les vêtements de grandes marques", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Septembre 2024", "Août 2024", "Juillet 2024"], "hasDocs": true}, {"id": 257, "month": "Août 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 258, "month": "Août 2024", "year": 2024, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 259, "month": "Juillet 2024", "year": 2024, "title": "Les vêtements de grandes marques", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Septembre 2024", "Août 2024", "Juillet 2024"], "hasDocs": true}, {"id": 260, "month": "Juillet 2024", "year": 2024, "title": "La réduction du temps de travail", "question": "", "docs": ["Réduire le temps de travail aide les employés à trouver un meilleur équilibre entre vie professionnelle et personnelle. Avec plus de temps libre, ils consacrent davantage de moments à leur famille, leurs loisirs et leur santé. Cela améliore la satisfaction au travail, diminue le stress et augmente l'efficacité globale.", "Réduire les heures de travail peut aider les entreprises en réduisant l'absentéisme et en augmentant la fidélisation. Avec des horaires plus flexibles, les employés sont plus motivés et impliqués. Cependant, cela nécessite une organisation efficace et une adaptation des processus pour maintenir la productivité et répondre aux besoins de l'entreprise."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Juillet 2024"], "hasDocs": true}, {"id": 261, "month": "Juillet 2024", "year": 2024, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 262, "month": "Juillet 2024", "year": 2024, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 263, "month": "Juillet 2024", "year": 2024, "title": "Les nouvelles technologies dans les écoles", "question": "", "docs": ["Je suis persuadé que l'intégration des nouvelles technologies dans les écoles est essentielle pour préparer les élèves à l'avenir numérique. L'utilisation des tablettes et ordinateurs motive les élèves et enrichit leur expérience d'apprentissage en leur donnant accès à diverses ressources, favorisant ainsi leur créativité et leur autonomie.\n   - Doc 2 (Inès) : Je reste dubitative face à l'utilisation excessive des technologies dans l'éducation. Cela peut limiter les interactions humaines et entraîner une dépendance aux écrans. À mon avis, les méthodes traditionnelles et le contact direct entre enseignants et élèves sont essentiels pour un développement équilibré des compétences des jeunes."], "theme": "Éducation / École", "freq": 2, "appearances": ["Juillet 2024", "Mai 2024"], "hasDocs": true}, {"id": 264, "month": "Juillet 2024", "year": 2024, "title": "La chasse aux animaux : pour ou contre ?", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 4, "appearances": ["Juillet 2024", "Octobre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 265, "month": "Juillet 2024", "year": 2024, "title": "L'art urbain : pour ou contre ?", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 4, "appearances": ["Août 2025", "Juillet 2024", "Janvier 2024", "Octobre 2023"], "hasDocs": true}, {"id": 266, "month": "Juillet 2024", "year": 2024, "title": "Les objets connectés : pour ou contre ?", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Juillet 2024"], "hasDocs": true}, {"id": 267, "month": "Juillet 2024", "year": 2024, "title": "La gratuité des musées : pour ou contre ?", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 3, "appearances": ["Juillet 2024", "Janvier 2024", "Septembre 2023"], "hasDocs": true}, {"id": 268, "month": "Juillet 2024", "year": 2024, "title": "La sieste au travail : pour ou contre ?", "question": "", "docs": ["Selon le site siestepourtous.com, une courte sieste au travail pourrait augmenter la productivité et la créativité des employés de 35 %, un vrai bénéfice pour le salarié comme pour l'entreprise. La sieste améliorerait la mémoire et la concentration. Un employé reposé serait plus disponible. Enfin, faire une sieste aiderait à réduire le stress et les risques cardiaques.", "Même si les bienfaits de la micro-sieste ont été prouvés scientifiquement, certaines personnes restent sceptiques. La sieste au bureau pose des difficultés pratiques : toutes les entreprises ne peuvent pas disposer de lits ou de salles spécifiques. Quand une entreprise instaure un temps de repos, elle doit respecter certaines règles : fournir un espace et du matériel adaptés pour éviter tout harcèlement, garantir l'égalité entre salariés et établir une charte encadrant cette pratique."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Juillet 2024", "Septembre 2023"], "hasDocs": true}, {"id": 269, "month": "Juillet 2024", "year": 2024, "title": "La livraison des repas au bureau : pour ou contre ?", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 4, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Octobre 2023"], "hasDocs": true}, {"id": 270, "month": "Juillet 2024", "year": 2024, "title": "Le rôle de la télévision dans l'éducation des enfants", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 6, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 271, "month": "Juillet 2024", "year": 2024, "title": "Les jeux vidéo : pour ou contre ?", "question": "", "docs": ["Des recherches ont montré que certaines parties du cerveau des adultes peuvent se développer grâce aux jeux vidéo. Jouer peut être bénéfique : cela aide à renforcer l'analyse, la prise de décision et la rapidité de réaction. C'est une bonne nouvelle, puisque 83 % des joueurs sont des adultes. Toutefois, il faut rester vigilant, car certains jeux n'apportent pas ces effets positifs.", "Durant trois ans, des chercheurs ont observé des enfants de 8 à 17 ans. Les conclusions indiquent que les enfants qui jouent beaucoup deviennent plus violents, plus tendus et plus stressés, et réussissent moins bien à l'école. C'est pourquoi il est conseillé aux parents de contrôler le temps passé devant les jeux vidéo."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 272, "month": "Juillet 2024", "year": 2024, "title": "Les relations amicales au travail : pour ou contre ?", "question": "", "docs": ["Les amitiés entre collègues peuvent être très avantageuses. Elles contribuent à instaurer un environnement de travail agréable et une atmosphère positive. Avoir des amis parmi ses collègues solidifie les relations professionnelles et instaure un esprit de camaraderie. Cela peut améliorer la communication, favoriser une collaboration plus étroite et faciliter la résolution des problèmes. Partager des moments conviviaux en dehors du bureau (déjeuners, sorties) renforce les liens et crée une dynamique de groupe forte.", "Il est essentiel de trouver un juste équilibre entre amitié et professionnalisme. Des amitiés trop proches peuvent engendrer des tensions ou des conflits, surtout lors de décisions professionnelles. Des amitiés exclusives peuvent marginaliser les autres, ce qui affecte la cohésion de l'équipe. Il est donc crucial de poser des limites claires et de s'assurer que les amitiés ne compromettent pas le professionnalisme, la hiérarchie ou la productivité."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Mars 2026", "Juillet 2024", "Mai 2023"], "hasDocs": true}, {"id": 273, "month": "Juillet 2024", "year": 2024, "title": "L'utilisation du plastique : pour ou contre ?", "question": "", "docs": ["Défend une utilisation restreinte du plastique, soulignant son importance dans l'alimentation et la médecine (conservation des produits alimentaires, stérilisation des équipements médicaux). Il prône une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 5, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 274, "month": "Juillet 2024", "year": 2024, "title": "Les habitudes alimentaires", "question": "", "docs": ["De nos jours, les journées passent vite, prises par un rythme effréné (travail, enfants, loisirs). Beaucoup privilégient des repas tout faits, à emporter ou sur place. Annette, 28 ans, très investie dans son travail, aime dîner au restaurant avec ses amis : cela lui permet de manger sans passer des heures en cuisine après une rude journée. Ce mode de vie convient à sa vie de célibataire : découvrir de nouveaux restaurants, faire des rencontres, éviter les longues soirées seule.", "Les fast-foods ont conduit beaucoup de gens à de mauvaises habitudes (plats rapides, déséquilibrés, riches en calories). Heureusement, certaines familles tiennent bon et mangent chez elles tout en faisant des économies. Jeanne, mariée, 45 ans, préfère manger à la maison avec son mari et ses cinq enfants : en cuisinant elle-même, elle sait ce qu'elle met dans l'assiette et préserve son budget. Cette caissière prend aussi un grand plaisir à cuisiner pour sa famille."], "theme": "Santé / Bien-être", "freq": 4, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Avril 2022"], "hasDocs": true}, {"id": 275, "month": "Juillet 2024", "year": 2024, "title": "Les distributeurs automatiques dans les établissements scolaires : pour ou contre ?", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 1, "appearances": ["Juillet 2024"], "hasDocs": true}, {"id": 276, "month": "Juillet 2024", "year": 2024, "title": "Le travail des étudiants pendant les vacances", "question": "", "docs": ["Je suis fermement pour le travail des jeunes pendant les vacances. C'est une excellente occasion d'acquérir des compétences pratiques, d'apprendre à travailler en équipe et de découvrir différents secteurs. Les jeunes peuvent gagner de l'argent à économiser pour l'avenir ou à consacrer à des loisirs. De plus, une expérience de travail sur le CV constitue un avantage pour postuler à des emplois ou à des stages. Les vacances d'été sont longues : il y a amplement le temps de se reposer et de travailler.\n    - Doc 2 (Élise, psychologue pour adolescents) : Je suis contre l'idée que les jeunes doivent travailler pendant leurs vacances. Les adolescents subissent déjà une énorme pression pendant l'année scolaire (études, examens, activités parascolaires). Les vacances doivent être une période pour se détendre, décompresser et poursuivre des intérêts personnels. Les forcer à travailler pourrait aggraver le stress et l'épuisement. Il est aussi important de disposer de temps non structuré pour explorer sa créativité, voir ses amis et sa famille, et simplement être des enfants. Le travail peut attendre."], "theme": "Travail / Carrière", "freq": 4, "appearances": ["Juillet 2024", "Mai 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 277, "month": "Juillet 2024", "year": 2024, "title": "Vivre en colocation : pour ou contre ?", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 5, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 278, "month": "Juillet 2024", "year": 2024, "title": "Les achats en ligne", "question": "", "docs": ["Les achats en ligne présentent des avantages : ils font gagner du temps aux consommateurs, permettent souvent de payer moins cher, offrent une disponibilité 24h/24 et donnent accès à des produits venus du monde entier.", "Les magasins traditionnels offrent un contact humain et une relation avec les vendeurs, ainsi que la possibilité de voir et de toucher les produits. Beaucoup de consommateurs préfèrent l'achat en magasin : il permet d'échanger un article qui ne convient pas et de dialoguer avec les vendeurs."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Juillet 2024", "Décembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 279, "month": "Juillet 2024", "year": 2024, "title": "Le travail : favorable ou défavorable ?", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Août 2025", "Mai 2025", "Février 2025", "Novembre 2024", "Octobre 2024", "Juillet 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 280, "month": "Juillet 2024", "year": 2024, "title": "Les parcs zoologiques : pour ou contre ?", "question": "", "docs": ["Les animaux sauvages ne doivent pas vivre dans les zoos, car ce n'est pas leur milieu naturel. Les zoos ressemblent à des prisons. Il y a même des ours polaires dans des endroits trop chauds. Les animaux doivent rester libres, dans la nature.", "Les zoos ont beaucoup d'avantages. Ils aident à protéger les animaux en voie de disparition. Les animaux y sont bien soignés. Grâce aux zoos, il y a plus de naissances et cela peut sauver certaines espèces."], "theme": "Animaux", "freq": 5, "appearances": ["Octobre 2024", "Juillet 2024", "Décembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 281, "month": "Juillet 2024", "year": 2024, "title": "Les publicités : pour ou contre ?", "question": "", "docs": ["Beaucoup trouvent la publicité agaçante, mais à mon avis elle est très utile pour les entreprises. Elle sert à présenter un produit ou un service. Parfois elle est même drôle ! Elle m'aide à découvrir les nouveautés et les offres spéciales. Comparer les articles grâce à la publicité permet de faire des économies. Enfin, les jeux gratuits sur téléphone dépendent des publicités ; sans elles, ils seraient payants.\n    - Doc 2 (Alma, 35 ans) : Nous sommes entourés de publicité tous les jours : journaux, radios, télévisions, smartphones, Internet… Les émissions télévisées sont souvent coupées par des pubs, ce qui est irritant. Recevoir des kilos de publicité chaque année dans la boîte aux lettres n'est pas bon pour l'environnement ! Il serait utile de créer une loi pour limiter les publicités à la télévision et par courrier. Des publicités plus discrètes seraient mieux reçues."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 282, "month": "Juillet 2024", "year": 2024, "title": "Les jeux vidéo ont-ils un impact sur notre comportement ?", "question": "", "docs": ["Beaucoup de gens pensent encore que les jeux vidéo nous rendent bêtes. Pourtant, de nombreuses études prouvent le contraire. Ainsi, selon l'une d'elles, les utilisateurs de jeux de course développeraient leur sens de l'orientation, leur mémoire et la précision de leurs mouvements. D'autres études montrent clairement une amélioration de la rapidité et de la concentration de tous les joueurs. Et c'est sans parler des jeux d'entraînement destinés aux personnes âgées pour consolider la mémoire et la vivacité d'esprit. Bref, c'est scientifique : le jeu vidéo rend plus intelligent !", "Les jeux vidéo — sur console ou ordinateur, chez soi ou en salle, seul, avec des amis ou en ligne avec des inconnus — peuvent provoquer une dépendance chez certaines personnes. On parle d'addiction quand le jeu vidéo devient le principal (ou l'unique) centre d'intérêt, au détriment d'autres activités (relationnelles, professionnelles, scolaires, loisirs, sport). Cette dépendance est particulièrement préoccupante à l'adolescence, période importante où les jeux vidéo peuvent avoir un impact négatif sur les résultats scolaires."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 283, "month": "Juillet 2024", "year": 2024, "title": "L'interdiction des voitures dans les centres-villes", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Septembre 2024", "Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 284, "month": "Juillet 2024", "year": 2024, "title": "Les vols à bas prix : pour ou contre ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 7, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 285, "month": "Juillet 2024", "year": 2024, "title": "Le bien-être au travail", "question": "", "docs": ["Dans notre entreprise, nous avons mis en place des bureaux réglables en hauteur pour que les employés travaillent dans la position qui leur convient. Ils sont satisfaits et se disent plus performants, par exemple lors des négociations au téléphone. Le climat social s'est amélioré et les échanges entre collègues sont plus fréquents.\n    - Doc 2 (Dubois, ingénieur) : Aujourd'hui, les entreprises cherchent à augmenter la productivité, et les employés passent plus de temps au travail. Elles essaient d'inciter leurs salariés à en faire plus tout en prenant soin de leur santé. Pour ma part, ce qui compte, c'est de réaliser mon travail pendant mes heures normales, sans heures supplémentaires."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Juillet 2024", "Septembre 2023"], "hasDocs": true}, {"id": 286, "month": "Juillet 2024", "year": 2024, "title": "L'uniforme scolaire : pour ou contre ?", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 6, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 287, "month": "Juillet 2024", "year": 2024, "title": "Cours de langue à distance", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 3, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 288, "month": "Juillet 2024", "year": 2024, "title": "L'éducation des enfants / sévérité", "question": "", "docs": ["« J'ai 19 ans et j'habite toujours chez mes parents. Je suis majeure et responsable mais mes parents restent sévères avec moi. Jusqu'à 18 ans, quand je sortais, je devais rentrer avant 20 h et je n'avais pas le droit de dormir chez mes amies. Même si aujourd'hui j'ai le droit de rentrer plus tard, ma mère s'inquiète encore. Elle m'appelle pour me demander où je suis et n'arrive pas à dormir avant mon retour. Mes parents me laissent de la liberté mais j'en ai moins que les autres. »", "Certains parents qui ne veulent pas être trop sévères ont peu de contrôle sur leurs enfants. Ils ont peur que leurs enfants, privés de liberté, soient malheureux et manquent de personnalité. Ces parents acceptent donc toutes les demandes. Cette situation aura peu de conséquences jusqu'à l'adolescence. Cependant, à l'âge adulte, ils auront des difficultés à vivre en société car ils auront du mal à accepter les règles."], "theme": "Éducation / École", "freq": 1, "appearances": ["Juillet 2024"], "hasDocs": true}, {"id": 289, "month": "Juillet 2024", "year": 2024, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Février 2025", "Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 290, "month": "Juillet 2024", "year": 2024, "title": "Les caméras de surveillance à l'école : pour ou contre ?", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 2, "appearances": ["Juillet 2024", "Mai 2023"], "hasDocs": true}, {"id": 291, "month": "Juillet 2024", "year": 2024, "title": "Cuisinier amateur ou cuisinier professionnel ?", "question": "", "docs": ["Réussir des recettes ne su
