ffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Mai 2026", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024", "Septembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 292, "month": "Juin 2024", "year": 2024, "title": "Les publicités : pour ou contre ?", "question": "", "docs": ["Beaucoup trouvent la publicité agaçante, mais à mon avis elle est très utile pour les entreprises. Elle sert à présenter un produit ou un service. Parfois elle est même drôle ! Elle m'aide à découvrir les nouveautés et les offres spéciales. Comparer les articles grâce à la publicité permet de faire des économies. Enfin, les jeux gratuits sur téléphone dépendent des publicités ; sans elles, ils seraient payants.\n    - Doc 2 (Alma, 35 ans) : Nous sommes entourés de publicité tous les jours : journaux, radios, télévisions, smartphones, Internet… Les émissions télévisées sont souvent coupées par des pubs, ce qui est irritant. Recevoir des kilos de publicité chaque année dans la boîte aux lettres n'est pas bon pour l'environnement ! Il serait utile de créer une loi pour limiter les publicités à la télévision et par courrier. Des publicités plus discrètes seraient mieux reçues."], "theme": "Technologie / Numérique", "freq": 2, "appearances": ["Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 293, "month": "Juin 2024", "year": 2024, "title": "Les jeux vidéo ont-ils un impact sur notre comportement ?", "question": "", "docs": ["Beaucoup de gens pensent encore que les jeux vidéo nous rendent bêtes. Pourtant, de nombreuses études prouvent le contraire. Ainsi, selon l'une d'elles, les utilisateurs de jeux de course dé  police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Septembre 2024", "Juillet 2024", "Juin 2024"], "hasDocs": true}, {"id": 295, "month": "Juin 2024", "year": 2024, "title": "Les vols à bas prix : pour ou contre ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 7, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 296, "month": "Juin 2024", "year": 2024, "title": "L'aide aux personnes pauvres / en difficulté", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 2, "appearances": ["Janvier 2025", "Juin 2024"], "hasDocs": true}, {"id": 297, "month": "Juin 2024", "year": 2024, "title": "Vivre en colocation : pour ou contre ?", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 5, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 298, "month": "Juin 2024", "year": 2024, "title": "Cuisinier amateur ou cuisinier professionnel ?", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Mai 2026", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024", "Septembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 299, "month": "Juin 2024", "year": 2024, "title": "Les distributeurs de boissons dans les lycées : pour ou contre ?", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 7, "appearances": ["Juin 2024", "Avril 2024", "Mars 2024", "Septembre 2023", "Août 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 300, "month": "Juin 2024", "year": 2024, "title": "Les jeux vidéo : pour ou contre ?", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 301, "month": "Mai 2024", "year": 2024, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 302, "month": "Mai 2024", "year": 2024, "title": "Les vols à bas prix : pour ou contre ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 7, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 303, "month": "Mai 2024", "year": 2024, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 304, "month": "Mai 2024", "year": 2024, "title": "Vivre en colocation : pour ou contre ?", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 5, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 305, "month": "Mai 2024", "year": 2024, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 306, "month": "Mai 2024", "year": 2024, "title": "Le travail des étudiants pendant les vacances", "question": "", "docs": ["Je suis fermement pour le travail des jeunes pendant les vacances. C'est une excellente occasion d'acquérir des compétences pratiques, d'apprendre à travailler en équipe et de découvrir différents secteurs. Les jeunes peuvent gagner de l'argent à économiser pour l'avenir ou à consacrer à des loisirs. De plus, une expérience de travail sur le CV constitue un avantage pour postuler à des emplois ou à des stages. Les vacances d'été sont longues : il y a amplement le temps de se reposer et de travailler.\n    - Doc 2 (Élise, psychologue pour adolescents) : Je suis contre l'idée que les jeunes doivent travailler pendant leurs vacances. Les adolescents subissent déjà une énorme pression pendant l'année scolaire (études, examens, activités parascolaires). Les vacances doivent être une période pour se détendre, décompresser et poursuivre des intérêts personnels. Les forcer à travailler pourrait aggraver le stress et l'épuisement. Il est aussi important de disposer de temps non structuré pour explorer sa créativité, voir ses amis et sa famille, et simplement être des enfants. Le travail peut attendre."], "theme": "Travail / Carrière", "freq": 4, "appearances": ["Juillet 2024", "Mai 2024", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 307, "month": "Mai 2024", "year": 2024, "title": "Les devoirs à la maison : pour ou contre ?", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 1, "appearances": ["Mai 2024"], "hasDocs": true}, {"id": 308, "month": "Mai 2024", "year": 2024, "title": "Les écoles privées ou publiques ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Éducation / École", "freq": 2, "appearances": ["Mai 2024", "Janvier 2024"], "hasDocs": true}, {"id": 309, "month": "Mai 2024", "year": 2024, "title": "Les produits faits maison : pour ou contre ?", "question": "", "docs": ["Produire ses propres produits biologiques à domicile permet de maîtriser entièrement les ingrédients utilisés, offrant des alternatives plus saines et adaptées aux besoins individuels. Cela participe à la réduction des déchets plastiques grâce à des emballages réutilisables. De plus, cette démarche permet de réaliser des économies sur le long terme tout en développant des compétences créatives, favorisant un mode de vie plus durable.", "La fabrication de produits biologiques à domicile présente certains défis. Des erreurs dans la formulation peuvent affecter leur efficacité ou provoquer des irritations. Le temps et les efforts nécessaires pour sélectionner et préparer les ingrédients peuvent représenter une contrainte. L'absence de garantie sur la sécurité et la stabilité augmente le risque de contamination si les règles de conservation ne sont pas respectées. Enfin, le coût initial des ingrédients de qualité peut constituer un frein."], "theme": "Alimentation / Cuisine", "freq": 3, "appearances": ["Avril 2026", "Mai 2024", "Octobre 2023"], "hasDocs": true}, {"id": 310, "month": "Mai 2024", "year": 2024, "title": "Les nouvelles technologies dans les écoles", "question": "", "docs": ["Je suis persuadé que l'intégration des nouvelles technologies dans les écoles est essentielle pour préparer les élèves à l'avenir numérique. L'utilisation des tablettes et ordinateurs motive les élèves et enrichit leur expérience d'apprentissage en leur donnant accès à diverses ressources, favorisant ainsi leur créativité et leur autonomie.\n   - Doc 2 (Inès) : Je reste dubitative face à l'utilisation excessive des technologies dans l'éducation. Cela peut limiter les interactions humaines et entraîner une dépendance aux écrans. À mon avis, les méthodes traditionnelles et le contact direct entre enseignants et élèves sont essentiels pour un développement équilibré des compétences des jeunes."], "theme": "Éducation / École", "freq": 2, "appearances": ["Juillet 2024", "Mai 2024"], "hasDocs": true}, {"id": 311, "month": "Avril 2024", "year": 2024, "title": "L'aide aux personnes pauvres", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 2, "appearances": ["Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 312, "month": "Avril 2024", "year": 2024, "title": "Vivre en colocation : pour ou contre ?", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 5, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 313, "month": "Avril 2024", "year": 2024, "title": "Cuisinier amateur ou cuisinier professionnel ?", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se form  de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 316, "month": "Mars 2024", "year": 2024, "title": "L'aide aux personnes pauvres", "question": "", "docs": ["Chaque hiver, je consacre un peu de mon temps et de mon argent pour aider les personnes sans-abri qui souffrent du froid. Il est important de penser à ceux qui sont dans le besoin. Je trouve essentiel de donner quelques dollars à ces personnes ou aux associations qui les soutiennent. Cette action me fait sentir utile, au moins une fois par an ! C'est un geste de solidarité que chacun peut réaliser.\n    - Doc 2 (Arthur, 54 ans) : Au lieu de donner de l'argent, il serait préférable de repenser notre façon de vivre. Je préfère m'investir chaque jour dans une association de mon quartier, où je fais du bénévolat. Les sans-abri ont besoin d'un logement et d'un emploi, pas seulement d'argent. Il faut les aider à devenir indépendants. C'est l'objectif des associations qui aident les personnes de la rue à trouver un travail. Donner de l'argent seul ne fait qu'apaiser notre conscience."], "theme": "Société / Débat", "freq": 2, "appearances": ["Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 317, "month": "Mars 2024", "year": 2024, "title": "Vivre en colocation : pour ou contre ?", "question": "", "docs": ["La colocation offre de nombreux avantages. Partager un appartement permet de diminuer le loyer, les charges et les dépenses communes. Elle favorise les rencontres et les échanges culturels. Habiter avec d'autres permet de rencontrer des individus différents, de nouer des amitiés et de vivre des expériences intéressantes.", "La colocation présente aussi des inconvénients. Les différences de personnalité et de mode de vie peuvent provoquer des tensions. La répartition des tâches ménagères peut engendrer des conflits. De plus, la colocation réduit parfois l'intimité et l'espace personnel. Pour que la cohabitation se passe bien, il faut une communication claire et respectueuse et fixer des règles partagées."], "theme": "Logement / Ville", "freq": 5, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 318, "month": "Mars 2024", "year": 2024, "title": "Cuisinier amateur ou cuisinier professionnel ?", "question": "", "docs": ["Réussir des recettes ne suffit pas pour être un véritable cuisinier. Une formation et une expérience approfondie sont essentielles pour maîtriser les techniques du métier.", "Certains passionnés de cuisine se forment grâce à internet et deviennent populaires sur les réseaux sociaux. L'histoire d'une amatrice devenue chef et auteure de livres de cuisine illustre ce parcours."], "theme": "Travail / Carrière", "freq": 8, "appearances": ["Mai 2026", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024", "Septembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 319, "month": "Mars 2024", "year": 2024, "title": "Les distributeurs de boissons dans les lycées : pour ou contre ?", "question": "", "docs": ["Certains estiment que l'installation de distributeurs automatiques dans les lycées est un atout. Ils permettent un accès rapide à des boissons et en-cas, notamment quand les élèves n'ont pas le temps de passer à la cantine. De plus, ces distributeurs peuvent être approvisionnés en options saines comme des jus de fruits sans sucre et de l'eau.", "D'autres considèrent que ces distributeurs favorisent une consommation excessive de produits sucrés et contribuent à des problèmes de santé comme l'obésité et le diabète. Les écoles devraient encourager des habitudes alimentaires plus saines et éviter ces installations qui incitent à une mauvaise alimentation."], "theme": "Éducation / École", "freq": 7, "appearances": ["Juin 2024", "Avril 2024", "Mars 2024", "Septembre 2023", "Août 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 320, "month": "Mars 2024", "year": 2024, "title": "Les jeux vidéo : pour ou contre ?", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Décembre 2024", "Septembre 2024", "Juillet 2024", "Juin 2024", "Avril 2024", "Mars 2024"], "hasDocs": true}, {"id": 321, "month": "Mars 2024", "year": 2024, "title": "Vivre chez ses parents : pour ou contre ?", "question": "", "docs": ["Vivre chez ses parents pendant les études permet aux jeunes d'économiser les frais de logement. On ne paie ni le loyer (souvent très cher) ni la nourriture, le ménage est fait et les vêtements sont propres. Cela offre une certaine stabilité psychologique et permet de mettre de l'argent de côté pour ses projets de vie. Deux jeunes en témoignent : pour la première, étudier loin de chez soi coûte trop cher ; pour le second, vivre chez ses parents est plus confortable (bonne nourriture, linge propre, pas de solitude).\n   - Doc 2 (inconvénients) : Le principal inconvénient est le manque de liberté. Vivre seul rend indépendant, tandis que les jeunes restés chez leurs parents s'ennuient parfois car ceux-ci décident à leur place et ils restent dépendants. Un homme de 25 ans, ayant perdu son emploi, a dû retourner vivre chez ses parents : il a perdu son espace d'intimité. Un autre jeune considère que revenir chez ses parents, c'est « revenir en arrière »."], "theme": "Famille / Enfants", "freq": 4, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023"], "hasDocs": true}, {"id": 322, "month": "Mars 2024", "year": 2024, "title": "Les nouvelles technologies pour les enfants", "question": "", "docs": ["Les enfants de l'école primaire peuvent utiliser la technologie pour trouver des vidéos sur les sujets étudiés à l'école, ou pour jouer à des jeux qui améliorent leur aisance en mathématiques, leur compréhension de la lecture ou leurs compétences en dactylographie.", "Les nouvelles technologies encouragent les enfants à être sédentaires, ce qui est une préoccupation majeure pour les parents. Elles ne mènent à aucun jeu libre créatif, à aucune interaction sociale en face à face, ni à aucun effort physique. Pourquoi ne pas proposer des activités amusantes pour encourager les enfants à ranger leurs appareils ?"], "theme": "Technologie / Numérique", "freq": 5, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Octobre 2022"], "hasDocs": true}, {"id": 323, "month": "Mars 2024", "year": 2024, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 324, "month": "Mars 2024", "year": 2024, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 325, "month": "Mars 2024", "year": 2024, "title": "Le rôle de la télévision dans l'éducation des enfants", "question": "", "docs": ["La télévision est un moyen de communication et de distraction très présent. Son impact est évident sur les personnes et la culture. Elle transmet des informations, propose des programmes de divertissement et diffuse la culture. Présente dans beaucoup de foyers, elle reste une source d'information et de loisirs accessible à tous. Grâce à sa large audience, elle joue un rôle essentiel dans le partage des connaissances et la sensibilisation aux questions sociales.", "La télévision présente aussi des aspects négatifs. Certains programmes transmettent des stéréotypes, des idées fausses ou des valeurs discutables. Passer trop de temps devant la télévision peut diminuer le temps consacré à d'autres activités plus utiles (lecture, échanges sociaux, sport). Il faut donc limiter le temps passé devant la télévision, surtout pour les enfants, afin de garder un bon équilibre entre apprentissage et loisirs."], "theme": "Éducation / École", "freq": 6, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 326, "month": "Mars 2024", "year": 2024, "title": "L'utilisation du plastique : pour ou contre ?", "question": "", "docs": ["Chaque année, des millions de tonnes de plastique sont déversées dans les océans, où elles s'accumulent et se fragmentent en petits morceaux. Ces déchets ont des effets désastreux sur la faune et la flore marines, qui les ingèrent. Le plastique menace ainsi la santé des écosystèmes marins, mais aussi la nôtre, car il peut remonter dans la chaîne alimentaire. Il est urgent de réduire notre consommation de plastique et de l'éliminer à la source, avant qu'il n'atteigne les océans.", "Le plastique est un matériau indispensable dans le domaine de la santé. Il permet de fabriquer des dispositifs médicaux : seringues, cathéters, prothèses, implants, pansements, etc. Ces dispositifs, souvent jetables, résistants et adaptés aux besoins des patients, contribuent à la prévention des infections, à la réduction des douleurs et à la sauvegarde de nombreuses vies. Le plastique est donc un allié de la médecine, apportant des solutions innovantes et efficaces."], "theme": "Environnement / Écologie", "freq": 5, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 327, "month": "Mars 2024", "year": 2024, "title": "La livraison des repas au bureau : pour ou contre ?", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 4, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Octobre 2023"], "hasDocs": true}, {"id": 328, "month": "Mars 2024", "year": 2024, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Février 2025", "Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 329, e une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 5, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 335, "month": "Février 2024", "year": 2024, "title": "La livraison des repas au bureau : pour ou contre ?", "question": "", "docs": ["Se faire livrer un repas au bureau est un moyen pratique de gagner du temps. On n'a pas besoin de sortir pendant la pause déjeuner, ce qui aide à finir le travail plus tôt. Chacun peut également choisir le repas qu'il souhaite, selon ses envies. Enfin, ce service est accessible à toute heure grâce à des restaurants ouverts en continu.", "Néanmoins, ce système présente des limites. En cas de nombreuses commandes, les livreurs peuvent être débordés, ce qui cause des retards et du stress. Pour vous, rester assis sans prendre une vraie pause peut fatiguer. Il est donc conseillé de faire une coupure, même brève, afin de rester performant."], "theme": "Travail / Carrière", "freq": 4, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Octobre 2023"], "hasDocs": true}, {"id": 336, "month": "Février 2024", "year": 2024, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Février 2025", "Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 337, "month": "Janvier 2024", "year": 2024, "title": "Les écoles privées ou publiques ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Éducation / École", "freq": 2, "appearances": ["Mai 2024", "Janvier 2024"], "hasDocs": true}, {"id": 338, "month": "Janvier 2024", "year": 2024, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 339, "month": "Janvier 2024", "year": 2024, "title": "Le vélo en ville : pour ou contre ?", "question": "", "docs": ["Le vélo évoque le sport et les loisirs, mais on oublie qu'il est avant tout un moyen de déplacement quotidien, personnel comme professionnel. En milieu urbain, il est rapide et apaisant, offrant une échappatoire au trafic saturé aux heures de pointe. Une solution idéale pour allier activité physique et déplacements utiles.", "Circuler à vélo en ville comporte des risques, comme en témoignent les accidents routiers annuels. La forte concentration de véhicules, les manquements aux règles et l'insuffisance des infrastructures cyclables créent un environnement dangereux. S'y ajoute l'exposition aux polluants atmosphériques (monoxyde de carbone) aux effets toxiques avérés. Le cyclisme urbain soulève une double problématique : sécuritaire et sanitaire."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 340, "month": "Janvier 2024", "year": 2024, "title": "L'école à domicile : pour ou contre ?", "question": "", "docs": ["Les raisons de choisir la scolarisation à domicile sont multiples : approche pédagogique personnalisée, plus de temps pour les difficultés de l'enfant, activités ludiques. L'enfant gère son apprentissage à son rythme, approfondit ce qui le passionne et ne subit pas la pression des progrès inégaux des camarades. Autre avantage : absence de notes décourageantes, suivi continu, élimination du stress des évaluations et devoirs.", "C'est un défi avec plusieurs inconvénients : investissement considérable en temps, organisation rigoureuse, coûts (matériel, livres, manuels, sorties éducatives), souvent l'arrêt de l'activité professionnelle d'un parent. L'école à domicile revient généralement plus cher que le public. De plus, l'enfant ne côtoie pas quotidiennement des camarades, ce qui limite ses interactions sociales."], "theme": "Éducation / École", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 341, "month": "Janvier 2024", "year": 2024, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 342, "month": "Janvier 2024", "year": 2024, "title": "L'art urbain : pour ou contre ?", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 4, "appearances": ["Août 2025", "Juillet 2024", "Janvier 2024", "Octobre 2023"], "hasDocs": true}, {"id": 343, "month": "Janvier 2024", "year": 2024, "title": "Les objets connectés", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mai 2023", "Janvier 2022"], "hasDocs": true}, {"id": 344, "month": "Janvier 2024", "year": 2024, "title": "La gratuité des musées : pour ou contre ?", "question": "", "docs": ["La gratuité fait partie des principes fondamentaux des musées et symbolise le partage culturel. Tous les acteurs du monde culturel s'accordent à dire qu'il faut faciliter l'accès à la culture pour tous. À la différence des théâtres ou opéras, les musées ont une tradition de gratuité : une fois par mois, l'entrée des musées nationaux est gratuite pour tous. Cette mesure vise à faire venir de nouveaux visiteurs, car le musée reste avant tout un lieu d'éducation pour le plus grand nombre.", "Rendre les musées totalement gratuits est une fausse bonne idée, car cela fait croire que la culture ne nécessite aucun financement. Pourtant, les musées doivent recevoir des fonds pour maintenir et développer leurs collections. Une solution plus adaptée est de proposer des entrées à tarif réduit pour des publics ciblés. Il faut accompagner ces visiteurs avec des visites ou activités adaptées (jeunes, personnes à mobilité réduite). Ouvrir les portes ne suffit pas : il faut créer une interaction entre le musée et ses visiteurs."], "theme": "Culture / Arts / Médias", "freq": 3, "appearances": ["Juillet 2024", "Janvier 2024", "Septembre 2023"], "hasDocs": true}, {"id": 345, "month": "Janvier 2024", "year": 2024, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 346, "month": "Décembre 2023", "year": 2023, "title": "Les parcs zoologiques : pour ou contre ?", "question": "", "docs": ["Les animaux sauvages ne doivent pas vivre dans les zoos, car ce n'est pas leur milieu naturel. Les zoos ressemblent à des prisons. Il y a même des ours polaires dans des endroits trop chauds. Les animaux doivent rester libres, dans la nature.", "Les zoos ont beaucoup d'avantages. Ils aident à protéger les animaux en voie de disparition. Les animaux y sont bien soignés. Grâce aux zoos, il y a plus de naissances et cela peut sauver certaines espèces."], "theme": "Animaux", "freq": 5, "appearances": ["Octobre 2024", "Juillet 2024", "Décembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 347, "month": "Décembre 2023", "year": 2023, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 348, "month": "Décembre 2023", "year": 2023, "title": "Interdire la voiture au centre-ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Décembre 2023"], "hasDocs": true}, {"id": 349, "month": "Décembre 2023", "year": 2023, "title": "Les animaux de compagnie au travail", "question": "", "docs": ["Apporter son animal au travail est une pratique qui se développe. Son intérêt ? Réduire le stress des employés. Les chiens ou les chats changent l'atmosphère de l'entreprise et diminuent les conflits entre collègues. C'est important, car chaque année, l'État français consacre 2 à 3 milliards d'euros pour soigner le stress au travail. Une enquête montre qu'un quart des salariés pensent que les animaux améliorent leur motivation.\n    - Doc 2 (Alba, 32 ans) : « Dans l'entreprise où je travaille, il est permis d'amener son animal. Pour ma part, cela me dérange. Je ne suis pas très à l'aise avec les animaux, qui peuvent agir de façon inattendue. Cela peut aussi poser des problèmes de santé : qu'en est-il des employés allergiques aux chats ? Et puis, cela constitue une source de distraction. Un chien ou un chat n'améliorera pas notre productivité ! »"], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Décembre 2023"], "hasDocs": true}, {"id": 350, "month": "Décembre 2023", "year": 2023, "title": "Les achats en ligne", "question": "", "docs": ["Les achats en ligne présentent des avantages : ils font gagner du temps aux consommateurs, permettent souvent de payer moins cher, offrent une disponibilité 24h/24 et donnent accès à des produits venus du monde entier.", "Les magasins traditionnels offrent un contact humain et une relation avec les vendeurs, ainsi que la possibilité de voir et de toucher les produits. Beaucoup de consommateurs préfèrent l'achat en magasin : il permet d'échanger un article qui ne convient pas et de dialoguer avec les vendeurs."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Juillet 2024", "Décembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 351, "month": "Décembre 2023", "year": 2023, "title": "La gratuité des transports en commun : pour ou contre ?", "question": "", "docs": ["La gratuité des transports en commun est une initiative très positive. Elle permet de réduire le trafic automobile et de limiter les bouchons. Elle contribue aussi à diminuer la pollution et les risques pour la santé liés à l'air. Dans ma ville, où les transports sont gratuits, on constate une hausse de leur utilisation. Cette mesure a également favorisé le commerce local, car les habitants se rendent plus facilement au centre-ville pour leurs achats.", "À mon avis, cette mesure n'est pas appropriée. D'abord, la gratuité des transports représente un coût élevé pour les villes, et certaines, comme Toulouse, ont d'autres priorités, par exemple l'aménagement des espaces verts. Ensuite, il vaudrait mieux améliorer la desserte des transports publics plutôt que de les rendre gratuits, car certains quartiers en sont mal équipés. Enfin, garder les transports payants encourage les usagers à mieux respecter les installations, puisqu'ils financent leur fonctionnement."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Décembre 2024", "Septembre 2024", "Décembre 2023"], "hasDocs": true}, {"id": 352, "month": "Décembre 2023", "year": 2023, "title": "L'uniforme scolaire : pour ou contre ?", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 6, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 353, "month": "Décembre 2023", "year": 2023, "title": "Les caméras de surveillance : pour ou contre ?", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Décembre 2023", "Novembre 2023", "Octobre 2023", "Septembre 2023"], "hasDocs": true}, {"id": 354, "month": "Décembre 2023", "year": 2023, "title": "Faut-il mettre une photo sur le CV ?", "question": "", "docs": ["Certains candidats mettent une photo sur leur CV, d'autres préfèrent ne pas en mettre. Il faudrait interdire cette pratique pour éviter toute discrimination. Selon une étude de spécialistes du recrutement, la photo n'a pas de réelle utilité : les employeurs accordent plus d'attention à l'expérience professionnelle (32 %) et aux diplômes (15 %) qu'au physique. Seuls 2 % des recruteurs commencent par regarder la photo, ce qui est surprenant compte tenu de l'importance donnée à l'apparence.", "L'utilisation d'une photo sur le CV divise les recruteurs. Certains estiment qu'elle aide à se faire une idée du candidat avant la rencontre et facilite la mémorisation quand beaucoup de CV sont reçus. D'autres pensent que tout dépend du métier : pour les postes liés à l'accueil, la photo peut être appropriée. Cependant, elle doit toujours être professionnelle pour créer une impression positive."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 355, "month": "Décembre 2023", "year": 2023, "title": "L'utilisation du plastique : pour ou contre ?", "question": "", "docs": ["Défend une utilisation restreinte du plastique, soulignant son importance dans l'alimentation et la médecine (conservation des produits alimentaires, stérilisation des équipements médicaux). Il prône une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 5, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 356, "month": "Décembre 2023", "year": 2023, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédicace. En revanche, le numérique peut sembler impersonnel et demande certaines compétences informatiques, un frein pour certains."], "theme": "Technologie / Numérique", "freq": 6, "appearances": ["Février 2025", "Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 357, "month": "Décembre 2023", "year": 2023, "title": "Les habitudes alimentaires", "question": "", "docs": ["Préfère dîner à l'extérieur plutôt que manger seule. Elle apprécie de sortir à tout moment à Lyon et de partager des repas conviviaux avec ses amis, impossible dans son petit appartement. Elle note que peu de gens de sa génération prennent le temps de cuisiner.\n   - Doc 2 (Laura, mère de famille, 45 ans) : Manger au restaurant est souvent trop coûteux pour elle. Le budget familial l'en empêche, même si elle aimerait parfois éviter la cuisine. Elle critique aussi la qualité des plats au restaurant et préfère savoir exactement ce qu'elle mange en cuisinant chez elle.\n\n*Thèmes déjà présents (références) :*"], "theme": "Santé / Bien-être", "freq": 4, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Avril 2022"], "hasDocs": true}, {"id": 358, "month": "Décembre 2023", "year": 2023, "title": "Les vols à bas prix : pour ou contre ?", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 7, "appearances": ["Juillet 2024", "Juin 2024", "Mai 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023"], "hasDocs": true}, {"id": 359, "month": "Décembre 2023", "year": 2023, "title": "L'interdiction des voitures en ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 9, "appearances": ["Mai 2026", "Février 2026", "Décembre 2025", "Novembre 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 360, "month": "Décembre 2023", "year": 2023, "title": "Les menus sans viande à la cantine scolaire", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Décembre 2023", "Novembre 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 361, "month": "Décembre 2023", "year": 2023, "title": "La vie à la campagne ou en ville", "question": "", "docs": ["À mon avis, vivre en ville permet de profiter de nombreuses activités de loisirs. Aller au cinéma, dîner au restaurant ou faire les magasins est très facile. Tout est à proximité, donc on n'a pas besoin de se déplacer longtemps pour se divertir. On peut marcher ou prendre un taxi si nécessaire. La ville offre aussi une grande variété d'activités culturelles comme les musées, le théâtre ou l'opéra.", "Il y a peu de temps, j'ai choisi de m'installer à la campagne après avoir quitté la ville, car je voulais un environnement plus naturel et tranquille. Plutôt que de sortir au restaurant ou dans les bars, j'invite mes amis à la maison pour partager un verre sur la terrasse ou organiser un barbecue. Le prix des logements a aussi été un élément important : à la campagne, les maisons coûtent beaucoup moins cher. Avec le même budget, j'ai pu acheter une grande maison avec un jardin, ce qui n'aurait pas été possible en zone urbaine."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Décembre 2023", "Novembre 2023", "Avril 2023"], "hasDocs": true}, {"id": 362, "month": "Décembre 2023", "year": 2023, "title": "Cours de langue à distance", "question": "", "docs": ["Grâce à Internet, il est tout à fait possible d'apprendre une langue en ligne, et les résultats sont souvent très bons ! Contrairement aux cours en présentiel, on peut suivre les leçons quand on le souhaite, puisqu'elles sont disponibles 24h/24. Cela aide à mieux gérer son emploi du temps. Plus besoin de parcourir de longues distances : on peut apprendre depuis chez soi, son lieu de travail ou même un café. Cela permet aussi d'économiser de l'argent.", "On pourrait croire que l'apprentissage d'une langue en ligne est facile, mais ce n'est pas accessible à tous. Il faut d'abord un bon accès à Internet et un équipement numérique suffisant. Ensuite, il faut être autonome, car étudier seul demande beaucoup de motivation, surtout sans l'aide d'un enseignant ou d'autres apprenants. Dans ces cas-là, on peut rapidement se décourager et abandonner."], "theme": "Éducation / École", "freq": 3, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 363, "month": "Novembre 2023", "year": 2023, "title": "L'uniforme scolaire : pour ou contre ?", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 6, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023"], "hasDocs": true}, {"id": 364, "month": "Novembre 2023", "year": 2023, "title": "Les caméras de surveillance : pour ou contre ?", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Décembre 2023", "Novembre 2023", "Octobre 2023", "Septembre 2023"], "hasDocs": true}, {"id": 365, "month": "Novembre 2023", "year": 2023, "title": "Faut-il mettre une photo sur le CV ?", "question": "", "docs": ["Certains candidats mettent une photo sur leur CV, d'autres préfèrent ne pas en mettre. Il faudrait interdire cette pratique pour éviter toute discrimination. Selon une étude de spécialistes du recrutement, la photo n'a pas de réelle utilité : les employeurs accordent plus d'attention à l'expérience professionnelle (32 %) et aux diplômes (15 %) qu'au physique. Seuls 2 % des recruteurs commencent par regarder la photo, ce qui est surprenant compte tenu de l'importance donnée à l'apparence.", "L'utilisation d'une photo sur le CV divise les recruteurs. Certains estiment qu'elle aide à se faire une idée du candidat avant la rencontre et facilite la mémorisation quand beaucoup de CV sont reçus. D'autres pensent que tout dépend du métier : pour les postes liés à l'accueil, la photo peut être appropriée. Cependant, elle doit toujours être professionnelle pour créer une impression positive."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 366, "month": "Novembre 2023", "year": 2023, "title": "L'utilisation du plastique : pour ou contre ?", "question": "", "docs": ["Défend une utilisation restreinte du plastique, soulignant son importance dans l'alimentation et la médecine (conservation des produits alimentaires, stérilisation des équipements médicaux). Il prône une gestion responsable et le recyclage, mais admet que certains usages sont inévitables dans la société moderne.\n   - Doc 2 (Amicha) : S'oppose fermement au plastique en raison de ses impacts environnementaux dévastateurs : pollution des océans, destruction des écosystèmes par les déchets plastiques. Selon elle, il est urgent d'adopter des alternatives écologiques et durables pour protéger l'environnement et la santé publique."], "theme": "Environnement / Écologie", "freq": 5, "appearances": ["Juillet 2024", "Mars 2024", "Février 2024", "Décembre 2023", "Novembre 2023"], "hasDocs": true}, {"id": 367, "month": "Novembre 2023", "year": 2023, "title": "Le livre papier ou le livre numérique ?", "question": "", "docs": ["Depuis des années, de nombreux lecteurs préfèrent les livres numériques. Selon eux, c'est avant tout économique : moins de papier consommé, coût généralement inférieur aux livres imprimés. Le numérique facilite aussi l'accès à la lecture, notamment pour les malvoyants grâce à l'ajustement de la taille du texte.", "Le livre papier sera-t-il remplacé ? Pour la majorité, non. Le papier a un charme particulier : le plaisir de tourner les pages, l'odeur du livre (neuf ou ancien), la possibilité d'écrire une dédi
