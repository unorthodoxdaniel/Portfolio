t-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 450, "month": "Avril 2023", "year": 2023, "title": "Les devoirs à la maison", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 7, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2023", "Août 2023", "Avril 2023", "Janvier 2022"], "hasDocs": true}, {"id": 451, "month": "Avril 2023", "year": 2023, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 452, "month": "Avril 2023", "year": 2023, "title": "La sévérité des parents envers leurs enfants", "question": "", "docs": ["À 22 ans, je vis toujours chez mes parents, qui restent très stricts avec moi malgré mon âge. Plus jeune, il m'était interdit de dormir à l'extérieur ou de rentrer après 21h. Aujourd'hui, bien que je puisse sortir plus tard, ma mère m'appelle sans cesse jusqu'à mon retour à la maison.", "Certains parents hésitent à être trop stricts, de peur que cela freine l'épanouissement et la personnalité de leurs enfants. Toutefois, céder à toutes leurs demandes peut avoir des conséquences négatives à l'âge adulte. Vivre en société implique le respect de certaines règles essentielles."], "theme": "Famille / Enfants", "freq": 4, "appearances": ["Décembre 2024", "Septembre 2023", "Août 2023", "Avril 2023"], "hasDocs": true}, {"id": 453, "month": "Avril 2023", "year": 2023, "title": "Les caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Avril 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 454, "month": "Avril 2023", "year": 2023, "title": "Les animaux de compagnie : pour ou contre ?", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Animaux", "freq": 1, "appearances": ["Avril 2023"], "hasDocs": true}, {"id": 455, "month": "Avril 2023", "year": 2023, "title": "La sieste au travail", "question": "", "docs": ["Selon le site siestepourtous.com, une courte sieste au travail pourrait augmenter la productivité et la créativité des employés de 35 %, un vrai bénéfice pour le salarié comme pour l'entreprise. La sieste améliorerait la mémoire et la concentration. Un employé reposé serait plus disponible. Enfin, faire une sieste aiderait à réduire le stress et les risques cardiaques.", "Même si les bienfaits de la micro-sieste ont été prouvés scientifiquement, certaines personnes restent sceptiques. La sieste au bureau pose des difficultés pratiques : toutes les entreprises ne peuvent pas disposer de lits ou de salles spécifiques. Quand une entreprise instaure un temps de repos, elle doit respecter certaines règles : fournir un espace et du matériel adaptés pour éviter tout harcèlement, garantir l'égalité entre salariés et établir une charte encadrant cette pratique."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Avril 2023"], "hasDocs": true}, {"id": 456, "month": "Avril 2023", "year": 2023, "title": "Diplôme ou expérience pour l'emploi des jeunes ?", "question": "", "docs": ["Beaucoup de jeunes sortant de l'université se retrouvent sans emploi. La valeur des diplômes sur le marché du travail pose question. Les recruteurs leur reprochent d'avoir trop étudié et trop peu d'expérience, ou considèrent leur jeunesse comme un frein. Plus de 60 % des diplômés restent sans travail un an après leurs études. Il paraît urgent de mieux reconnaître les diplômes et de faciliter l'insertion professionnelle.", "On parle souvent de dirigeants célèbres qui ont réussi sans cursus universitaire. Ces exemples laissent penser qu'il suffit d'être talentueux pour diriger une entreprise. Certains chefs d'entreprise considèrent que l'université peut freiner la créativité : elle pousse à suivre des parcours standards et limite l'innovation. Pour les futurs entrepreneurs, rien ne remplacerait l'expérience pratique et l'autoformation, sans dépendre d'une institution académique."], "theme": "Travail / Carrière", "freq": 1, "appearances": ["Avril 2023"], "hasDocs": true}, {"id": 457, "month": "Avril 2023", "year": 2023, "title": "La vie à la campagne ou en ville", "question": "", "docs": ["À mon avis, vivre en ville permet de profiter de nombreuses activités de loisirs. Aller au cinéma, dîner au restaurant ou faire les magasins est très facile. Tout est à proximité, donc on n'a pas besoin de se déplacer longtemps pour se divertir. On peut marcher ou prendre un taxi si nécessaire. La ville offre aussi une grande variété d'activités culturelles comme les musées, le théâtre ou l'opéra.", "Il y a peu de temps, j'ai choisi de m'installer à la campagne après avoir quitté la ville, car je voulais un environnement plus naturel et tranquille. Plutôt que de sortir au restaurant ou dans les bars, j'invite mes amis à la maison pour partager un verre sur la terrasse ou organiser un barbecue. Le prix des logements a aussi été un élément important : à la campagne, les maisons coûtent beaucoup moins cher. Avec le même budget, j'ai pu acheter une grande maison avec un jardin, ce qui n'aurait pas été possible en zone urbaine."], "theme": "Logement / Ville", "freq": 3, "appearances": ["Décembre 2023", "Novembre 2023", "Avril 2023"], "hasDocs": true}, {"id": 458, "month": "Avril 2023", "year": 2023, "title": "L'influence de la publicité sur les enfants : pour ou contre ?", "question": "", "docs": ["D'après une enquête, les enfants sont en permanence confrontés à de nombreuses publicités (télévision, journaux, Internet), souvent dans des espaces où ils sont vulnérables. Celles-ci ciblent principalement les jouets, les jeux vidéo et les aliments peu sains, ce qui influence leurs décisions et leurs demandes familiales.", "Une recherche parue dans une revue scientifique montre que les enfants comprennent difficilement les messages publicitaires, même s'ils savent que le but est de persuader. Pourtant, d'autres facteurs comme l'éducation des parents, la société et la culture ont un poids plus fort sur leurs choix de consommation que la publicité."], "theme": "Technologie / Numérique", "freq": 1, "appearances": ["Avril 2023"], "hasDocs": true}, {"id": 459, "month": "Mars 2023", "year": 2023, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 460, "month": "Mars 2023", "year": 2023, "title": "Le vélo en ville : pour ou contre ?", "question": "", "docs": ["Le vélo évoque le sport et les loisirs, mais on oublie qu'il est avant tout un moyen de déplacement quotidien, personnel comme professionnel. En milieu urbain, il est rapide et apaisant, offrant une échappatoire au trafic saturé aux heures de pointe. Une solution idéale pour allier activité physique et déplacements utiles.", "Circuler à vélo en ville comporte des risques, comme en témoignent les accidents routiers annuels. La forte concentration de véhicules, les manquements aux règles et l'insuffisance des infrastructures cyclables créent un environnement dangereux. S'y ajoute l'exposition aux polluants atmosphériques (monoxyde de carbone) aux effets toxiques avérés. Le cyclisme urbain soulève une double problématique : sécuritaire et sanitaire."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 461, "month": "Mars 2023", "year": 2023, "title": "L'école à domicile : pour ou contre ?", "question": "", "docs": ["Les raisons de choisir la scolarisation à domicile sont multiples : approche pédagogique personnalisée, plus de temps pour les difficultés de l'enfant, activités ludiques. L'enfant gère son apprentissage à son rythme, approfondit ce qui le passionne et ne subit pas la pression des progrès inégaux des camarades. Autre avantage : absence de notes décourageantes, suivi continu, élimination du stress des évaluations et devoirs.", "C'est un défi avec plusieurs inconvénients : investissement considérable en temps, organisation rigoureuse, coûts (matériel, livres, manuels, sorties éducatives), souvent l'arrêt de l'activité professionnelle d'un parent. L'école à domicile revient généralement plus cher que le public. De plus, l'enfant ne côtoie pas quotidiennement des camarades, ce qui limite ses interactions sociales."], "theme": "Éducation / École", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 462, "month": "Mars 2023", "year": 2023, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 463, "month": "Février 2023", "year": 2023, "title": "Les animaux de compagnie pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 464, "month": "Février 2023", "year": 2023, "title": "Le vélo en ville : pour ou contre ?", "question": "", "docs": ["Le vélo évoque le sport et les loisirs, mais on oublie qu'il est avant tout un moyen de déplacement quotidien, personnel comme professionnel. En milieu urbain, il est rapide et apaisant, offrant une échappatoire au trafic saturé aux heures de pointe. Une solution idéale pour allier activité physique et déplacements utiles.", "Circuler à vélo en ville comporte des risques, comme en témoignent les accidents routiers annuels. La forte concentration de véhicules, les manquements aux règles et l'insuffisance des infrastructures cyclables créent un environnement dangereux. S'y ajoute l'exposition aux polluants atmosphériques (monoxyde de carbone) aux effets toxiques avérés. Le cyclisme urbain soulève une double problématique : sécuritaire et sanitaire."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 465, "month": "Février 2023", "year": 2023, "title": "L'école à domicile : pour ou contre ?", "question": "", "docs": ["Les raisons de choisir la scolarisation à domicile sont multiples : approche pédagogique personnalisée, plus de temps pour les difficultés de l'enfant, activités ludiques. L'enfant gère son apprentissage à son rythme, approfondit ce qui le passionne et ne subit pas la pression des progrès inégaux des camarades. Autre avantage : absence de notes décourageantes, suivi continu, élimination du stress des évaluations et devoirs.", "C'est un défi avec plusieurs inconvénients : investissement considérable en temps, organisation rigoureuse, coûts (matériel, livres, manuels, sorties éducatives), souvent l'arrêt de l'activité professionnelle d'un parent. L'école à domicile revient généralement plus cher que le public. De plus, l'enfant ne côtoie pas quotidiennement des camarades, ce qui limite ses interactions sociales."], "theme": "Éducation / École", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 466, "month": "Février 2023", "year": 2023, "title": "Faire ses courses chez les producteurs locaux ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 6, "appearances": ["Octobre 2024", "Juillet 2024", "Mai 2024", "Janvier 2024", "Mars 2023", "Février 2023"], "hasDocs": true}, {"id": 467, "month": "Janvier 2023", "year": 2023, "title": "Vivre chez ses parents : pour ou contre ?", "question": "", "docs": ["Vivre chez ses parents pendant les études permet aux jeunes d'économiser les frais de logement. On ne paie ni le loyer (souvent très cher) ni la nourriture, le ménage est fait et les vêtements sont propres. Cela offre une certaine stabilité psychologique et permet de mettre de l'argent de côté pour ses projets de vie. Deux jeunes en témoignent : pour la première, étudier loin de chez soi coûte trop cher ; pour le second, vivre chez ses parents est plus confortable (bonne nourriture, linge propre, pas de solitude).\n   - Doc 2 (inconvénients) : Le principal inconvénient est le manque de liberté. Vivre seul rend indépendant, tandis que les jeunes restés chez leurs parents s'ennuient parfois car ceux-ci décident à leur place et ils restent dépendants. Un homme de 25 ans, ayant perdu son emploi, a dû retourner vivre chez ses parents : il a perdu son espace d'intimité. Un autre jeune considère que revenir chez ses parents, c'est « revenir en arrière »."], "theme": "Famille / Enfants", "freq": 4, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023"], "hasDocs": true}, {"id": 468, "month": "Janvier 2023", "year": 2023, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 469, "month": "Janvier 2023", "year": 2023, "title": "Les nouvelles technologies pour les enfants", "question": "", "docs": ["Les enfants de l'école primaire peuvent utiliser la technologie pour trouver des vidéos sur les sujets étudiés à l'école, ou pour jouer à des jeux qui améliorent leur aisance en mathématiques, leur compréhension de la lecture ou leurs compétences en dactylographie.", "Les nouvelles technologies encouragent les enfants à être sédentaires, ce qui est une préoccupation majeure pour les parents. Elles ne mènent à aucun jeu libre créatif, à aucune interaction sociale en face à face, ni à aucun effort physique. Pourquoi ne pas proposer des activités amusantes pour encourager les enfants à ranger leurs appareils ?"], "theme": "Technologie / Numérique", "freq": 5, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Octobre 2022"], "hasDocs": true}, {"id": 470, "month": "Janvier 2023", "year": 2023, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 471, "month": "Décembre 2022", "year": 2022, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 472, "month": "Décembre 2022", "year": 2022, "title": "Faire ses courses dans des petits magasins ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 2, "appearances": ["Décembre 2022", "Novembre 2022"], "hasDocs": true}, {"id": 473, "month": "Décembre 2022", "year": 2022, "title": "La chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Avril 2025", "Décembre 2022", "Novembre 2022"], "hasDocs": true}, {"id": 474, "month": "Novembre 2022", "year": 2022, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 475, "month": "Novembre 2022", "year": 2022, "title": "Faire ses courses dans des petits magasins ou au supermarché", "question": "", "docs": ["Arthur, installé à la campagne, préfère acheter ses produits directement à la ferme pour leur qualité, même si cela lui coûte un peu plus cher.", "Alice, citadine, préfère faire ses courses au supermarché pour la large gamme de produits et les prix accessibles."], "theme": "Éducation / École", "freq": 2, "appearances": ["Décembre 2022", "Novembre 2022"], "hasDocs": true}, {"id": 476, "month": "Novembre 2022", "year": 2022, "title": "La chasse aux animaux", "question": "", "docs": ["« Je fais partie de ceux qui ne parviennent pas à comprendre comment on peut prendre plaisir à tuer des animaux. Je fais aussi partie de ceux qui ne saisissent pas comment on peut prétendre aimer la nature tout en contribuant à sa destruction. »\n   - Doc 2 (Bernard, journaliste) : « La chasse est pratiquée pour diverses raisons : qu'il s'agisse de se nourrir, de commercer, de gérer la faune, de protéger la propriété, de faire de l'exercice, de se divertir ou de chercher du prestige. »"], "theme": "Animaux", "freq": 3, "appearances": ["Avril 2025", "Décembre 2022", "Novembre 2022"], "hasDocs": true}, {"id": 477, "month": "Octobre 2022", "year": 2022, "title": "Le voyage seul ou le voyage accompagné ?", "question": "", "docs": ["Voyager en solo, c'est aussi l'occasion de faire le point, de réfléchir et de se retrouver seul avec soi-même. Sans être constamment sollicité par ses collègues, ses amis ou sa famille, on peut se consacrer pleinement du temps et entamer une véritable introspection.", "Tous les voyageurs solos ont déjà rencontré des difficultés liées à leur situation. Le premier problème est bien sûr la solitude : même si la route est semée de rencontres, celles-ci sont généralement éphémères, et le poids moral de cette succession de rencontres et d'adieux peut vite devenir un fardeau."], "theme": "Voyage / Tourisme", "freq": 1, "appearances": ["Octobre 2022"], "hasDocs": true}, {"id": 478, "month": "Octobre 2022", "year": 2022, "title": "Les nouvelles technologies pour les enfants", "question": "", "docs": ["Les enfants de l'école primaire peuvent utiliser la technologie pour trouver des vidéos sur les sujets étudiés à l'école, ou pour jouer à des jeux qui améliorent leur aisance en mathématiques, leur compréhension de la lecture ou leurs compétences en dactylographie.", "Les nouvelles technologies encouragent les enfants à être sédentaires, ce qui est une préoccupation majeure pour les parents. Elles ne mènent à aucun jeu libre créatif, à aucune interaction sociale en face à face, ni à aucun effort physique. Pourquoi ne pas proposer des activités amusantes pour encourager les enfants à ranger leurs appareils ?"], "theme": "Technologie / Numérique", "freq": 5, "appearances": ["Septembre 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Octobre 2022"], "hasDocs": true}, {"id": 479, "month": "Octobre 2022", "year": 2022, "title": "L'art dans les rues : pour ou contre ?", "question": "", "docs": ["Dans les grandes villes, on voit de plus en plus de peintures et de dessins sur les façades des bâtiments publics et privés. Cet art de rue permet à la culture d'être présente dans l'espace public. Pour certains maires, il est essentiel de donner aux artistes des espaces où travailler légalement. Ces graffitis attirent aussi les touristes, qui participent à des circuits thématiques et explorent des lieux peu connus.", "Chaque année, certaines villes investissent des sommes importantes pour lutter contre les graffitis. Les dessins sur les murs, les bancs ou dans les stations sont difficiles à enlever et demandent parfois l'aide de professionnels. Pour certains habitants, ces peintures nuisent à l'image de leur quartier et dérangent les propriétaires, obligés de les nettoyer eux-mêmes. Malgré les règlements et les amendes, les graffitis persistent."], "theme": "Culture / Arts / Médias", "freq": 1, "appearances": ["Octobre 2022"], "hasDocs": true}, {"id": 480, "month": "Septembre 2022", "year": 2022, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 481, "month": "Septembre 2022", "year": 2022, "title": "L'uniforme scolaire", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 3, "appearances": ["Octobre 2024", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 482, "month": "Septembre 2022", "year": 2022, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 483, "month": "Août 2022", "year": 2022, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 484, "month": "Août 2022", "year": 2022, "title": "L'uniforme scolaire", "question": "", "docs": ["Le port de l'uniforme scolaire peut limiter l'expression personnelle des élèves, notamment ceux qui souhaitent affirmer leur identité à travers leur style vestimentaire. Certains estiment qu'il faut laisser aux jeunes la liberté de choisir leurs vêtements pour développer leur personnalité et leur créativité. Pour eux, l'uniforme impose une conformité qui peut frustrer ceux qui aiment se distinguer par la mode ou les accessoires.", "Le port de l'uniforme favorise un sentiment d'appartenance à l'établissement et renforce le sens de la communauté. Il peut engendrer une fierté d'appartenir à une institution. De plus, l'uniforme réduit les discriminations liées au style vestimentaire ou à la classe sociale. Il offre aussi un avantage économique pour les familles, en évitant les dépenses élevées pour des vêtements de marque, rendant l'accès à l'éducation plus égalitaire."], "theme": "Éducation / École", "freq": 3, "appearances": ["Octobre 2024", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 485, "month": "Août 2022", "year": 2022, "title": "La restauration rapide", "question": "", "docs": ["Les fast-foods se caractérisent par la variété de plats sains qu'ils proposent, en respectant scrupuleusement les normes d'hygiène. En donnant aux clients la possibilité de créer leur propre menu, ils les responsabilisent dans leurs choix alimentaires tout en tenant compte de leurs goûts.", "Les experts expliquent que consommer régulièrement des repas dans des fast-foods peut nuire à la santé. Les plats sont souvent les mêmes : hamburgers, frites et boissons sucrées, riches en calories. De plus, la plupart des produits sont emballés dans du plastique, ce qui génère beaucoup de déchets et nuit à l'environnement."], "theme": "Santé / Bien-être", "freq": 14, "appearances": ["Novembre 2025", "Août 2025", "Avril 2025", "Juillet 2024", "Mai 2024", "Janvier 2024", "Octobre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Décembre 2022", "Novembre 2022", "Septembre 2022", "Août 2022"], "hasDocs": true}, {"id": 486, "month": "Juillet 2022", "year": 2022, "title": "Les vêtements de marque", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Mai 2022"], "hasDocs": true}, {"id": 487, "month": "Juillet 2022", "year": 2022, "title": "Les caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Avril 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 488, "month": "Juillet 2022", "year": 2022, "title": "L'interdiction des voitures en centre-ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Avril 2022"], "hasDocs": true}, {"id": 489, "month": "Juillet 2022", "year": 2022, "title": "Les vols à bas prix", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Avril 2025", "Janvier 2025", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 490, "month": "Juillet 2022", "year": 2022, "title": "Les menus sans viande à la cantine scolaire", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Décembre 2023", "Novembre 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 491, "month": "Juin 2022", "year": 2022, "title": "Les vêtements de marque", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Mai 2022"], "hasDocs": true}, {"id": 492, "month": "Juin 2022", "year": 2022, "title": "Les caméras de surveillance à l'école", "question": "", "docs": ["À l'école où je travaille à Montréal, les caméras de surveillance sont largement présentes. Leur objectif est de dissuader les élèves de commettre des actes de violence. Les enseignants, les parents et la majorité des élèves les accueillent favorablement, car cela renforce la sécurité des enfants et crée un environnement propice à l'enseignement. Cependant, certains élèves expriment des préoccupations quant à leur vie privée.", "Je m'oppose à l'installation des caméras de surveillance dans nos écoles à Montréal. Les résultats obtenus dans d'autres pays utilisant ce système ne sont pas convaincants. Les individus mal intentionnés peuvent facilement contourner ces caméras très visibles. Pour résoudre les problèmes de discipline, il est préférable d'améliorer la communication entre enseignants, administration et élèves, et de faire respecter les règles scolaires par tous, plutôt que de dépendre des caméras."], "theme": "Éducation / École", "freq": 3, "appearances": ["Avril 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 493, "month": "Juin 2022", "year": 2022, "title": "L'interdiction des voitures en centre-ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Avril 2022"], "hasDocs": true}, {"id": 494, "month": "Juin 2022", "year": 2022, "title": "Les vols à bas prix", "question": "", "docs": ["En France, les écoles privées ont accueilli un nombre plus important d'élèves lors de la dernière rentrée. Leur popularité n'est pas uniquement due aux résultats obtenus par les élèves. C'est surtout leur réputation qui attire les familles. De nombreux parents considèrent que l'encadrement y est meilleur, que les élèves sont davantage surveillés et que les enseignants sont plus impliqués. Ils sont aussi rassurés par la composition des classes, souvent constituées d'élèves provenant de milieux favorisés. Cela s'explique notamment par le coût des études dans ces établissements, alors que l'enseignement public est gratuit.", "Les collèges privés accueillent peu d'élèves provenant de milieux défavorisés. Les frais de scolarité représentent un obstacle pour une partie de la population. Cette distinction entre écoles publiques et privées limite la diversité sociale au sein des établissements. Ainsi, les jeunes scolarisés dans le privé ont peu de contacts avec des élèves ayant des conditions de vie différentes. Ce système tend à reproduire les inégalités existantes et à renforcer le sentiment d'être mis à l'écart chez certains jeunes."], "theme": "Environnement / Écologie", "freq": 4, "appearances": ["Avril 2025", "Janvier 2025", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 495, "month": "Juin 2022", "year": 2022, "title": "Les menus sans viande à la cantine scolaire", "question": "", "docs": ["De plus en plus d'établissements scolaires intègrent des repas sans viande dans leurs menus, au moins deux fois par semaine. Certaines études ont démontré que les enfants consomment une quantité excessive de protéines animales. Pour des raisons de santé, les écoles privilégient des alternatives comme le soja, les céréales et les légumes, qui sont plus sains et bénéfiques pour la croissance des enfants. En outre, ces repas sont souvent plus économiques pour les familles. Cette mesure est généralement bien accueillie par les parents et les élèves.", "La suppression de la viande dans les menus scolaires ne fait pas l'unanimité. Pour certaines familles en difficulté, la cantine représente la seule opportunité pour leurs enfants de consommer de la viande, qui reste un aliment coûteux. Par ailleurs, les producteurs locaux de viande sont affectés économiquement par cette mesure. Enfin, bon nombre d'enfants préfèrent encore les plats à base de viande, trouvant que les steaks de soja manquent de saveur."], "theme": "Éducation / École", "freq": 4, "appearances": ["Décembre 2023", "Novembre 2023", "Juillet 2022", "Juin 2022"], "hasDocs": true}, {"id": 496, "month": "Mai 2022", "year": 2022, "title": "Les vêtements de marque", "question": "", "docs": ["Les vêtements de marque jouent un rôle essentiel pour les enfants et adolescents en leur permettant de s'exprimer et de se sentir intégrés dans un groupe social. Cette attraction pour les marques est particulièrement forte chez les adolescents qui cherchent à affirmer leur personnalité. Les enfants apprécient aussi porter des vêtements ornés d'images de leurs dessins animés préférés ou de logos qu'ils affectionnent.", "Les enfants grandissent rapidement, ce qui rend leurs vêtements trop petits après peu de temps. De plus, jouer dehors avec leurs amis dans l'herbe ou sur les aires de jeux fait que leurs vêtements s'usent vite et se salissent rapidement, souvent avec des trous."], "theme": "Société / Débat", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Mai 2022"], "hasDocs": true}, {"id": 497, "month": "Mai 2022", "year": 2022, "title": "La lecture pour les enfants", "question": "", "docs": ["Obliger les enfants à lire n'est pas une bonne solution. Lire est une pratique particulière. Quand un enfant aime le sport, on ne le contraint pas, on essaie de le motiver. Il en va de même pour la lecture, selon Laurence T., pédopsychiatre. Elle affirme que « l'amour de la lecture ne peut pas être imposé ».", "Lire avec ses enfants est une activité agréable et bénéfique. Une lecture régulière leur permet d'apprendre de nouveaux mots, de mieux écouter et de se familiariser avec les mots écrits. Ce moment est idéal pour partager du plaisir en famille. Les parents doivent essayer de lire des histoires dès le jeune âge, même après une journée fatigante. Cinq à dix minutes par jour suffisent pour donner le goût de la lecture durablement."], "theme": "Famille / Enfants", "freq": 7, "appearances": ["Novembre 2024", "Septembre 2024", "Août 2024", "Mars 2024", "Février 2024", "Janvier 2023", "Mai 2022"], "hasDocs": true}, {"id": 498, "month": "Mai 2022", "year": 2022, "title": "Les animaux (de compagnie) pour les enfants", "question": "", "docs": ["Donner un animal de compagnie à un enfant comporte de nombreux bienfaits, comme le montrent de nombreux psychologues. Pour les enfants sans frères ni sœurs, l'animal devient un compagnon et leur évite la solitude. Grâce à lui, l'enfant gagne en confiance et apprend que l'animal est un être vivant qui mérite attention et respect. Avec sa présence, l'enfant se sent en sécurité et peut devenir plus autonome sans l'aide constante de ses parents.", "De nombreux enfants demandent un jour un animal, souvent un chien ou un chat. Même si vous souhaitez faire plaisir à votre enfant, il faut bien réfléchir avant d'adopter. L'animal devient un membre de la famille et implique un engagement sur plusieurs années. Avoir un animal coûte souvent cher et demande beaucoup de responsabilités. Ce n'est pas un jouet que l'on peut jeter quand l'enfant ne s'en occupe plus."], "theme": "Famille / Enfants", "freq": 9, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2024", "Août 2024", "Janvier 2024", "Mars 2023", "Février 2023", "Mai 2022"], "hasDocs": true}, {"id": 499, "month": "Avril 2022", "year": 2022, "title": "L'égalité hommes-femmes au travail", "question": "", "docs": ["Dans certaines régions, comme le Québec, l'égalité entre les femmes et les hommes est une réalité. Beaucoup de femmes occupent désormais des postes à responsabilité et travaillent dans des domaines traditionnellement masculins, tels que le bâtiment ou la gestion d'entreprise. Avec les lois sur l'égalité et le changement des mentalités, les femmes ont aujourd'hui accès aux mêmes métiers que les hommes, sans subir de discrimination.", "Même si des efforts sont faits pour atteindre la parité, des inégalités demeurent. Par exemple, certains métiers sont encore très féminisés, comme celui de sage-femme ou d'assistante maternelle. De plus, certaines personnes estiment que les femmes doivent rester à la maison pour s'occuper des enfants plutôt que travailler dans des métiers exigeants ou à responsabilité. Il reste donc beaucoup à faire pour changer les mentalités et garantir les mêmes chances aux femmes et aux hommes."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Avril 2022", "Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 500, "month": "Avril 2022", "year": 2022, "title": "Les habitudes alimentaires", "question": "", "docs": ["Préfère dîner à l'extérieur plutôt que manger seule. Elle apprécie de sortir à tout moment à Lyon et de partager des repas conviviaux avec ses amis, impossible dans son petit appartement. Elle note que peu de gens de sa génération prennent le temps de cuisiner.\n   - Doc 2 (Laura, mère de famille, 45 ans) : Manger au restaurant est souvent trop coûteux pour elle. Le budget familial l'en empêche, même si elle aimerait parfois éviter la cuisine. Elle critique aussi la qualité des plats au restaurant et préfère savoir exactement ce qu'elle mange en cuisinant chez elle.\n\n*Thèmes déjà présents (références) :*"], "theme": "Santé / Bien-être", "freq": 4, "appearances": ["Juillet 2024", "Décembre 2023", "Novembre 2023", "Avril 2022"], "hasDocs": true}, {"id": 501, "month": "Avril 2022", "year": 2022, "title": "L'interdiction des voitures en centre-ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 3, "appearances": ["Juillet 2022", "Juin 2022", "Avril 2022"], "hasDocs": true}, {"id": 502, "month": "Avril 2022", "year": 2022, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 503, "month": "Avril 2022", "year": 2022, "title": "La gratuité des transports en commun", "question": "", "docs": ["La gratuité des transports en commun est une initiative très positive. Elle permet de réduire le trafic automobile et de limiter les bouchons. Elle contribue aussi à diminuer la pollution et les risques pour la santé liés à l'air. Dans ma ville, où les transports sont gratuits, on constate une hausse de leur utilisation. Cette mesure a également favorisé le commerce local, car les habitants se rendent plus facilement au centre-ville pour leurs achats.", "À mon avis, cette mesure n'est pas appropriée. D'abord, la gratuité des transports représente un coût élevé pour les villes, et certaines, comme Toulouse, ont d'autres priorités, par exemple l'aménagement des espaces verts. Ensuite, il vaudrait mieux améliorer la desserte des transports publics plutôt que de les rendre gratuits, car certains quartiers en sont mal équipés. Enfin, garder les transports payants encourage les usagers à mieux respecter les installations, puisqu'ils financent leur fonctionnement."], "theme": "Environnement / Écologie", "freq": 2, "appearances": ["Mai 2023", "Avril 2022"], "hasDocs": true}, {"id": 504, "month": "Mars 2022", "year": 2022, "title": "Le travail des jeunes pendant les vacances", "question": "", "docs": ["Je suis fermement pour le travail des jeunes pendant les vacances. C'est une excellente occasion d'acquérir des compétences pratiques, d'apprendre à travailler en équipe et de découvrir différents secteurs. Les jeunes peuvent gagner de l'argent à économiser pour l'avenir ou à consacrer à des loisirs. De plus, une expérience de travail sur le CV constitue un avantage pour postuler à des emplois ou à des stages. Les vacances d'été sont longues : il y a amplement le temps de se reposer et de travailler.\n    - Doc 2 (Élise, psychologue pour adolescents) : Je suis contre l'idée que les jeunes doivent travailler pendant leurs vacances. Les adolescents subissent déjà une énorme pression pendant l'année scolaire (études, examens, activités parascolaires). Les vacances doivent être une période pour se détendre, décompresser et poursuivre des intérêts personnels. Les forcer à travailler pourrait aggraver le stress et l'épuisement. Il est aussi important de disposer de temps non structuré pour explorer sa créativité, voir ses amis et sa famille, et simplement être des enfants. Le travail peut attendre."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 505, "month": "Mars 2022", "year": 2022, "title": "L'importance du travail", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 506, "month": "Mars 2022", "year": 2022, "title": "L'égalité hommes-femmes au travail", "question": "", "docs": ["Dans certaines régions, comme le Québec, l'égalité entre les femmes et les hommes est une réalité. Beaucoup de femmes occupent désormais des postes à responsabilité et travaillent dans des domaines traditionnellement masculins, tels que le bâtiment ou la gestion d'entreprise. Avec les lois sur l'égalité et le changement des mentalités, les femmes ont aujourd'hui accès aux mêmes métiers que les hommes, sans subir de discrimination.", "Même si des efforts sont faits pour atteindre la parité, des inégalités demeurent. Par exemple, certains métiers sont encore très féminisés, comme celui de sage-femme ou d'assistante maternelle. De plus, certaines personnes estiment que les femmes doivent rester à la maison pour s'occuper des enfants plutôt que travailler dans des métiers exigeants ou à responsabilité. Il reste donc beaucoup à faire pour changer les mentalités et garantir les mêmes chances aux femmes et aux hommes."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Avril 2022", "Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 507, "month": "Mars 2022", "year": 2022, "title": "Les jeux vidéo", "question": "", "docs": ["De l'enfance à l'adolescence, les enfants jouent souvent aux jeux vidéo, ce qui peut provoquer des idées négatives et des comportements violents. Une étude récente auprès de jeunes de 9 à 18 ans qui jouent régulièrement montre que les jeux vidéo violents augmentent fortement l'agressivité. D'après Diego Gentil, ce phénomène serait inévitable, même avec un contrôle parental.", "On parle souvent des aspects négatifs des jeux vidéo, pourtant ils peuvent aussi avoir des effets positifs sur le cerveau et la santé. Ils permettent de développer certaines capacités mentales comme l'attention, l'imagination et l'analyse. Cela s'explique par le fait que, lorsque vous jouez, vous devez réfléchir en permanence et résoudre des problèmes."], "theme": "Technologie / Numérique", "freq": 10, "appearances": ["Mai 2024", "Décembre 2023", "Septembre 2023", "Juillet 2023", "Juin 2023", "Mai 2023", "Septembre 2022", "Août 2022", "Avril 2022", "Mars 2022"], "hasDocs": true}, {"id": 508, "month": "Février 2022", "year": 2022, "title": "Le travail des jeunes pendant les vacances", "question": "", "docs": ["Je suis fermement pour le travail des jeunes pendant les vacances. C'est une excellente occasion d'acquérir des compétences pratiques, d'apprendre à travailler en équipe et de découvrir différents secteurs. Les jeunes peuvent gagner de l'argent à économiser pour l'avenir ou à consacrer à des loisirs. De plus, une expérience de travail sur le CV constitue un avantage pour postuler à des emplois ou à des stages. Les vacances d'été sont longues : il y a amplement le temps de se reposer et de travailler.\n    - Doc 2 (Élise, psychologue pour adolescents) : Je suis contre l'idée que les jeunes doivent travailler pendant leurs vacances. Les adolescents subissent déjà une énorme pression pendant l'année scolaire (études, examens, activités parascolaires). Les vacances doivent être une période pour se détendre, décompresser et poursuivre des intérêts personnels. Les forcer à travailler pourrait aggraver le stress et l'épuisement. Il est aussi important de disposer de temps non structuré pour explorer sa créativité, voir ses amis et sa famille, et simplement être des enfants. Le travail peut attendre."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 509, "month": "Février 2022", "year": 2022, "title": "L'importance du travail", "question": "", "docs": ["Le travail occupe une place importante dans notre vie : dès l'enfance, on nous demande : « Que veux-tu devenir plus tard ? ». Même s'il peut apporter de la satisfaction, il est souvent source de fatigue et peut donner l'impression d'être coincé dans une routine. Aujourd'hui, beaucoup de personnes constatent un déséquilibre entre leur vie professionnelle et leur vie personnelle. Il devient nécessaire de réfléchir à la place du travail dans notre société. Certains pensent qu'en travaillant moins, on pourrait profiter de davantage de temps libre, être plus heureux et mieux vivre.", "Le travail fait partie de notre identité sociale. Lorsqu'on rencontre quelqu'un pour la première fois, on demande souvent : « Que faites-vous dans la vie ? », ce qui montre l'importance du travail dans la perception de soi. Selon le spécialiste Jean-Daniel Remond, la vie professionnelle contribue à se construire : elle permet de rencontrer des gens, de créer des réseaux personnels et professionnels, de se sentir utile et même de se faire des amis. Même si certains décident de quitter leur emploi, pour la plupart, travailler est essentiel pour exister. Le travail reste donc crucial pour l'équilibre personnel et collectif."], "theme": "Travail / Carrière", "freq": 2, "appearances": ["Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 510, "month": "Février 2022", "year": 2022, "title": "L'égalité hommes-femmes au travail", "question": "", "docs": ["Dans certaines régions, comme le Québec, l'égalité entre les femmes et les hommes est une réalité. Beaucoup de femmes occupent désormais des postes à responsabilité et travaillent dans des domaines traditionnellement masculins, tels que le bâtiment ou la gestion d'entreprise. Avec les lois sur l'égalité et le changement des mentalités, les femmes ont aujourd'hui accès aux mêmes métiers que les hommes, sans subir de discrimination.", "Même si des efforts sont faits pour atteindre la parité, des inégalités demeurent. Par exemple, certains métiers sont encore très féminisés, comme celui de sage-femme ou d'assistante maternelle. De plus, certaines personnes estiment que les femmes doivent rester à la maison pour s'occuper des enfants plutôt que travailler dans des métiers exigeants ou à responsabilité. Il reste donc beaucoup à faire pour changer les mentalités et garantir les mêmes chances aux femmes et aux hommes."], "theme": "Travail / Carrière", "freq": 3, "appearances": ["Avril 2022", "Mars 2022", "Février 2022"], "hasDocs": true}, {"id": 511, "month": "Janvier 2022", "year": 2022, "title": "Les devoirs à la maison", "question": "", "docs": ["D'après certaines associations de parents d'élèves, les devoirs à domicile sont bénéfiques car ils permettent aux élèves de gérer leur temps seuls. Pour les parents, les devoirs représentent une occasion de se rapprocher de l'école chaque jour. Même si ce n'est pas toujours facile après une journée de travail, ils aiment ce temps passé avec leurs enfants, qui se sentent valorisés par l'intérêt que leurs parents leur montrent.", "Nous nous opposons depuis longtemps aux devoirs à la maison. Leur efficacité pour améliorer les résultats scolaires n'a jamais été prouvée de manière certaine. De nombreux parents n'ont pas le temps ou ne savent pas comment aider. De plus, les élèves qui ont compris le cours perdent du temps à refaire des exercices, tandis que ceux qui ne sont pas aidés restent en difficulté. C'est pourquoi nous estimons qu'il faudrait abolir les devoirs à domicile."], "theme": "Éducation / École", "freq": 7, "appearances": ["Décembre 2024", "Novembre 2024", "Octobre 2024", "Septembre 2023", "Août 2023", "Avril 2023", "Janvier 2022"], "hasDocs": true}, {"id": 512, "month": "Janvier 2022", "year": 2022, "title": "L'interdiction des voitures au centre-ville", "question": "", "docs": ["En raison de la pollution importante observée dans de nombreuses régions, certaines villes ont choisi d'interdire les voitures dans les zones urbaines. La ville d'Oslo, en Norvège, a appliqué cette mesure récemment et constate des effets positifs pour tous. Avec le temps, les accidents diminuent, la dépendance au pétrole est réduite et l'air devient plus sain.", "Beaucoup de villes lancent des projets visant à interdire la circulation automobile en centre-ville sans préparer les infrastructures indispensables. Certes, diminuer le trafic permettrait de réduire les bouchons, le stress et la pollution de l'air. Mais il est également important de prévoir de grands parkings, de renforcer les transports publics, et de donner des autorisations particulières à certains professionnels, comme les services d'urgence, la police ou les livreurs."], "theme": "Environnement / Écologie", "freq": 1, "appearances": ["Janvier 2022"], "hasDocs": true}, {"id": 513, "month": "Janvier 2022", "year": 2022, "title": "Le grossissement des villes", "question": "", "docs": ["De nos jours, les villes grossissent toujours plus. Malheureusement, ce phénomène a un fort impact sur l'environnement : plus une ville s'étend, plus elle nuit à la nature, et donc, ensuite, à l'homme. L'effet le plus visible est la déforestation. Or les végétaux retiennent le carbone ; quand on les supprime pour construire des bâtiments ou des rues, on élimine des espaces verts capables de stocker des millions de tonnes de carbone.", "Plus de la moitié de l'humanité vit en ville (huit habitants sur dix dans les pays riches) : la vie urbaine est donc le principal enjeu écologique. On entend souvent dire que l'organisation actuelle des villes n'est pas écologique et que leur croissance ne fait qu'aggraver le problème. Pourtant, il faut se méfier des apparences : les villes ne sont pas toujours aussi anti-écologiques qu'on l'imagine. Par exemple, la consommation d'énergie d'un citadin est plus faible que celle d'un habitant de la campagne."], "theme": "Logement / Ville", "freq": 8, "appearances": ["Octobre 2024", "Septembre 2024", "Mars 2024", "Février 2024", "Octobre 2023", "Avril 2023", "Janvier 2023", "Janvier 2022"], "hasDocs": true}, {"id": 514, "month": "Janvier 2022", "year": 2022, "title": "Les objets connectés", "question": "", "docs": ["Les objets connectés rendent le quotidien plus pratique. Ce sont des appareils que vous contrôlez à distance via un téléphone ou Internet, par exemple le chauffage ou l'ouverture des portes. Les montres et bracelets connectés permettent d'observer vos activités ; un programme peut mesurer vos pas pour vous motiver à faire plus d'exercice. Leur rôle est particulièrement utile dans la santé, car certains objets rappellent les consultations médicales ou la prise de médicaments.", "On pense qu'il existe environ 50 milliards d'objets connectés dans le monde : alarmes, télévisions, caméras de sécurité, volets, détecteurs de fumée. Toutefois, ce développement entraîne des risques de sécurité. Un hacker peut contrôler un objet connecté en peu de temps. Par exemple, un cambrioleur pourrait vérifier, via des caméras connectées, si une maison est vide. Il est aussi possible de pirater le système d'un véhicule connecté et de le diriger à distance."], "theme": "Technologie / Numérique", "freq": 4, "appearances": ["Octobre 2024", "Janvier 2024", "Mai 2023", "Janvier 2022"], "hasDocs": true}];

let pool = [];
let history = [];
let mode = 'flash'; // 'flash' | 'scroll'

// Init themes
const themeSelect = document.getElementById('themeSelect');
const themes = [...new Set(ALL_DATA.map(e => e.theme))].sort((a,b) => a.localeCompare(b,'fr'));
themes.forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t;
  themeSelect.appendChild(o);
});

['themeSelect','docsFilter','freqFilter'].forEach(id =>
  document.getElementById(id).addEventListener('change', onFilterChange)
);

function onFilterChange() {
  buildPool();
  if (mode === 'flash') {
    history = [];
    showFlashCard(pool[0] || null);
  } else {
    renderScrollFeed();
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('btnFlash').classList.toggle('active', m === 'flash');
  document.getElementById('btnScroll').classList.toggle('active', m === 'scroll');
  document.getElementById('flashArea').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('scrollArea').style.display = m === 'scroll' ? 'block' : 'none';
  document.body.classList.toggle('scroll-mode', m === 'scroll');

  if (m === 'flash') {
    if (!pool.length) buildPool();
    updateCounter();
  } else {
    buildPool();
    renderScrollFeed();
  }
}

function buildPool() {
  const theme = document.getElementById('themeSelect').value;
  const docs  = document.getElementById('docsFilter').value;
  const freq  = document.getElementById('freqFilter').value;

  pool = ALL_DATA.filter(e => {
    if (theme && e.theme !== theme) return false;
    if (docs === 'docs' && !e.hasDocs) return false;
    if (docs === 'nodocs' && e.hasDocs) return false;
    if (freq === 'high' && e.freq < 5) return false;
    if (freq === 'med' && (e.freq < 2 || e.freq > 4)) return false;
    if (freq === 'once' && e.freq !== 1) return false;
    return true;
  });
  shuffle(pool);
  updateCounter();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── Flash mode ──
function nextCard() {
  if (!pool.length) return;
  const idx = history.length % pool.length;
  if (idx === 0 && history.length > 0) shuffle(pool);
  showFlashCard(pool[idx]);
}

function showFlashCard(entry) {
  if (!entry) {
    document.getElementById('cardArea').innerHTML =
      '<div class="empty-state"><strong>Aucune fiche</strong>Modifiez les filtres.</div>';
    return;
  }
  history.push(entry);
  updateCounter();
  document.getElementById('cardArea').innerHTML = buildCardHTML(entry);
  renderHistory();
}

// ── Scroll mode ──
function renderScrollFeed() {
  const area = document.getElementById('scrollArea');
  if (!pool.length) {
    area.innerHTML = '<div class="empty-state"><strong>Aucune fiche</strong>Modifiez les filtres.</div>';
    updateCounter();
    return;
  }
  // Show all pool entries in order (already shuffled)
  area.innerHTML = pool.map(e => `<div class="card">${buildCardHTML(e)}</div>`).join('') +
    `<div class="scroll-end">${pool.length} fiche${pool.length > 1 ? 's' : ''} · fin du défilement</div>`;
  updateCounter();
}

// ── Card builder ──
function buildCardHTML(e) {
  const freqBadge = e.freq > 1 ? `<span class="tag tag-freq">${e.freq}× répété</span>` : '';

  let docsHTML = '';
  if (e.docs && e.docs.length) {
    docsHTML = '<div class="docs">' + e.docs.map((d, i) =>
      `<div class="doc-block doc${i+1}">
        <div class="doc-label">Document ${i+1}</div>
        <div class="doc-text">${esc(d)}</div>
      </div>`
    ).join('') + '</div>';
  } else {
    docsHTML = '<p class="no-docs">Documents source non disponibles pour cette période.</p>';
  }

  const qHTML = e.question ? `<p class="card-question">${esc(e.question)}</p>` : '';

  let appHTML = '';
  if (e.appearances && e.appearances.length > 1) {
    const chips = e.appearances.map(m =>
      `<span class="app-chip ${m === e.month ? 'current' : ''}">${m}</span>`
    ).join('');
    appHTML = `<div class="appearances">
      <div class="appearances-label">Apparitions (${e.appearances.length})</div>
      <div class="appearances-list">${chips}</div>
    </div>`;
  }

  return `<div class="card-meta">
      <span class="tag tag-theme">${esc(e.theme)}</span>
      ${freqBadge}
      <span class="tag tag-month">${esc(e.month)}</span>
    </div>
    <h2 class="card-title">${esc(e.title)}</h2>
    ${qHTML}
    ${docsHTML}
    ${appHTML}`;
}

function renderHistory() {
  const el = document.getElementById('historyItems');
  if (!history.length) {
    el.innerHTML = '<span style="font-size:0.73rem;color:var(--ink-soft)">Aucune fiche vue</span>';
    return;
  }
  el.innerHTML = history.slice().reverse().map((e, i) =>
    `<span class="h-chip" title="${esc(e.title)}">${esc(e.title)}</span>`
  ).join('');
}

function resetSession() {
  history = [];
  buildPool();
  showFlashCard(pool[0] || null);
  renderHistory();
}

function updateCounter() {
  const el = document.getElementById('counter');
  if (mode === 'flash') {
    el.textContent = history.length
      ? `${history.length} vues · ${pool.length} fiches`
      : `${pool.length} fiches`;
  } else {
    el.textContent = `${pool.length} fiches`;
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Start
buildPool();
showFlashCard(pool[0] || null);
</script>

</html>
