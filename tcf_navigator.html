<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigateur TCF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a2e;--accent:#c94a4a;--bg:#f7f6f2;--card:#fff;--border:#e4e0d8;--muted:#8a8680;
  --pour-bg:#eef7ee;--pour-border:#4caf50;--contre-bg:#fdecea;--contre-border:#e57373;
  --nuance-bg:#fff8e1;--nuance-border:#ffb300;--q-bg:#f0f4ff;--q-border:#5c7cfa;
  --tag-bg:#f0ede8;--sg-bg:#f5f3ef;--sg-border:#d4cfc7;
  --univ-bg:#fff8ee;--univ-border:#e8a020;
  --date-color:#999390
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.site-nav{background:var(--ink);padding:0 2rem;display:flex;align-items:center;gap:2rem;height:52px;position:sticky;top:0;z-index:100}
.nav-logo{color:var(--accent);font-family:'Crimson Pro',serif;font-size:1.4rem;font-weight:600;text-decoration:none;letter-spacing:.05em}
.nav-links{display:flex;gap:1.5rem}
.nav-link{color:#ccc;text-decoration:none;font-size:.85rem;transition:color .15s}
.nav-link:hover,.nav-link.active{color:#fff}
.page-header{padding:2rem 2rem 0;max-width:1100px;margin:0 auto}
.page-title{font-family:'Crimson Pro',serif;font-size:2rem;font-weight:600}
.page-subtitle{color:var(--muted);font-size:.9rem;margin-top:.3rem}
.tabs-outer{max-width:1100px;margin:1.5rem auto 0;padding:0 2rem}
.tab-bar{display:flex;gap:.5rem;border-bottom:2px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap}
.tab-btn{padding:.6rem 1.2rem;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.view-bar{display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.view-btn{padding:.4rem 1rem;border:1.5px solid var(--border);border-radius:20px;background:none;cursor:pointer;font-size:.82rem;color:var(--muted);transition:all .15s}
.view-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.view-label{font-size:.82rem;color:var(--muted);font-weight:600;margin-right:.25rem}
.controls{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:.55rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;background:var(--card);color:var(--ink)}
.search-box:focus{outline:none;border-color:var(--accent)}
.filter-select,.theme-select{padding:.55rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;background:var(--card);color:var(--ink);cursor:pointer;max-width:200px}
.filter-select:focus,.theme-select:focus{outline:none;border-color:var(--accent)}
.sort-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.sort-toggle-btn{padding:.5rem .85rem;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);transition:all .15s;border-right:1px solid var(--border);white-space:nowrap}
.sort-toggle-btn:last-child{border-right:none}
.sort-toggle-btn.active{background:var(--ink);color:#fff}
.stats-line{font-size:.82rem;color:var(--muted);margin-left:auto}
/* Cards */
.clusters-grid{display:flex;flex-direction:column;gap:.75rem;padding-bottom:3rem}
.cluster-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.cluster-head{padding:1rem 1.25rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;user-select:none}
.cluster-head:hover{background:#fafaf8}
.cluster-name{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600;flex:1}
.cluster-badges{display:flex;gap:.4rem;align-items:center;flex-shrink:0;flex-wrap:wrap}
.badge-apps{background:var(--accent);color:#fff;font-size:.72rem;padding:.2rem .55rem;border-radius:12px;font-weight:600;white-space:nowrap}
.badge-unique{background:var(--tag-bg);color:var(--muted);font-size:.72rem;padding:.2rem .55rem;border-radius:12px;white-space:nowrap}
.badge-recent{background:#e8f5e9;color:#2e7d32;font-size:.72rem;padding:.2rem .55rem;border-radius:12px;font-weight:600;white-space:nowrap}
.chevron{color:var(--muted);font-size:.85rem;transition:transform .2s;flex-shrink:0}
.cluster-card.open .chevron,.arg-block-card.open .chevron,.sg-card.open .sg-chevron{transform:rotate(90deg)}
.cluster-body{display:none;border-top:1.5px solid var(--border)}
.cluster-card.open .cluster-body{display:block}
/* PCN */
.hint-panel,.arg-pcn{padding:1rem 1.25rem;border-bottom:1.5px solid var(--border);display:grid;gap:.6rem}
.hint-row{padding:.55rem .8rem;border-radius:8px;line-height:1.5}
.hint-pour{background:var(--pour-bg);border-left:3px solid var(--pour-border)}
.hint-contre{background:var(--contre-bg);border-left:3px solid var(--contre-border)}
.hint-nuance{background:var(--nuance-bg);border-left:3px solid var(--nuance-border)}
.hint-label{font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;opacity:.8;display:block}
.hint-list{margin:0;padding-left:1.1rem;display:flex;flex-direction:column;gap:.25rem}
.hint-list li{font-size:.875rem;line-height:1.5}
/* Question items */
.q-row{display:flex;align-items:flex-start;gap:.45rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.855rem;line-height:1.5}
.q-row:last-child{border-bottom:none}
.q-count{background:var(--tag-bg);color:var(--muted);font-size:.7rem;padding:.15rem .45rem;border-radius:8px;flex-shrink:0;margin-top:.15rem;font-weight:600;white-space:nowrap}
.q-date{color:var(--date-color);font-size:.7rem;flex-shrink:0;margin-top:.2rem;white-space:nowrap}
.recent-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0;margin-top:.55rem}
/* Variants panel */
.variants-panel{padding:.75rem 1.25rem 1rem}
.variants-toggle{font-size:.82rem;color:var(--accent);cursor:pointer;margin:.4rem 0 .5rem;display:inline-block;font-weight:500;background:none;border:none;font-family:inherit;padding:0}
.variants-toggle:hover{text-decoration:underline}
.variants-list{display:none}
.variants-list.open{display:block}
/* Arg qs */
.arg-qs{padding:.75rem 1.25rem 1rem}
.arg-qs-label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.5rem}
/* Raw list */
.raw-list{display:flex;flex-direction:column;gap:0;padding-bottom:3rem}
.raw-item{cursor:pointer;flex-wrap:wrap;display:flex;align-items:flex-start;gap:.6rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.875rem;line-height:1.5}
.raw-item:first-child{border-top:1px solid var(--border)}
.raw-item-main{display:flex;align-items:flex-start;gap:.6rem;width:100%;flex-wrap:wrap}
.raw-chevron{font-size:.65rem;color:var(--muted);transition:transform .15s;flex-shrink:0;margin-top:.3rem}
.raw-item.open .raw-chevron{transform:rotate(90deg)}
.raw-hints{display:none;width:100%;padding:.5rem 0 .3rem 2rem;font-size:.8rem;color:var(--muted);line-height:1.5}
.raw-item.open .raw-hints{display:block}
.raw-hint-row{margin-bottom:.3rem}
.raw-hint-label{display:inline;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;margin-right:.35rem}
.raw-hint-label.pour{color:#388e3c}
.raw-hint-label.contre{color:#c62828}
.raw-hint-label.nuance{color:#1565c0}
.raw-q-list{list-style:none;padding:0;margin:0}
.raw-q-list li{padding:.1rem 0;border-bottom:1px solid var(--border)}
.raw-q-list li:last-child{border-bottom:none}
.raw-badge{background:var(--tag-bg);color:var(--muted);font-size:.7rem;padding:.15rem .5rem;border-radius:8px;flex-shrink:0;margin-top:.18rem;font-weight:600;min-width:30px;text-align:center;white-space:nowrap}
.raw-date{color:var(--date-color);font-size:.7rem;flex-shrink:0;margin-top:.2rem;white-space:nowrap}
.raw-cluster{font-size:.7rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.1rem .45rem;flex-shrink:0;margin-top:.18rem;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
/* T3 arg blocks */
.arg-block-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:.75rem}
.arg-block-head{padding:1rem 1.25rem;cursor:pointer;display:flex;align-items:center;gap:.75rem;user-select:none}
.arg-block-head:hover{background:#fafaf8}
.arg-block-name{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600;flex:1}
.arg-block-body{display:none;border-top:1.5px solid var(--border)}
.arg-block-card.open .arg-block-body{display:block}
/* Subgroups */
.subgroups-panel{padding:.5rem 1rem .75rem}
.subgroups-label{font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:.4rem 0 .5rem}
.sg-card{background:var(--sg-bg);border:1px solid var(--sg-border);border-radius:8px;margin-bottom:.4rem;overflow:hidden}
.sg-head{padding:.6rem .9rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;user-select:none}
.sg-head:hover{background:#eeebe5}
.sg-title{font-size:.88rem;font-weight:600;flex:1;color:var(--ink)}
.sg-chevron{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.sg-badge{background:var(--tag-bg);color:var(--muted);font-size:.68rem;padding:.15rem .45rem;border-radius:8px;font-weight:600;white-space:nowrap}
.sg-body{display:none;border-top:1px solid var(--sg-border)}
.sg-card.open .sg-body{display:block}
.sg-pcn{padding:.65rem .9rem;display:grid;gap:.45rem;border-bottom:1px solid var(--sg-border)}
.sg-hint-row{padding:.4rem .65rem;border-radius:6px;line-height:1.5}
.sg-qs{padding:.5rem .9rem .7rem}
.sg-qs-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.4rem}
/* T2 subgroup desc */
.sg-desc{font-size:.78rem;color:var(--muted);padding:.4rem .9rem .5rem;font-style:italic;border-bottom:1px solid var(--sg-border)}
/* Universal args */
.univ-banner{background:var(--univ-bg);border:1.5px solid var(--univ-border);border-radius:10px;padding:.8rem 1rem;margin-bottom:1.25rem}
.univ-top{display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.univ-template{flex:1;min-width:200px}
.univ-template-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#b45309;margin-bottom:.4rem}
.univ-row{font-size:.83rem;line-height:1.7}
.univ-row strong{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;margin-right:.3rem}
.univ-expand-btn{font-size:.8rem;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;font-weight:500;white-space:nowrap;align-self:center;flex-shrink:0}
.univ-expand-btn:hover{text-decoration:underline}
.univ-verbs-panel{display:none;margin-top:.9rem;padding-top:.75rem;border-top:1px solid var(--univ-border)}
.univ-verbs-panel.open{display:block}
.univ-verb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.5rem}
.univ-verb-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem}
.univ-verb-label{font-size:.78rem;font-weight:600;margin-bottom:.25rem}
.univ-verb-list{font-size:.76rem;color:var(--muted);margin-bottom:.4rem;font-style:italic}
.univ-ex-line{font-size:.78rem;line-height:1.6}
.univ-pour{color:#388e3c}.univ-contre{color:#c62828}
/* Questions panel (T2 key questions) */
.questions-panel{padding:.75rem 1.25rem;border-bottom:1.5px solid var(--border)}
.questions-panel .ql{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.5rem}
.q-item{padding:.4rem .7rem;background:var(--q-bg);border-left:3px solid var(--q-border);border-radius:0 6px 6px 0;font-size:.875rem;margin-bottom:.35rem}
/* Empty / loading */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.9rem}
.loading-state{text-align:center;padding:4rem 1rem;color:var(--muted)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .page-header,.tabs-outer{padding:1rem}
  .controls{flex-direction:column}
  .stats-line{margin-left:0}
  .cluster-name,.arg-block-name{font-size:1rem}
  .raw-cluster{display:none}
  .univ-verb-grid{grid-template-columns:1fr}
  .filter-select,.theme-select{max-width:100%}
}
</style>
</head>

<nav class="site-nav">
  <a class="nav-logo" href="tcf_home.html">TCF</a>
  <div class="nav-links">

<div class="page-header">
  <div class="page-title">Navigateur TCF</div>
  <div class="page-subtitle">Expression Écrite & Orale — questions classées par thème</div>
</div>
<div class="tabs-outer">
  <div class="tab-bar" id="mainTabBar">
    <button class="tab-btn active" data-tab="ee">Expression Écrite</button>
    <button class="tab-btn" data-tab="eo">Expression Orale</button>
  </div>

  <!-- EE TAB -->
  <div id="tab-ee">
    <div class="tab-bar" id="eeTabBar">
      <button class="tab-btn active" data-task="t1">T1 — Courriel / message</button>
      <button class="tab-btn" data-task="t2">T2 — Texte long (blog, forum…)</button>
    </div>
    <div class="view-bar">
      <span class="view-label">Vue :</span>
      <button class="view-btn active" id="ee-mode-clusters">Groupes</button>
      <button class="view-btn" id="ee-mode-raw">Toutes</button>
    </div>
    <div class="controls">
      <input class="search-box" id="ee-search" placeholder="Rechercher..." type="text">
      <select class="filter-select" id="ee-cluster-filter"></select>
      <div class="sort-toggle">
        <button class="sort-toggle-btn active" id="ee-sort-freq">🔁 Fréquence</button>
        <button class="sort-toggle-btn" id="ee-sort-recent">🕐 Récents</button>
      </div>
      <span class="stats-line" id="ee-stats"></span>
    </div>
    <div id="ee-content"><div class="loading-state"><div class="loading-spinner"></div>Chargement…</div></div>
  </div>

  <!-- EO TAB -->
  <div id="tab-eo" style="display:none">
    <div class="tab-bar" id="eoTabBar">
      <button class="tab-btn active" data-view="scenarios">T2 — Scénarios</button>
      <button class="tab-btn" data-view="t3">T3 — Arguments</button>
    </div>
    <div class="view-bar">
      <span class="view-label">Vue :</span>
      <button class="view-btn active" id="eo-mode-clusters">Groupes</button>
      <button class="view-btn" id="eo-mode-raw">Toutes</button>
    </div>
    <div class="controls">
      <input class="search-box" id="eo-search" placeholder="Rechercher..." type="text">
      <select class="filter-select" id="eo-cluster-filter"></select>
      <select class="theme-select" id="eo-theme-filter"><option value="">Tous les thèmes</option></select>
      <div class="sort-toggle">
        <button class="sort-toggle-btn active" id="eo-sort-freq">🔁 Fréquence</button>
        <button class="sort-toggle-btn" id="eo-sort-recent">🕐 Récents</button>
      </div>
      <span class="stats-line" id="eo-stats"></span>
    </div>
    <div id="eo-content"><div class="loading-state"><div class="loading-spinner"></div>Chargement…</div></div>
  </div>
</div>

<script>
(function(){
var D=null;
var eeTask='t1', eoView='scenarios';
var eeMode='clusters', eoMode='clusters';
var eeSort='freq', eoSort='freq';
var RECENT=202500;

// Month display
var MN=['','Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
function lmStr(lm){if(!lm)return'';return MN[lm%100]+'&nbsp;'+(Math.floor(lm/100));}
function isR(lm){return lm>=RECENT;}
function rdot(lm){return isR(lm)?'<span class="recent-dot"></span>':'';}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function sortItems(arr,sort){
  var a=arr.slice();
  return sort==='recent'?a.sort(function(x,y){return(y.lm||0)-(x.lm||0);}):a.sort(function(x,y){return y.n-x.n;});
}
function sortClusters(arr,sort){
  var a=arr.slice();
  return sort==='recent'?a.sort(function(x,y){return(y.lm||0)-(x.lm||0);}):a.sort(function(x,y){return y.apps-x.apps;});
}

function populateSelect(id,opts,allLabel){
  var s=document.getElementById(id),p=s.value;
  s.innerHTML='<option value="">'+allLabel+'</option>';
  opts.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  if(p&&opts.indexOf(p)>=0)s.value=p;
}

// Render a q-row (question + count + date)
function qRowHtml(p,n,lm){
  return'<div class="q-row"><span class="q-count">'+n+'×</span>'+rdot(lm)
    +(lm?'<span class="q-date">'+lmStr(lm)+'</span>':'')
    +'<span>'+esc(p)+'</span></div>';
}

// PCN block
function pcnHtml(pour,contre,nuance,compact){
  var pc=compact?'sg-hint-row ':'hint-row ';
  function listOf(v){var a=Array.isArray(v)?v:[v];return'<ul class="hint-list">'+a.map(function(x){return'<li>'+esc(x)+'</li>';}).join('')+'</ul>';}
  return'<div class="'+pc+'hint-pour"><span class="hint-label">Pour</span>'+listOf(pour)+'</div>'
    +'<div class="'+pc+'hint-contre"><span class="hint-label">Contre</span>'+listOf(contre)+'</div>'
    +'<div class="'+pc+'hint-nuance"><span class="hint-label">Nuance</span>'+esc(nuance)+'</div>';
}

// Subgroup panel (works for both T3 and T2)
function sgPanelHtml(subgroups, questions, sort, showPcn){
  if(!subgroups||!subgroups.length)return'';
  var html='<div class="subgroups-panel"><div class="subgroups-label">Sous-thèmes</div>';
  subgroups.forEach(function(sg){
    var qs=questions.filter(function(q){return q.subgroup===sg.id;});
    if(!qs.length)return;
    var sorted=sortItems(qs,sort);
    var top=sorted.slice(0,4),rest=sorted.slice(4);
    var sgLm=Math.max.apply(null,qs.map(function(q){return q.lm||0;}));
    var rb=isR(sgLm)?'<span class="badge-recent">'+lmStr(sgLm)+'</span>':'';
    var restHtml=rest.length
      ?'<button class="variants-toggle">▶ Voir toutes ('+rest.length+')</button>'
       +'<div class="variants-list">'+rest.map(function(q){return qRowHtml(q.p,q.n,q.lm);}).join('')+'</div>':'';
    var descHtml=sg.desc?'<div class="sg-desc">'+esc(sg.desc)+'</div>':'';
    var pcnBlock=showPcn&&sg.pour?'<div class="sg-pcn">'+pcnHtml(sg.pour,sg.contre,sg.nuance,true)+'</div>':'';
    html+='<div class="sg-card">'
      +'<div class="sg-head"><span class="sg-title">'+esc(sg.title)+'</span>'+rb
      +'<span class="sg-badge">'+qs.length+'q</span><span class="sg-chevron">▶</span></div>'
      +'<div class="sg-body">'+descHtml+pcnBlock
      +'<div class="sg-qs"><div class="sg-qs-label">Questions</div>'
      +top.map(function(q){return qRowHtml(q.p,q.n,q.lm);}).join('')
      +restHtml+'</div></div></div>';
  });
  html+='</div>';
  return html;
}

// Universal args banner
function univHtml(){
  if(!D||!D.universal_args)return'';
  var t=D.universal_args.template;
  var cards=D.universal_args.verbs.map(function(v){
    return'<div class="univ-verb-card">'
      +'<div class="univ-verb-label">'+v.emoji+' '+esc(v.label)+'</div>'
      +'<div class="univ-verb-list">'+v.verbs.map(esc).join(' · ')+'</div>'
      +'<div class="univ-ex-line univ-pour">✓ '+esc(v.pour[0])+'</div>'
      +'<div class="univ-ex-line univ-contre">✗ '+esc(v.contre[0])+'</div>'
      +'</div>';
  }).join('');
  return'<div class="univ-banner">'
    +'<div class="univ-top"><div class="univ-template"><div class="univ-template-label">Modèle universel</div>'
    +'<div class="univ-row"><strong style="color:#388e3c">Pour :</strong>'+esc(t.pour)+'</div>'
    +'<div class="univ-row"><strong style="color:#c62828">Contre :</strong>'+esc(t.contre)+'</div>'
    +'<div class="univ-row"><strong style="color:#b45309">Nuance :</strong>'+esc(t.nuance)+'</div>'
    +'</div>'
    +'<button class="univ-expand-btn" onclick="var p=this.nextElementSibling;p.classList.toggle(\'open\');this.textContent=p.classList.contains(\'open\')?\'▲ Masquer\':\'▶ Arguments universels\'">▶ Arguments universels</button>'
    +'</div><div class="univ-verbs-panel"><div class="univ-verb-grid">'+cards+'</div></div></div>';
}

// Cluster card (EE)
function clusterCardHtml(c,innerTop,unit,sort){
  var items=sortItems(c.items,sort);
  var top3=items.slice(0,3),rest=items.slice(3);
  var rb=isR(c.lm)?'<span class="badge-recent">'+lmStr(c.lm)+'</span>':'';
  var restHtml=rest.length
    ?'<button class="variants-toggle">▶ Voir les variantes ('+rest.length+')</button>'
     +'<div class="variants-list">'+rest.map(function(i){return qRowHtml(i.p,i.n,i.lm);}).join('')+'</div>':'';
  return'<div class="cluster-card"><div class="cluster-head"><div class="cluster-name">'+esc(c.cluster)+'</div>'
    +'<div class="cluster-badges">'+rb+'<span class="badge-apps">'+c.apps+'×</span><span class="badge-unique">'+c.items.length+' '+unit+'</span></div>'
    +'<span class="chevron">▶</span></div>'
    +'<div class="cluster-body">'+innerTop
    +'<div class="variants-panel">'+top3.map(function(i){return qRowHtml(i.p,i.n,i.lm);}).join('')+restHtml+'</div></div></div>';
}

// T2 scenario cluster card (with optional subgroups)
function t2ClusterCardHtml(c, sort){
  var allItems=sortItems(c.items,sort);
  // Exclude items already shown in subgroups from "Tous les scénarios"
  var sgKeys=c.subgroups?c.subgroups.map(function(sg){return sg.id;}).filter(Boolean):[];
  var rootItems=sgKeys.length?allItems.filter(function(i){return!i.subgroup||sgKeys.indexOf(i.subgroup)<0;}):allItems;
  var showItems=rootItems.length?rootItems:allItems;
  var top3=showItems.slice(0,3),rest=showItems.slice(3);
  var rb=isR(c.lm)?'<span class="badge-recent">'+lmStr(c.lm)+'</span>':'';
  var qHtml=c.questions&&c.questions.length?'<div class="questions-panel"><div class="ql">Questions clés</div>'+c.questions.map(function(qq){return'<div class="q-item">'+esc(qq)+'</div>';}).join('')+'</div>':'';
  var sgHtml=c.subgroups&&c.subgroups.length?sgPanelHtml(c.subgroups,c.items,sort,false):'';
  var restHtml=rest.length
    ?'<button class="variants-toggle">▶ Voir les variantes ('+rest.length+')</button>'
     +'<div class="variants-list">'+rest.map(function(i){return qRowHtml(i.p,i.n,i.lm);}).join('')+'</div>':'';
  var tousLabel=sgHtml?'Autres scénarios':'Tous les scénarios';
  return'<div class="cluster-card"><div class="cluster-head"><div class="cluster-name">'+esc(c.cluster)+'</div>'
    +'<div class="cluster-badges">'+rb+'<span class="badge-apps">'+c.apps+'×</span><span class="badge-unique">'+c.items.length+' scénarios</span></div>'
    +'<span class="chevron">▶</span></div>'
    +'<div class="cluster-body">'+qHtml+sgHtml
    +(showItems.length?'<div class="variants-panel"><div class="arg-qs-label" style="font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.5rem">'+tousLabel+'</div>'
    +top3.map(function(i){return qRowHtml(i.p,i.n,i.lm);}).join('')+restHtml+'</div>':'')+'</div></div>';
}

  else{eoMode=m;document.getElementById('eo-mode-clusters').classList.toggle('active',m==='clusters');document.getElementById('eo-mode-raw').classList.toggle('active',m==='raw');renderEO();}
}

function populateThemeFilter(){
  var map=eoView==='t3'?T3_THEMES:T2_THEMES;
  var s=document.getElementById('eo-theme-filter'),p=s.value;
  s.innerHTML='<option value="">Tous les thèmes</option>';
  Object.keys(map).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o);});
  if(p&&map[p])s.value=p; else s.value='';
}

// Delegated clicks
function addDelegation(id){
  document.getElementById(id).addEventListener('click',function(e){
    var vt=e.target.closest('.variants-toggle');
    if(vt){e.stopPropagation();var vl=vt.nextElementSibling;if(vl){vl.classList.toggle('open');vt.textContent=vl.classList.contains('open')?vt.textContent.replace('▶','▼'):vt.textContent.replace('▼','▶');}return;}
    var ri=e.target.closest('.raw-item.expandable');
    if(ri&&!e.target.closest('.variants-toggle')){ri.classList.toggle('open');return;}
    var sh=e.target.closest('.sg-head');if(sh){sh.closest('.sg-card').classList.toggle('open');return;}
    var ch=e.target.closest('.cluster-head');if(ch){ch.closest('.cluster-card').classList.toggle('open');return;}
    var ah=e.target.closest('.arg-block-head');if(ah){ah.closest('.arg-block-card').classList.toggle('open');return;}
  });
}

// EE render
function renderEE(){
  if(!D)return;
  var el=document.getElementById('ee-content');
  var q=document.getElementById('ee-search').value.toLowerCase().trim();
  var clf=document.getElementById('ee-cluster-filter').value;
  var sort=eeSort;
  var task=D.ee&&D.ee[eeTask];
  if(!task){el.innerHTML='<div class="empty-state">Aucune donnée.</div>';return;}
  var clusters=JSON.parse(JSON.stringify(task));
  populateSelect('ee-cluster-filter',clusters.map(function(c){return c.cluster;}),'Tous les types');
  if(clf)clusters=clusters.filter(function(c){return c.cluster===clf;});
  if(q)clusters=clusters.filter(function(c){return c.cluster.toLowerCase().indexOf(q)>=0||c.items.some(function(i){return i.p.toLowerCase().indexOf(q)>=0;});});
  clusters=sortClusters(clusters,sort);
  var allItems=[];
  clusters.forEach(function(c){var its=q?c.items.filter(function(i){return i.p.toLowerCase().indexOf(q)>=0;}):c.items;its.forEach(function(i){allItems.push({p:i.p,n:i.n,lm:i.lm||0,cluster:c.cluster});});});
  allItems=sortItems(allItems,sort);
  document.getElementById('ee-stats').textContent=eeMode==='raw'?allItems.length+' questions':clusters.length+' types · '+allItems.length+' questions';
  if(!clusters.length){el.innerHTML='<div class="empty-state">Aucun résultat.</div>';return;}
  if(eeMode==='raw'){
    el.className='raw-list';
    el.innerHTML=allItems.map(function(i){return'<div class="raw-item"><div class="raw-item-main"><span class="raw-badge">'+i.n+'×</span>'+rdot(i.lm)+(i.lm?'<span class="raw-date">'+lmStr(i.lm)+'</span>':'')+'<span class="raw-cluster" title="'+esc(i.cluster)+'">'+esc(i.cluster)+'</span><span>'+esc(i.p)+'</span></div></div>';}).join('');
  }else{
    el.className='clusters-grid';
    el.innerHTML=clusters.map(function(c){var its=q?c.items.filter(function(i){return i.p.toLowerCase().indexOf(q)>=0;}):c.items;return clusterCardHtml(Object.assign({},c,{items:its}),'','questions',sort);}).join('');
  }
}

// EO render
function renderEO(){
  if(!D)return;
  var el=document.getElementById('eo-content');
  var q=document.getElementById('eo-search').value.toLowerCase().trim();
  var clf=document.getElementById('eo-cluster-filter').value;
  var tf=document.getElementById('eo-theme-filter').value;
  var sort=eoSort;

  if(eoView==='scenarios'){
    var clusters=JSON.parse(JSON.stringify(D.eo.t2));
    populateSelect('eo-cluster-filter',clusters.map(function(c){return c.cluster;}),'Tous les groupes');
    // theme filter
    if(tf&&T2_THEMES[tf]){var al=T2_THEMES[tf];clusters=clusters.filter(function(c){return al.indexOf(c.cluster)>=0;});}
    if(clf)clusters=clusters.filter(function(c){return c.cluster===clf;});
    if(q)clusters=clusters.filter(function(c){return c.cluster.toLowerCase().indexOf(q)>=0||c.items.some(function(i){return i.p.toLowerCase().indexOf(q)>=0;});});
    clusters=sortClusters(clusters,sort);
    var allItems=[];
    clusters.forEach(function(c){var its=q?c.items.filter(function(i){return i.p.toLowerCase().indexOf(q)>=0;}):c.items;its.forEach(function(i){allItems.push({p:i.p,n:i.n,lm:i.lm||0,cluster:c.cluster});});});
    allItems=sortItems(allItems,sort);
    document.getElementById('eo-stats').textContent=eoMode==='raw'?allItems.length+' scénarios':clusters.length+' groupes · '+allItems.length+' scénarios';
    if(!clusters.length){el.innerHTML='<div class="empty-state">Aucun résultat.</div>';return;}
    if(eoMode==='raw'){
      el.className='raw-list';
      var lookup={};D.eo.t2.forEach(function(c){lookup[c.cluster]=c;});
      el.innerHTML=allItems.map(function(i){
        var cl=lookup[i.cluster],hintsHtml='';
        if(cl&&cl.questions&&cl.questions.length)hintsHtml='<div class="raw-hints"><ul class="raw-q-list">'+cl.questions.map(function(qq){return'<li>'+esc(qq)+'</li>';}).join('')+'</ul></div>';
        return'<div class="raw-item'+(hintsHtml?' expandable':'')+'"><div class="raw-item-main">'+(hintsHtml?'<span class="raw-chevron">▶</span>':'')+'<span class="raw-badge">'+i.n+'×</span>'+rdot(i.lm)+(i.lm?'<span class="raw-date">'+lmStr(i.lm)+'</span>':'')+'<span class="raw-cluster" title="'+esc(i.cluster)+'">'+esc(i.cluster)+'</span><span>'+esc(i.p)+'</span></div>'+hintsHtml+'</div>';
      }).join('');
    }else{
      el.className='clusters-grid';
      el.innerHTML=clusters.map(function(c){
        var cc=JSON.parse(JSON.stringify(c));
        if(q)cc.items=cc.items.filter(function(i){return i.p.toLowerCase().indexOf(q)>=0;});
        return t2ClusterCardHtml(cc,sort);
      }).join('');
    }
  }else{
    // T3 arguments
    var blocks=JSON.parse(JSON.stringify(D.eo.t3_args));
    populateSelect('eo-cluster-filter',blocks.map(function(b){return b.title;}),'Tous les blocs');
    if(tf&&T3_THEMES[tf]){var al2=T3_THEMES[tf];blocks=blocks.filter(function(b){return al2.indexOf(b.id)>=0;});}
    if(clf)blocks=blocks.filter(function(b){return b.title===clf;});
    if(q)blocks=blocks.filter(function(b){return b.title.toLowerCase().indexOf(q)>=0||(b.pour&&b.pour.toString().toLowerCase().indexOf(q)>=0)||b.questions.some(function(qq){return qq.p.toLowerCase().indexOf(q)>=0;});});
    if(sort==='recent')blocks.sort(function(a,b){return(b.lm||0)-(a.lm||0);});
    else blocks.sort(function(a,b){return b.apps-a.apps;});
    var allQs=[];
    blocks.forEach(function(b){var qs=q?b.questions.filter(function(qq){return qq.p.toLowerCase().indexOf(q)>=0;}):b.questions;qs.forEach(function(qq){allQs.push({p:qq.p,n:qq.n,lm:qq.lm||0,cluster:b.title});});});
    allQs=sortItems(allQs,sort);
    document.getElementById('eo-stats').textContent=eoMode==='raw'?allQs.length+' questions':blocks.length+' blocs · '+allQs.length+' questions';
    if(!blocks.length){el.innerHTML='<div class="empty-state">Aucun résultat.</div>';return;}
    if(eoMode==='raw'){
      el.className='raw-list';
      var blookup={};D.eo.t3_args.forEach(function(b){blookup[b.title]=b;});
      el.innerHTML=allQs.map(function(i){
        var bl=blookup[i.cluster],hintsHtml='';
        if(bl){var p=Array.isArray(bl.pour)?bl.pour[0]:bl.pour,c2=Array.isArray(bl.contre)?bl.contre[0]:bl.contre;hintsHtml='<div class="raw-hints"><div class="raw-hint-row"><span class="raw-hint-label pour">Pour</span>'+esc(p)+'</div><div class="raw-hint-row"><span class="raw-hint-label contre">Contre</span>'+esc(c2)+'</div><div class="raw-hint-row"><span class="raw-hint-label nuance">Nuance</span>'+esc(bl.nuance)+'</div></div>';}
        return'<div class="raw-item'+(hintsHtml?' expandable':'')+'"><div class="raw-item-main">'+(hintsHtml?'<span class="raw-chevron">▶</span>':'')+'<span class="raw-badge">'+i.n+'×</span>'+rdot(i.lm)+(i.lm?'<span class="raw-date">'+lmStr(i.lm)+'</span>':'')+'<span class="raw-cluster" title="'+esc(i.cluster)+'">'+esc(i.cluster)+'</span><span>'+esc(i.p)+'</span></div>'+hintsHtml+'</div>';
      }).join('');
    }else{
      el.className='clusters-grid';
      el.innerHTML=univHtml()+blocks.map(function(b){
        var sgIds=b.subgroups?b.subgroups.map(function(sg){return sg.id;}).filter(Boolean):[];
        var rootQs=b.questions.filter(function(qq){return!qq.subgroup||sgIds.indexOf(qq.subgroup)<0;});
        var topQs=sortItems(rootQs.length?rootQs:b.questions,sort).slice(0,4);
        var rb=isR(b.lm)?'<span class="badge-recent">'+lmStr(b.lm)+'</span>':'';
        return'<div class="arg-block-card">'
          +'<div class="arg-block-head"><div class="arg-block-name">'+esc(b.title)+'</div>'
          +'<div class="cluster-badges">'+rb+'<span class="badge-apps">'+b.apps+'×</span><span class="badge-unique">'+b.n+' questions</span></div>'
          +'<span class="chevron">▶</span></div>'
          +'<div class="arg-block-body">'
          +'<div class="arg-pcn">'+pcnHtml(b.pour,b.contre,b.nuance,false)+'</div>'
          +sgPanelHtml(b.subgroups,b.questions,sort,true)
          +(rootQs.length?'<div class="arg-qs"><div class="arg-qs-label">Questions fréquentes</div>'
          +topQs.map(function(q){return qRowHtml(q.p,q.n,q.lm);}).join('')
          +'</div>':'')+'</div></div>';
      }).join('');
    }
  }
}

// Load
fetch('tcf_data.json')
  .then(function(r){return r.json();})
  .then(function(data){
    // Recompute apps from item counts so stored value is never stale
    function reapps(clusters){
      clusters.forEach(function(c){
        c.apps=c.items.reduce(function(s,i){return s+(i.n||1);},0);
        if(c.lm==null)c.lm=Math.max.apply(null,c.items.map(function(i){return i.lm||0;}).concat([0]));
      });
    }
    if(data.ee){if(data.ee.t1)reapps(data.ee.t1);if(data.ee.t2)reapps(data.ee.t2);}
    if(data.eo){
      if(data.eo.t2)reapps(data.eo.t2);
      if(data.eo.t3_args)data.eo.t3_args.forEach(function(b){
        b.apps=b.questions.reduce(function(s,q){return s+(q.n||1);},0);
        b.n=b.questions.length;
        b.lm=Math.max.apply(null,b.questions.map(function(q){return q.lm||0;}).concat([0]));
      });
    }
    D=data;
    addDelegation('ee-content');
    addDelegation('eo-content');
    populateThemeFilter();
    renderEE();
    renderEO();
  })
  .catch(function(){
    var msg='<div class="empty-state">Erreur de chargement. Placez <code>tcf_data.json</code> dans le même dossier et servez via HTTP (<code>python3 -m http.server</code>).</div>';
    document.getElementById('ee-content').innerHTML=msg;
    document.getElementById('eo-content').innerHTML=msg;
  });
})();
